name: Link check

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/link-check.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
  schedule:
    - cron: '0 18 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --max-cache-age 7d
            --no-progress
            --max-redirects 5
            --max-concurrency 8
            --accept 200,206,429
            --exclude-mail
            --exclude-path '_site'
            './docs/**/*.md'
            'README.md'
          fail: false
          format: markdown
          output: lychee-report.md

      - name: Create issue from report
        if: env.lychee_exit_code != '0' && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Link check report (${{ github.run_id }})'
          content-filepath: lychee-report.md
          labels: docs, link-rot
