<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="ogTitle ogDesc">
  <title id="ogTitle">FullSense — umbrella brand for llmesh / llive / llove</title>
  <desc id="ogDesc">FullSense is an open-source family for self-evolving, on-prem, audit-friendly LLM systems. Apache-2.0.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#10b981"/>
      <stop offset="50%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <style>
      .h  { font: 700 92px "Inter","Helvetica Neue",Arial,sans-serif; fill: #111827; }
      .tm { font: 700 36px "Inter","Helvetica Neue",Arial,sans-serif; fill: #f59e0b; baseline-shift: super; }
      .s  { font: 400 34px "Inter","Helvetica Neue",Arial,sans-serif; fill: #374151; }
      .p  { font: 700 44px "Inter","Helvetica Neue",Arial,sans-serif; }
      .pd { font: 400 26px "Inter","Helvetica Neue",Arial,sans-serif; fill: #374151; }
      .f  { font: 400 24px "Inter","Helvetica Neue",Arial,sans-serif; fill: #6b7280; }
      .li { fill: #10b981; }
      .lm { fill: #3b82f6; }
      .lo { fill: #ec4899; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="10" fill="url(#rule)"/>

  <g transform="translate(80,140)">
    <text class="h">FullSense<tspan class="tm" dx="6" dy="-12">™</tspan></text>
    <text class="s" y="60">Umbrella brand &amp; spec v1.1 — 9 axes for self-evolving, on-prem LLM systems.</text>
  </g>

  <g transform="translate(80,330)">
    <g transform="translate(0,0)">
      <circle cx="20" cy="20" r="18" class="lm"/>
      <text class="p lm" x="56" y="32">llmesh</text>
      <text class="pd" x="56" y="74">secure LLM hub (on-prem MCP)</text>
    </g>
    <g transform="translate(0,130)">
      <circle cx="20" cy="20" r="18" class="li"/>
      <text class="p li" x="56" y="32">llive</text>
      <text class="pd" x="56" y="74">self-evolving modular memory</text>
    </g>
    <g transform="translate(620,0)">
      <circle cx="20" cy="20" r="18" class="lo"/>
      <text class="p lo" x="56" y="32">llove</text>
      <text class="pd" x="56" y="74">TUI dashboard / HITL workbench</text>
    </g>
    <g transform="translate(620,130)">
      <rect x="0" y="2" width="36" height="36" rx="6" fill="#fbbf24"/>
      <text class="p" x="56" y="32" fill="#92400e">llmesh-suite</text>
      <text class="pd" x="56" y="74">one-shot installer</text>
    </g>
  </g>

  <g transform="translate(80,580)">
    <text class="f">Apache-2.0 · pip install llmesh-suite · furuse-kazufumi.github.io/fullsense</text>
  </g>
</svg>
