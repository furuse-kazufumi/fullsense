<g transform="translate(275,185) scale(1.0)"><path d="M0 0 q14 -12 21 1 q6 12 -8 15 q-11 2 -12 -8 q0 -7 7 -8" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.95" stroke-linecap="round"/></g><g transform="translate(330,215) scale(1.15)"><path d="M0 0 q14 -12 21 1 q6 12 -8 15 q-11 2 -12 -8 q0 -7 7 -8" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.95" stroke-linecap="round"/></g><g transform="translate(380,185) scale(0.9)"><path d="M0 0 q14 -12 21 1 q6 12 -8 15 q-11 2 -12 -8 q0 -7 7 -8" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.95" stroke-linecap="round"/></g><g transform="translate(300,250) scale(0.95)"><path d="M0 0 q14 -12 21 1 q6 12 -8 15 q-11 2 -12 -8 q0 -7 7 -8" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.95" stroke-linecap="round"/></g><g transform="translate(360,262) scale(0.8)"><path d="M0 0 q14 -12 21 1 q6 12 -8 15 q-11 2 -12 -8 q0 -7 7 -8" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.95" stroke-linecap="round"/></g>
