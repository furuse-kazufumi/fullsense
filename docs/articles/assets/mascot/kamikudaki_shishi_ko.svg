</g>

<!-- 神霊オーブ (AI に宿った神, 微細回路入り) -->
<g>
  <circle cx="262" cy="42" r="15" fill="#f6d365" opacity="0.32"/>
  <path d="M262 28 q6 -11 1 -20 q-5 8 -9 11 q5 3 8 9" fill="#f6d365" opacity="0.75"/>
