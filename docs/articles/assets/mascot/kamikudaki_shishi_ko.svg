  <line x1="265" y1="43" x2="261" y2="46" stroke="#fff" stroke-width="0.8"/>
</g>
<!-- ご利益スパークル -->
<polygon points="104,76 107,84 115,87 107,90 104,98 101,90 93,87 101,84" fill="#f0b429" opacity="0.9"/>
<polygon points="92,140 94,145 99,147 94,149 92,154 90,149 85,147 90,145" fill="#f0b429" opacity="0.85"/>

<g>
  <text x="465" y="118" font-family="'Hiragino Sans','Noto Sans CJK JP','Yu Gothic',Meiryo,sans-serif" font-size="38" font-weight="bold" fill="#b3322e">쉬운 설명판</text>
  <rect x="465" y="132" width="180" height="5" rx="2.5" fill="#e8b33a"/>
  <text x="465" y="172" font-family="'Hiragino Sans','Noto Sans CJK JP','Yu Gothic',Meiryo,sans-serif" font-size="19" fill="#3a3a3a">어려운 부분은 사자탈이 꼭꼭 씹어서</text><text x="465" y="199" font-family="'Hiragino Sans','Noto Sans CJK JP','Yu Gothic',Meiryo,sans-serif" font-size="19" fill="#3a3a3a">전해 드립니다.</text>
  <text x="465" y="247" font-family="'Hiragino Sans','Noto Sans CJK JP','Yu Gothic',Meiryo,sans-serif" font-size="14.5" fill="#7a6f5d">사자탈에 물리면 복이 온다고 하지요 —</text><text x="465" y="271" font-family="'Hiragino Sans','Noto Sans CJK JP','Yu Gothic',Meiryo,sans-serif" font-size="14.5" fill="#7a6f5d">이 사자에게 물린 독자에게는 「이해」라는 복이 옵니다.</text>
  <text x="465" y="296" font-family="'Hiragino Sans','Noto Sans CJK JP','Yu Gothic',Meiryo,sans-serif" font-size="12.5" fill="#a89f8d">FullSense KB・쉬운 설명 시리즈</text>
