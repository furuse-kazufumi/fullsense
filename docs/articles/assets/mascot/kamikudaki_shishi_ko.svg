<circle cx="231" cy="87" r="11" fill="#ffffff"/>
<circle cx="241" cy="107" r="11" fill="#ffffff"/>
<circle cx="245" cy="128" r="11" fill="#ffffff"/>
<circle cx="243" cy="149" r="11" fill="#ffffff"/>

