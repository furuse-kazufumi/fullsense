<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" role="img" aria-label="#24-01 theme: 4 层记忆 + surprise gate animated" style="width:100%;height:auto;max-width:1200px">
  <title>llive 4 层记忆 + Surprise Gate animation</title>
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="blur01"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <rect width="1000" height="300" fill="url(#bg01)"/>
  <text x="500" y="32" font-family="-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0" text-anchor="middle">「不会遗忘的 LLM」: 4 层记忆 + Bayesian Surprise Gate</text>

  <!-- Input -->
  <g transform="translate(50, 140)">
    <rect x="0" y="-20" width="120" height="40" rx="8" fill="#1e293b" stroke="#94a3b8"/>
    <text x="60" y="5" font-size="12" fill="#e2e8f0" text-anchor="middle">输入</text>
  </g>

  <!-- Surprise Gate (center diamond) -->
  <g transform="translate(280, 140)">
    <polygon points="0,-40 50,0 0,40 -50,0" fill="#1e293b" stroke="#fb923c" stroke-width="2"/>
    <text x="0" y="-4" font-size="11" fill="#fb923c" text-anchor="middle" font-weight="700">Surprise</text>
    <text x="0" y="10" font-size="11" fill="#fb923c" text-anchor="middle" font-weight="700">Gate</text>
    <circle r="60" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.4">
      <animate attributeName="r" values="50;70;50" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 4 memory layers (right side) -->
  <g font-family="-apple-system,sans-serif" font-size="11" font-weight="600">
    <g transform="translate(500, 70)">
      <rect width="180" height="44" rx="8" fill="#1e293b" stroke="#22c55e"/>
      <text x="14" y="20" fill="#22c55e">semantic</text>
      <text x="14" y="36" fill="#cbd5e1" font-size="10">Faiss IP / MiniLM 384d</text>
      <circle cx="170" cy="14" r="5" fill="#22c55e">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g transform="translate(500, 122)">
      <rect width="180" height="44" rx="8" fill="#1e293b" stroke="#22d3ee"/>
      <text x="14" y="20" fill="#22d3ee">episodic</text>
      <text x="14" y="36" fill="#cbd5e1" font-size="10">DuckDB append-only</text>
      <circle cx="170" cy="14" r="5" fill="#22d3ee">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.35s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g transform="translate(500, 174)">
      <rect width="180" height="44" rx="8" fill="#1e293b" stroke="#a78bfa"/>
      <text x="14" y="20" fill="#a78bfa">structural</text>
      <text x="14" y="36" fill="#cbd5e1" font-size="10">Kùzu graph</text>
      <circle cx="170" cy="14" r="5" fill="#a78bfa">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g transform="translate(500, 226)">
      <rect width="180" height="44" rx="8" fill="#1e293b" stroke="#f472b6"/>
      <text x="14" y="20" fill="#f472b6">parameter</text>
      <text x="14" y="36" fill="#cbd5e1" font-size="10">safetensors + SHA-256</text>
      <circle cx="170" cy="14" r="5" fill="#f472b6">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="1.05s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- Discarded (right edge) -->
  <g transform="translate(750, 140)">
    <rect x="0" y="-20" width="180" height="40" rx="8" fill="#1e293b" stroke="#64748b" stroke-dasharray="4 3"/>
    <text x="90" y="0" font-size="11" fill="#94a3b8" text-anchor="middle">θ 以下 → 不写入</text>
    <text x="90" y="14" font-size="9" fill="#64748b" text-anchor="middle">(故意遗忘)</text>
  </g>

  <!-- Particles flowing input → gate → memory -->
  <g fill="#fbbf24">
    <circle r="3">
      <animate attributeName="cx" values="170;230" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="140;140" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.2;0.8;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animate attributeName="cx" values="170;230" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="140;140" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.2;0.8;1" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animate attributeName="cx" values="170;230" dur="3s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="140;140" dur="3s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.2;0.8;1" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Gate → memory (green ok particles) + discarded (red x) -->
  <g>
    <circle r="3" fill="#22c55e">
      <animate attributeName="cx" values="330;500" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="140;92" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#22d3ee">
      <animate attributeName="cx" values="330;500" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="140;144" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#64748b">
      <animate attributeName="cx" values="330;750" dur="2s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="140;140" dur="2s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="500" y="288" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">只有 surprise (Bayesian surprise) ≥ θ 的内容写入 4 层, θ 以下故意遗忘</text>
</svg>
