<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" role="img" aria-label="4층 메모리 + Bayesian surprise gating" style="width:100%;height:auto;max-width:1200px">
  <title>llive #24-01 — 4층 메모리 + Bayesian surprise gating</title>
  <desc>sensory → episodic → semantic → parameter 의 4층 메모리에 Bayesian surprise gate 가 필터로 삽입된다. surprise 가 높은 input 만 깊은 층에 도달한다. SMIL-only animation.</desc>
  <defs>
    <linearGradient id="bg24_01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1426"/>
      <stop offset="100%" stop-color="#0a0f17"/>
    </linearGradient>
    <linearGradient id="senG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5dd1ff"/>
      <stop offset="100%" stop-color="#3a8dde"/>
    </linearGradient>
    <linearGradient id="epiG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7ee787"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
    <linearGradient id="semG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="paramG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef476f"/>
      <stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>
    <linearGradient id="gateG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="240" fill="url(#bg24_01)"/>

  <text x="400" y="32" text-anchor="middle" fill="#e6edf3"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="17" font-weight="700">
    잊지 않는 LLM — 4층 메모리와 Bayesian surprise gate
  </text>
  <text x="400" y="54" text-anchor="middle" fill="#94a3b8"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">
    sensory → episodic → semantic → parameter / surprise가 높은 것만 깊이 가라앉는다
  </text>

  <g font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#e6edf3">
    <!-- 4 layer stacked rounded rectangles, left aligned -->
    <g transform="translate(70 80)">
      <rect width="170" height="40" rx="6" fill="url(#senG)" opacity="0.85"/>
      <text x="85" y="25" text-anchor="middle" font-weight="600">sensory</text>
      <text x="-12" y="25" text-anchor="end" font-size="9" fill="#94a3b8">layer 0</text>
    </g>
    <g transform="translate(70 130)">
      <rect width="170" height="40" rx="6" fill="url(#epiG)" opacity="0.85"/>
      <text x="85" y="25" text-anchor="middle" font-weight="600">episodic</text>
      <text x="-12" y="25" text-anchor="end" font-size="9" fill="#94a3b8">layer 1</text>
    </g>
    <g transform="translate(70 180)">
      <rect width="170" height="40" rx="6" fill="url(#semG)" opacity="0.85"/>
      <text x="85" y="25" text-anchor="middle" font-weight="600">semantic</text>
      <text x="-12" y="25" text-anchor="end" font-size="9" fill="#94a3b8">layer 2</text>
    </g>

    <!-- Bayesian gate at center -->
    <g transform="translate(310 90)">
      <path d="M 0 60 L 80 0 L 160 60 L 80 120 Z" fill="url(#gateG)" opacity="0.6"/>
      <path d="M 0 60 L 80 0 L 160 60 L 80 120 Z" fill="none" stroke="#c084fc" stroke-width="1.4"/>
      <text x="80" y="50" text-anchor="middle" font-weight="700" fill="#fff">surprise</text>
      <text x="80" y="70" text-anchor="middle" font-size="10" fill="#fff">gate</text>
      <text x="80" y="88" text-anchor="middle" font-size="9" fill="#e6edf3" opacity="0.75">D_KL(post‖prior)</text>
    </g>

    <!-- Parameter layer (right side, "deepest") -->
    <g transform="translate(560 130)">
      <rect width="170" height="40" rx="6" fill="url(#paramG)" opacity="0.95"/>
      <text x="85" y="25" text-anchor="middle" font-weight="700" fill="#fff">parameter</text>
      <text x="180" y="25" font-size="9" fill="#94a3b8">layer 3 (가장 깊음)</text>
    </g>

    <!-- Flow particles -->
    <g>
      <!-- 6 input particles from left -->
      <circle r="5" fill="#5dd1ff">
        <animateMotion dur="6s" begin="0s" repeatCount="indefinite"
          path="M 30 100 L 260 100 L 320 130 L 470 150 L 560 150"/>
        <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.85;1" dur="6s" begin="0s" repeatCount="indefinite"/>
      </circle>
      <!-- Low surprise (rejected at gate) -->
      <circle r="5" fill="#7ee787">
        <animateMotion dur="6s" begin="0.8s" repeatCount="indefinite"
          path="M 30 150 L 260 150 L 390 150 L 390 220"/>
        <animate attributeName="opacity" values="0;1;1;0.3;0" keyTimes="0;0.1;0.55;0.7;1" dur="6s" begin="0.8s" repeatCount="indefinite"/>
      </circle>
      <!-- High surprise (passes gate) -->
      <circle r="5" fill="#ffd166">
        <animateMotion dur="6s" begin="1.6s" repeatCount="indefinite"
          path="M 30 200 L 260 200 L 320 150 L 470 150 L 560 150"/>
        <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.85;1" dur="6s" begin="1.6s" repeatCount="indefinite"/>
      </circle>
      <!-- Mid surprise (variable) -->
      <circle r="5" fill="#ef476f">
        <animateMotion dur="6s" begin="2.4s" repeatCount="indefinite"
          path="M 30 100 L 260 100 L 320 130 L 470 150 L 560 150"/>
        <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.85;1" dur="6s" begin="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle r="5" fill="#5dd1ff">
        <animateMotion dur="6s" begin="3.2s" repeatCount="indefinite"
          path="M 30 150 L 260 150 L 390 150 L 390 220"/>
        <animate attributeName="opacity" values="0;1;1;0.3;0" keyTimes="0;0.1;0.55;0.7;1" dur="6s" begin="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle r="5" fill="#7ee787">
        <animateMotion dur="6s" begin="4.0s" repeatCount="indefinite"
          path="M 30 200 L 260 200 L 320 150 L 470 150 L 560 150"/>
        <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.85;1" dur="6s" begin="4.0s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Gate threshold marker -->
    <g transform="translate(390 215)" font-size="9" fill="#94a3b8">
      <text x="0" y="0" text-anchor="middle">낮은 surprise → 망각</text>
    </g>

    <!-- Right side: deep memory annotation -->
    <g transform="translate(645 195)" font-size="9" fill="#94a3b8">
      <text x="0" y="0">high surprise</text>
      <text x="0" y="12">→ parameter에 기록</text>
    </g>
  </g>

  <text x="400" y="232" text-anchor="middle" fill="#64748b"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">
    LIM-08: Bayesian surprise gating (Itti &amp; Baldi 2006)으로 write efficiency를 최대화
  </text>

  <g id="llt-enrich" font-family="inherit" aria-hidden="true"><!-- llt-enrich: 言語中立・静止完成形・imgix安全な強化レイヤ --><path d="M 32.0 12.0 L 12.0 12.0 L 12.0 32.0" stroke="#38bdf8" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.55"><animate attributeName="opacity" values="0.55;0.9;0.55" dur="3.6s" begin="0.0s" repeatCount="indefinite"/></path><path d="M 768.0 12.0 L 788.0 12.0 L 788.0 32.0" stroke="#38bdf8" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.55"><animate attributeName="opacity" values="0.55;0.9;0.55" dur="3.6s" begin="0.4s" repeatCount="indefinite"/></path><path d="M 32.0 228.0 L 12.0 228.0 L 12.0 208.0" stroke="#38bdf8" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.55"><animate attributeName="opacity" values="0.55;0.9;0.55" dur="3.6s" begin="0.8s" repeatCount="indefinite"/></path><path d="M 768.0 228.0 L 788.0 228.0 L 788.0 208.0" stroke="#38bdf8" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.55"><animate attributeName="opacity" values="0.55;0.9;0.55" dur="3.6s" begin="1.2s" repeatCount="indefinite"/></path><circle cx="96.0" cy="72.0" r="2" fill="#38bdf8" opacity="0.38"><animateTransform attributeName="transform" type="translate" values="0 0; 8 -6; 0 0" dur="8.0s" begin="0.0s" repeatCount="indefinite" additive="sum"/><animate attributeName="opacity" values="0.38;0.6;0.38" dur="8.0s" begin="0.0s" repeatCount="indefinite"/></circle><circle cx="240.0" cy="163.2" r="3" fill="#38bdf8" opacity="0.38"><animateTransform attributeName="transform" type="translate" values="0 0; -8 6; 0 0" dur="9.5s" begin="0.7s" repeatCount="indefinite" additive="sum"/><animate attributeName="opacity" values="0.38;0.6;0.38" dur="9.5s" begin="0.7s" repeatCount="indefinite"/></circle><circle cx="400.0" cy="52.8" r="2" fill="#38bdf8" opacity="0.38"><animateTransform attributeName="transform" type="translate" values="0 0; 8 6; 0 0" dur="11.0s" begin="1.4s" repeatCount="indefinite" additive="sum"/><animate attributeName="opacity" values="0.38;0.6;0.38" dur="11.0s" begin="1.4s" repeatCount="indefinite"/></circle><circle cx="544.0" cy="177.6" r="3" fill="#38bdf8" opacity="0.38"><animateTransform attributeName="transform" type="translate" values="0 0; -8 -6; 0 0" dur="12.5s" begin="2.1s" repeatCount="indefinite" additive="sum"/><animate attributeName="opacity" values="0.38;0.6;0.38" dur="12.5s" begin="2.1s" repeatCount="indefinite"/></circle><circle cx="656.0" cy="96.0" r="2" fill="#38bdf8" opacity="0.38"><animateTransform attributeName="transform" type="translate" values="0 0; 8 6; 0 0" dur="8.0s" begin="2.8s" repeatCount="indefinite" additive="sum"/><animate attributeName="opacity" values="0.38;0.6;0.38" dur="8.0s" begin="2.8s" repeatCount="indefinite"/></circle><circle cx="736.0" cy="144.0" r="3" fill="#38bdf8" opacity="0.38"><animateTransform attributeName="transform" type="translate" values="0 0; -8 6; 0 0" dur="9.5s" begin="3.5s" repeatCount="indefinite" additive="sum"/><animate attributeName="opacity" values="0.38;0.6;0.38" dur="9.5s" begin="3.5s" repeatCount="indefinite"/></circle><rect x="0" y="237.0" width="800.0" height="1.5" fill="#38bdf8" opacity="0.18"/><rect x="0" y="237.0" width="144.0" height="1.5" fill="#38bdf8" opacity="0.75"><animate attributeName="x" values="-144.0;800.0" dur="5s" repeatCount="indefinite"/></rect></g>
</svg>
