<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 32" role="img" aria-label="section separator (animated ribbon)" style="width:100%;height:auto;max-width:1200px">
  <title>Section separator — animated ribbon pulse</title>
  <defs>
    <linearGradient id="sepGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <line x1="0" y1="16" x2="1000" y2="16" stroke="#334155" stroke-width="1"/>
  <rect x="0" y="14" width="200" height="4" rx="2" fill="url(#sepGrad)">
    <animate attributeName="x" from="-200" to="1000" dur="4s" repeatCount="indefinite"/>
  </rect>
  <circle cx="100" cy="16" r="4" fill="#22d3ee">
    <animate attributeName="cx" values="0;1000" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="16" r="3" fill="#a78bfa">
    <animate attributeName="cx" values="0;1000" dur="6s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="6s" begin="1s" repeatCount="indefinite"/>
  </circle>
</svg>
