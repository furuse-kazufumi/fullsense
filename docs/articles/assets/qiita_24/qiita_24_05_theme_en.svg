<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" role="img" aria-label="#24-05 theme: v0.E derived-population evolution (Genome + generational turnover)" style="width:100%;height:auto;max-width:1200px">
  <title>v0.E coevolution: population evolution + generational turnover animation</title>
  <rect width="1000" height="320" fill="#0f172a"/>
  <text x="500" y="28" font-family="-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0" text-anchor="middle">"The Population that Learns": v0.B/C/D/E derived-population evolution + SegmentCrossover</text>

  <!-- Generation 1 → 2 → 3 → 4 with population evolving -->
  <g font-family="-apple-system,sans-serif">
    <text x="60" y="62" font-size="11" fill="#94a3b8">Gen 1</text>
    <text x="280" y="62" font-size="11" fill="#94a3b8">Gen 2</text>
    <text x="500" y="62" font-size="11" fill="#94a3b8">Gen 3</text>
    <text x="720" y="62" font-size="11" fill="#94a3b8">Gen 4</text>

    <!-- Generation 1: 6 individuals with random fitness colors -->
    <g transform="translate(60, 80)">
      <circle cx="0"  cy="0"  r="12" fill="#64748b"><animate attributeName="opacity" values="1;0.3;1" dur="6s" repeatCount="indefinite"/></circle>
      <circle cx="34" cy="0"  r="12" fill="#fb923c"><animate attributeName="opacity" values="1;0.3;1" dur="6s" repeatCount="indefinite"/></circle>
      <circle cx="0"  cy="34" r="12" fill="#a78bfa"><animate attributeName="opacity" values="1;0.3;1" dur="6s" repeatCount="indefinite"/></circle>
      <circle cx="34" cy="34" r="12" fill="#22d3ee"><animate attributeName="opacity" values="1;0.3;1" dur="6s" repeatCount="indefinite"/></circle>
      <circle cx="0"  cy="68" r="12" fill="#f472b6"><animate attributeName="opacity" values="1;0.3;1" dur="6s" repeatCount="indefinite"/></circle>
      <circle cx="34" cy="68" r="12" fill="#475569"><animate attributeName="opacity" values="1;0.3;1" dur="6s" repeatCount="indefinite"/></circle>
    </g>

    <!-- Generation 2: selection survivors -->
    <g transform="translate(280, 80)">
      <circle cx="0"  cy="0"  r="13" fill="#fb923c"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="1s" repeatCount="indefinite"/></circle>
      <circle cx="34" cy="0"  r="13" fill="#22d3ee"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="1s" repeatCount="indefinite"/></circle>
      <circle cx="0"  cy="34" r="13" fill="#fb923c"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="1s" repeatCount="indefinite"/></circle>
      <circle cx="34" cy="34" r="13" fill="#22c55e"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="1s" repeatCount="indefinite"/></circle>
      <circle cx="0"  cy="68" r="13" fill="#a78bfa"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="1s" repeatCount="indefinite"/></circle>
      <circle cx="34" cy="68" r="13" fill="#22d3ee"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="1s" repeatCount="indefinite"/></circle>
    </g>

    <!-- Generation 3: more green (fitness converging) -->
    <g transform="translate(500, 80)">
      <circle cx="0"  cy="0"  r="14" fill="#22c55e"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="2s" repeatCount="indefinite"/></circle>
      <circle cx="34" cy="0"  r="14" fill="#fb923c"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="2s" repeatCount="indefinite"/></circle>
      <circle cx="0"  cy="34" r="14" fill="#22c55e"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="2s" repeatCount="indefinite"/></circle>
      <circle cx="34" cy="34" r="14" fill="#22c55e"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="2s" repeatCount="indefinite"/></circle>
      <circle cx="0"  cy="68" r="14" fill="#22d3ee"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="2s" repeatCount="indefinite"/></circle>
      <circle cx="34" cy="68" r="14" fill="#22c55e"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="2s" repeatCount="indefinite"/></circle>
    </g>

    <!-- Generation 4: nearly all green, fittest -->
    <g transform="translate(720, 80)">
      <circle cx="0"  cy="0"  r="16" fill="#22c55e"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="3s" repeatCount="indefinite"/></circle>
      <circle cx="34" cy="0"  r="16" fill="#22c55e"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="3s" repeatCount="indefinite"/></circle>
      <circle cx="0"  cy="34" r="16" fill="#22c55e"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="3s" repeatCount="indefinite"/></circle>
      <circle cx="34" cy="34" r="16" fill="#22c55e"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="3s" repeatCount="indefinite"/></circle>
      <circle cx="0"  cy="68" r="16" fill="#22c55e"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="3s" repeatCount="indefinite"/></circle>
      <circle cx="34" cy="68" r="16" fill="#22c55e"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="3s" repeatCount="indefinite"/></circle>
    </g>

    <!-- Crossover arrows between generations -->
    <g stroke="#22d3ee" stroke-width="1.5" fill="none">
      <path d="M 130 114 Q 200 70, 280 114" stroke-dasharray="3 3"><animate attributeName="stroke-dashoffset" from="0" to="-12" dur="0.6s" repeatCount="indefinite"/></path>
      <path d="M 350 114 Q 420 70, 500 114" stroke-dasharray="3 3"><animate attributeName="stroke-dashoffset" from="0" to="-12" dur="0.6s" repeatCount="indefinite"/></path>
      <path d="M 570 114 Q 640 70, 720 114" stroke-dasharray="3 3"><animate attributeName="stroke-dashoffset" from="0" to="-12" dur="0.6s" repeatCount="indefinite"/></path>
    </g>
  </g>

  <!-- Fitness curve below -->
  <g transform="translate(80, 220)" font-family="-apple-system,sans-serif">
    <text x="0" y="-8" font-size="11" fill="#a5b4fc">population mean fitness (over generations)</text>
    <line x1="0" y1="60" x2="800" y2="60" stroke="#334155"/>
    <line x1="0" y1="0"  x2="0"  y2="60" stroke="#334155"/>
    <path d="M 0 50 Q 200 40, 280 32 Q 460 22, 540 16 Q 720 8, 800 4" stroke="#22c55e" stroke-width="2" fill="none">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
    </path>
    <text x="800" y="-2" font-size="9" fill="#22c55e" text-anchor="end">+40% improvement (30 individuals × 12 generations)</text>
  </g>

  <text x="500" y="302" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">SegmentCrossover swaps gene segments, Tournament culls, and the whole population converges in fitness over generations</text>
</svg>
