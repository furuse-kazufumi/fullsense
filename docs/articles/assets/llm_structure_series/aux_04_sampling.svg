<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Segoe UI','Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif">
  <!-- 静的表示: authored=最終可視。SMIL/reveal-gate 不使用。赤緑の善悪対比なし。 -->
  <defs>
    <marker id="asp" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6a86"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#f7f9fc"/>

  <!-- title band -->
  <rect x="0" y="0" width="960" height="78" fill="#1f2a44"/>
  <text x="40" y="42" fill="#ffffff" font-size="24" font-weight="700">同じ分布から、どう一語を選ぶか ― サンプリング</text>
  <text x="40" y="66" fill="#aebacc" font-size="15">重みは同じ。選び方（温度・top-p）を変えると、出力の性格が変わる。</text>

  <!-- === left: next-token distribution === -->
  <g>
    <rect x="40" y="110" width="400" height="270" rx="14" fill="#ffffff" stroke="#c9d3e2" stroke-width="2"/>
    <text x="60" y="140" fill="#1f2a44" font-size="16" font-weight="700">次トークンの確率分布（例）</text>

    <!-- baseline -->
    <line x1="72" y1="350" x2="416" y2="350" stroke="#c9d3e2" stroke-width="1.5"/>

    <!-- bars -->
    <rect x="80" y="190" width="48" height="160" fill="#2f6fb0" opacity="0.85" stroke="#d99a2b" stroke-width="2.5"/>
    <rect x="148" y="322" width="48" height="28" fill="#2f6fb0" opacity="0.55"/>
    <rect x="216" y="326" width="48" height="24" fill="#2f6fb0" opacity="0.5"/>
    <rect x="284" y="332" width="48" height="18" fill="#2f6fb0" opacity="0.42"/>
    <rect x="352" y="336" width="48" height="14" fill="#2f6fb0" opacity="0.36"/>

    <!-- percent labels -->
    <text x="104" y="182" text-anchor="middle" fill="#1f2a44" font-size="13" font-weight="700">40%</text>
    <text x="172" y="314" text-anchor="middle" fill="#41506a" font-size="12">6%</text>
    <text x="240" y="318" text-anchor="middle" fill="#41506a" font-size="12">5%</text>
    <text x="308" y="324" text-anchor="middle" fill="#41506a" font-size="12">4%</text>
    <text x="376" y="328" text-anchor="middle" fill="#41506a" font-size="12">他</text>

    <!-- token labels -->
    <text x="104" y="368" text-anchor="middle" fill="#1f2a44" font-size="11">東京</text>
    <text x="172" y="368" text-anchor="middle" fill="#41506a" font-size="11">京都</text>
    <text x="240" y="368" text-anchor="middle" fill="#41506a" font-size="11">大阪</text>
    <text x="308" y="368" text-anchor="middle" fill="#41506a" font-size="11">名古屋</text>
    <text x="376" y="368" text-anchor="middle" fill="#41506a" font-size="11">その他</text>
  </g>

  <!-- === right-top: greedy === -->
  <g>
    <rect x="470" y="110" width="450" height="120" rx="12" fill="#eaf1fb" stroke="#2f6fb0" stroke-width="2"/>
    <text x="490" y="142" fill="#1f2a44" font-size="17" font-weight="700">温度 0 ／ 貪欲法(greedy)</text>
    <text x="490" y="172" fill="#41506a" font-size="14">いつも最大確率の一語を選ぶ</text>
    <text x="490" y="200" fill="#41506a" font-size="13">→ 例では「東京」。毎回同じ＝決定論的</text>
  </g>

  <!-- === right-bottom: temperature / top-p === -->
  <g>
    <rect x="470" y="250" width="450" height="130" rx="12" fill="#e6f2ee" stroke="#3aa0a0" stroke-width="2"/>
    <text x="490" y="282" fill="#1f2a44" font-size="17" font-weight="700">温度・核サンプリング(top-p)</text>
    <text x="490" y="310" fill="#41506a" font-size="14">分布から確率に応じて一語を抽出</text>
    <text x="490" y="334" fill="#41506a" font-size="13">温度：小→尖る（堅実） 大→平ら（多様）</text>
    <text x="490" y="358" fill="#41506a" font-size="13">top-p：上位を合計 p まで残し、裾を捨てる</text>
  </g>

  <!-- === bottom takeaway === -->
  <rect x="40" y="404" width="880" height="92" rx="12" fill="#ffffff" stroke="#c9d3e2" stroke-width="2"/>
  <rect x="40" y="404" width="9" height="92" rx="4" fill="#d99a2b"/>
  <text x="64" y="438" fill="#1f2a44" font-size="16" font-weight="700">選び方を変えても、賢さ（重み）は変わらない</text>
  <text x="64" y="470" fill="#41506a" font-size="14">変わるのは出力の性格だけ。温度 0（貪欲法）は毎回同じ出力になる。</text>

  <!-- footer -->
  <text x="480" y="524" text-anchor="middle" fill="#6b7688" font-size="13">シリーズ「作って分かった LLM の中身」第4回 ― サンプリング（温度・top-p）</text>
</svg>
