<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="学習と推論 hero ― 次の一語を当てる練習を膨大に繰り返し、賢さが重みに宿る" style="width:100%;height:auto;max-width:1200px" font-family="'Segoe UI','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif">
  <title>なぜ「事前学習済み」が効くのか ― 学習と推論（第04回）</title>
  <desc>次の一語を予測 → 誤差(loss)を測る → 重みを直す の校正ループを何十億回くり返すと、学習済みの重みに賢さが宿る。静的表示・赤緑の善悪対比なし。</desc>
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="ribbon04" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3aa0a0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3aa0a0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3aa0a0" stop-opacity="0"/>
    </linearGradient>
    <marker id="ah04" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="ahg04" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#3a6a53"/>
    </marker>
  </defs>

  <rect width="1200" height="360" fill="url(#bg04)"/>

  <!-- title -->
  <text x="600" y="44" text-anchor="middle" fill="#e2e8f0" font-size="26" font-weight="700">なぜ「事前学習済み」が効くのか ― 学習と推論</text>
  <text x="600" y="72" text-anchor="middle" fill="#94a3b8" font-size="14">次の一語を当てる練習を、膨大に繰り返す。すると賢さが「重み(weights)」に宿る。</text>

  <!-- accent ribbon (static, subtle animated highlight) -->
  <rect x="0" y="88" width="1200" height="2" fill="url(#ribbon04)"/>

  <!-- === training loop (left) === -->
  <text x="385" y="120" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="600">学習ループ ＝ 校正ループ（測って、少し直す）</text>

  <!-- stage A: predict -->
  <g>
    <rect x="50" y="150" width="190" height="72" rx="12" fill="#0f172a" stroke="#2f6fb0" stroke-width="1.6"/>
    <text x="145" y="184" text-anchor="middle" fill="#8fbbe6" font-size="16" font-weight="700">① 次の一語を予測</text>
    <text x="145" y="206" text-anchor="middle" fill="#94a3b8" font-size="12">predict next token</text>
  </g>
  <!-- stage B: loss -->
  <g>
    <rect x="290" y="150" width="190" height="72" rx="12" fill="#0f172a" stroke="#3aa0a0" stroke-width="1.6"/>
    <text x="385" y="184" text-anchor="middle" fill="#7fd0d0" font-size="17" font-weight="700">② 誤差(loss)を測る</text>
    <text x="385" y="206" text-anchor="middle" fill="#94a3b8" font-size="12">measure the error</text>
  </g>
  <!-- stage C: fix weights -->
  <g>
    <rect x="530" y="150" width="190" height="72" rx="12" fill="#0f172a" stroke="#d99a2b" stroke-width="1.6"/>
    <text x="625" y="184" text-anchor="middle" fill="#e6b968" font-size="17" font-weight="700">③ 重みを直す</text>
    <text x="625" y="206" text-anchor="middle" fill="#94a3b8" font-size="12">adjust weights</text>
  </g>

  <!-- forward arrows -->
  <g stroke="#94a3b8" stroke-width="2.2" marker-end="url(#ah04)">
    <line x1="242" y1="186" x2="286" y2="186"/>
    <line x1="482" y1="186" x2="526" y2="186"/>
  </g>

  <!-- return loop arrow -->
  <path d="M625,222 L625,268 L145,268 L145,224" fill="none" stroke="#3aa0a0" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#ah04)">
    <animate attributeName="stroke-dashoffset" from="0" to="-26" dur="1.3s" repeatCount="indefinite"/>
  </path>
  <text x="385" y="288" text-anchor="middle" fill="#94a3b8" font-size="13">採点つき穴埋めドリルを ×数十億回</text>

  <!-- transition to weights -->
  <text x="758" y="176" text-anchor="middle" fill="#94a3b8" font-size="12">下げ止まったら</text>
  <line x1="722" y1="186" x2="792" y2="186" stroke="#3a6a53" stroke-width="2.4" marker-end="url(#ahg04)"/>

  <!-- weights panel (right) -->
  <g>
    <rect x="800" y="120" width="350" height="150" rx="14" fill="#0f172a" stroke="#3a6a53" stroke-width="1.6"/>
    <text x="824" y="152" fill="#cbd5e1" font-size="16" font-weight="700">学習済みの重み (weights)</text>
    <text x="824" y="176" fill="#94a3b8" font-size="12">巨大な事前学習でしか入らない</text>
    <text x="824" y="216" fill="#e2e8f0" font-size="23" font-weight="800">賢さはここに宿る</text>
    <text x="824" y="246" fill="#7fd0d0" font-size="12">個人の計算力では届かない規模</text>
    <!-- param dots (billions of weights) -->
    <g fill="#3a6a53" opacity="0.55">
      <circle cx="1052" cy="150" r="3"/><circle cx="1077" cy="150" r="3"/><circle cx="1102" cy="150" r="3"/><circle cx="1127" cy="150" r="3"/>
      <circle cx="1052" cy="176" r="3"/><circle cx="1077" cy="176" r="3"/><circle cx="1102" cy="176" r="3"/><circle cx="1127" cy="176" r="3"/>
      <circle cx="1052" cy="202" r="3"/><circle cx="1077" cy="202" r="3"/><circle cx="1102" cy="202" r="3"/><circle cx="1127" cy="202" r="3"/>
      <circle cx="1052" cy="228" r="3"/><circle cx="1077" cy="228" r="3"/><circle cx="1102" cy="228" r="3"/><circle cx="1127" cy="228" r="3"/>
    </g>
  </g>

  <!-- footer -->
  <text x="40" y="344" fill="#64748b" font-size="12">シリーズ「作って分かった LLM の中身 ― 自作言語モデルで覗く構造」</text>
  <text x="1160" y="344" text-anchor="end" fill="#94a3b8" font-size="12">第04回 学習と推論</text>
</svg>
