<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Segoe UI','Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif">
  <!-- 静的表示: authored=最終可視状態。SMIL/reveal-gate 不使用。赤緑の善悪対比なし。 -->
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6a86"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#f7f9fc"/>

  <!-- title band -->
  <rect x="0" y="0" width="960" height="80" fill="#1f2a44"/>
  <text x="40" y="42" fill="#ffffff" font-size="24" font-weight="700">順伝播層(FFN)の中身 ― SwiGLU「広げて畳む」</text>
  <text x="40" y="66" fill="#aebacc" font-size="14">門番の枝(SiLU)で開閉を決め、素材の枝に掛け合わせ、広げて畳んで戻す</text>

  <!-- master formula -->
  <text x="480" y="112" fill="#1f2a44" font-size="16" font-weight="700" text-anchor="middle" font-family="'Consolas','SFMono-Regular',monospace">SwiGLU_FFN(x) = W_down · ( SiLU(W_gate·x) ⊙ (W_up·x) )</text>

  <!-- Input x (dim d) -->
  <g>
    <rect x="36" y="253" width="96" height="64" rx="12" fill="#ffffff" stroke="#c9d3e2" stroke-width="2"/>
    <text x="84" y="280" fill="#1f2a44" font-size="17" font-weight="700" text-anchor="middle">入力 x</text>
    <text x="84" y="302" fill="#41506a" font-size="11" text-anchor="middle">hidden 次元 d</text>
  </g>
  <path d="M132,270 L172,210" stroke="#5b6a86" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <path d="M132,300 L172,360" stroke="#5b6a86" stroke-width="2" fill="none" marker-end="url(#ar)"/>

  <!-- hidden-dim hint -->
  <text x="281" y="150" fill="#6b7688" font-size="11" text-anchor="middle">中間次元 h に広げる（h は d の数倍）</text>

  <!-- gate branch (SiLU) -->
  <g>
    <rect x="176" y="160" width="210" height="86" rx="12" fill="#eaf1fb" stroke="#2f6fb0" stroke-width="2.5"/>
    <text x="281" y="198" fill="#1f2a44" font-size="14" font-weight="700" text-anchor="middle" font-family="'Consolas','SFMono-Regular',monospace">SiLU(W_gate · x)</text>
    <text x="281" y="220" fill="#2f6fb0" font-size="11.5" text-anchor="middle">門番：どれだけ通すか(0〜1)</text>
  </g>

  <!-- up branch (material) -->
  <g>
    <rect x="176" y="324" width="210" height="86" rx="12" fill="#e6f2ee" stroke="#3aa0a0" stroke-width="2.5"/>
    <text x="281" y="362" fill="#1f2a44" font-size="14" font-weight="700" text-anchor="middle" font-family="'Consolas','SFMono-Regular',monospace">W_up · x</text>
    <text x="281" y="384" fill="#2f7f7f" font-size="11.5" text-anchor="middle">素材：通す中身</text>
  </g>

  <!-- elementwise product -->
  <path d="M386,205 L448,266" stroke="#5b6a86" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <path d="M386,360 L448,304" stroke="#5b6a86" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <text x="470" y="250" fill="#41506a" font-size="12" text-anchor="middle">掛け合わせ</text>
  <circle cx="470" cy="285" r="30" fill="#fdeede" stroke="#d99a2b" stroke-width="2.5"/>
  <text x="470" y="296" fill="#1f2a44" font-size="28" font-weight="700" text-anchor="middle">⊙</text>
  <text x="470" y="338" fill="#a5701a" font-size="11.5" text-anchor="middle">（要素ごとの積）</text>

  <!-- down projection -->
  <path d="M500,285 L558,285" stroke="#5b6a86" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <g>
    <rect x="560" y="253" width="150" height="64" rx="12" fill="#eef3f0" stroke="#3a6a53" stroke-width="2.5"/>
    <text x="635" y="282" fill="#1f2a44" font-size="14" font-weight="700" text-anchor="middle" font-family="'Consolas','SFMono-Regular',monospace">W_down</text>
    <text x="635" y="304" fill="#3a6a53" font-size="11.5" text-anchor="middle">畳んで d に戻す</text>
  </g>

  <!-- output -->
  <path d="M710,285 L738,285" stroke="#5b6a86" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <g>
    <rect x="740" y="253" width="110" height="64" rx="12" fill="#ffffff" stroke="#c9d3e2" stroke-width="2"/>
    <text x="795" y="282" fill="#1f2a44" font-size="17" font-weight="700" text-anchor="middle">出力</text>
    <text x="795" y="304" fill="#41506a" font-size="12" text-anchor="middle">(次元 d)</text>
  </g>

  <!-- bottom-left note: widen then fold -->
  <g>
    <rect x="40" y="430" width="430" height="86" rx="10" fill="#ffffff" stroke="#c9d3e2" stroke-width="2"/>
    <text x="60" y="456" fill="#1f2a44" font-size="14" font-weight="700">広げて畳む</text>
    <text x="60" y="480" fill="#41506a" font-size="12">d を中間次元 h（数倍）に広げ、非線形で捏ね、また d に畳む</text>
    <text x="60" y="500" fill="#41506a" font-size="12">h は d の数倍。高次元で非線形に捏ねる。</text>
  </g>

  <!-- bottom-right note: knowledge store + honest -->
  <g>
    <rect x="490" y="430" width="430" height="86" rx="10" fill="#eef3f0" stroke="#cdd8e6" stroke-width="2"/>
    <text x="510" y="456" fill="#1f2a44" font-size="14" font-weight="700">知識の貯蔵庫</text>
    <text x="510" y="480" fill="#41506a" font-size="12">パラメータの多くが 3 枚の行列に集中</text>
    <text x="510" y="500" fill="#6b7688" font-size="11.5">※ なぜ最良かは理論でなく経験則（多くのモデルで良かった）</text>
  </g>

  <text x="480" y="530" fill="#6b7688" font-size="13" text-anchor="middle">シリーズ「作って分かった LLM の中身」#3 補助図 ― SwiGLU ゲート付き順伝播層</text>
</svg>
