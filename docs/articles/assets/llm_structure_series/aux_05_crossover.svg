<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Segoe UI','Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif">
  <!-- 静的表示: authored=最終可視。SMIL/reveal-gate 不使用。赤緑の善悪対比なし。数値はキット§4第5章の実測値のみ。 -->
  <defs>
    <linearGradient id="bgx" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eef2f8"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bgx)"/>

  <!-- Title band -->
  <rect x="0" y="0" width="960" height="78" fill="#1f2a44"/>
  <text x="40" y="38" fill="#ffffff" font-size="25" font-weight="700">線形化の損益分岐 ― 交差点 ≈ 227 トークン</text>
  <text x="40" y="64" fill="#aebacc" font-size="14">softmax KV は文脈長に比例（1024 B/トークン）、線形状態は 232,960 B で一定。</text>

  <!-- ===== Left: chart card ===== -->
  <rect x="32" y="98" width="596" height="392" rx="14" fill="#ffffff" stroke="#d5dde8" stroke-width="2"/>
  <text x="52" y="126" fill="#1f2a44" font-size="15" font-weight="700">メモリ／層（KB, 1KB=1024B）― T が小さい近景を拡大</text>

  <!-- shaded zone: T < 227 では定数状態が大きい -->
  <rect x="108" y="140" width="109" height="290" fill="#3aa0a0" opacity="0.07"/>

  <!-- y grid + ticks (0..1024 KB) -->
  <g stroke="#e4e9f1" stroke-width="1">
    <line x1="108" y1="430" x2="600" y2="430"/>
    <line x1="108" y1="362.5" x2="600" y2="362.5"/>
    <line x1="108" y1="295" x2="600" y2="295"/>
    <line x1="108" y1="227.5" x2="600" y2="227.5"/>
    <line x1="108" y1="160" x2="600" y2="160"/>
  </g>
  <g fill="#6b7688" font-size="12" text-anchor="end">
    <text x="100" y="434">0</text>
    <text x="100" y="366.5">256</text>
    <text x="100" y="299">512</text>
    <text x="100" y="231.5">768</text>
    <text x="100" y="164">1024</text>
  </g>
  <text x="108" y="132" fill="#6b7688" font-size="11" text-anchor="middle">KB</text>

  <!-- axes -->
  <line x1="108" y1="140" x2="108" y2="430" stroke="#8a93a6" stroke-width="2"/>
  <line x1="108" y1="430" x2="600" y2="430" stroke="#8a93a6" stroke-width="2"/>

  <!-- x ticks (T) -->
  <g fill="#6b7688" font-size="12" text-anchor="middle">
    <text x="108" y="448">0</text>
    <text x="354" y="448">512</text>
    <text x="600" y="448">1024</text>
  </g>
  <text x="217" y="448" fill="#2f7d7d" font-size="12" font-weight="700" text-anchor="middle">227</text>
  <text x="354" y="478" fill="#41506a" font-size="13" text-anchor="middle">文脈長 T（トークン）</text>

  <!-- constant-state flat line (teal, 232,960 B ≈ 227.5 KB) -->
  <line x1="108" y1="370" x2="600" y2="370" stroke="#3aa0a0" stroke-width="3"/>
  <circle cx="108" cy="370" r="4" fill="#3aa0a0"/>
  <circle cx="600" cy="370" r="4" fill="#3aa0a0"/>
  <text x="120" y="362" fill="#2f7d7d" font-size="12">線形状態 232,960 B（一定・O(1)）</text>

  <!-- softmax KV cache line (blue, linear O(T)) -->
  <polyline points="108,430 600,160" fill="none" stroke="#2f6fb0" stroke-width="3.5"/>
  <circle cx="108" cy="430" r="5" fill="#2f6fb0"/>
  <circle cx="354" cy="295" r="5" fill="#2f6fb0"/>
  <circle cx="600" cy="160" r="5.5" fill="#2f6fb0"/>
  <text x="390" y="250" fill="#2f6fb0" font-size="15" font-weight="700" text-anchor="middle" transform="rotate(-29 390 250)">softmax KV：1024 B/トークン（O(T)）</text>

  <!-- crossover marker -->
  <line x1="217" y1="250" x2="217" y2="430" stroke="#2f7d7d" stroke-width="1.5" stroke-dasharray="5 4"/>
  <circle cx="217" cy="370" r="5" fill="#2f7d7d"/>

  <!-- crossover callout (upper-left empty area of plot) -->
  <rect x="126" y="176" width="250" height="74" rx="8" fill="#eef6f6" stroke="#3aa0a0" stroke-width="1.5"/>
  <text x="140" y="202" fill="#1f2a44" font-size="14" font-weight="700">交差点 ≈ 227 トークン</text>
  <text x="140" y="224" fill="#41506a" font-size="12">232,960 B ÷ 1024 B/tok ≈ 227</text>
  <text x="140" y="242" fill="#6b7688" font-size="11.5">← 左（短い文脈）は定数状態が大きい</text>

  <!-- ===== Right: annotation cards ===== -->
  <!-- R1: long-context win / 36x -->
  <rect x="652" y="98" width="276" height="118" rx="12" fill="#ffffff" stroke="#d5dde8" stroke-width="2"/>
  <rect x="652" y="98" width="276" height="30" rx="12" fill="#2f6fb0"/>
  <rect x="652" y="114" width="276" height="14" fill="#2f6fb0"/>
  <text x="668" y="119" fill="#ffffff" font-size="14" font-weight="700">長文脈ほど線形状態が効く</text>
  <text x="668" y="150" fill="#1f2a44" font-size="12.5">T=8192: softmax KV 8,388,608 B</text>
  <text x="668" y="172" fill="#1f2a44" font-size="12.5">線形状態 232,960 B ＝ <tspan font-weight="700">36×</tspan></text>
  <text x="668" y="196" fill="#41506a" font-size="12.5">O(T) → O(1) の開き</text>

  <!-- R2: crossover -->
  <rect x="652" y="228" width="276" height="110" rx="12" fill="#ffffff" stroke="#d5dde8" stroke-width="2"/>
  <rect x="652" y="228" width="276" height="30" rx="12" fill="#3aa0a0"/>
  <rect x="652" y="244" width="276" height="14" fill="#3aa0a0"/>
  <text x="668" y="249" fill="#ffffff" font-size="14" font-weight="700">でも交差点 ≈ 227 トークン</text>
  <text x="668" y="281" fill="#1f2a44" font-size="12.5">232,960 B ÷ 1024 B/tok ≈ 227</text>
  <text x="668" y="303" fill="#1f2a44" font-size="12.5">227 tok より短いと</text>
  <text x="668" y="323" fill="#41506a" font-size="12.5">定数状態の方が大きい。</text>

  <!-- R3: implication -->
  <rect x="652" y="350" width="276" height="140" rx="12" fill="#ffffff" stroke="#d5dde8" stroke-width="2"/>
  <rect x="652" y="350" width="276" height="30" rx="12" fill="#d99a2b"/>
  <rect x="652" y="366" width="276" height="14" fill="#d99a2b"/>
  <text x="668" y="371" fill="#ffffff" font-size="14" font-weight="700">含意：測ってから選ぶ</text>
  <text x="668" y="404" fill="#1f2a44" font-size="12.5">線形化は「常に軽い」では</text>
  <text x="668" y="424" fill="#1f2a44" font-size="12.5">ない。短文脈ではむしろ損。</text>
  <text x="668" y="452" fill="#41506a" font-size="12.5">交差点を測ってから</text>
  <text x="668" y="472" fill="#41506a" font-size="12.5">適用範囲を決める。</text>

  <!-- Footer -->
  <text x="480" y="520" fill="#6b7688" font-size="13" text-anchor="middle">線形化＝長文脈でだけ軽い。交差点（≈227 トークン）と 36×（T=8192）を測ってから選ぶ。</text>
</svg>
