<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Segoe UI','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif">
  <!-- 静的表示: authored=最終可視。SMIL不使用。赤緑の善悪対比なし。 -->
  <rect width="960" height="540" fill="#f7f9fc"/>

  <!-- title band -->
  <rect x="0" y="0" width="960" height="78" fill="#1f2a44"/>
  <text x="40" y="38" fill="#ffffff" font-size="25" font-weight="700">テンプレートマッチング ＝ 注意スコア（内積で探す）</text>
  <text x="40" y="64" fill="#aebacc" font-size="15">画像で「似た形」を探す操作と、語で「似た意味」を探すのは、同じ内積（掛けて足す）。</text>

  <!-- ===== left panel: image processing ===== -->
  <rect x="36" y="98" width="414" height="352" rx="12" fill="#ffffff" stroke="#c9d3e2" stroke-width="2"/>
  <text x="56" y="130" fill="#1f2a44" font-size="16" font-weight="700">画像処理：テンプレートマッチング</text>

  <text x="56" y="174" fill="#1f2a44" font-size="13" font-weight="700">① 探す形（テンプレート）</text>
  <rect x="300" y="152" width="52" height="40" rx="6" fill="#e6f2ee" stroke="#3aa0a0" stroke-width="2"/>
  <rect x="312" y="162" width="28" height="20" rx="3" fill="#3aa0a0" opacity="0.40"/>

  <text x="56" y="216" fill="#1f2a44" font-size="13" font-weight="700">② 画像上をずらして掛けて足す</text>

  <text x="56" y="258" fill="#1f2a44" font-size="13" font-weight="700">③ 相関マップにピークが立つ</text>
  <g>
    <rect x="60" y="272" width="26" height="26" fill="#3aa0a0" opacity="0.20"/>
    <rect x="86" y="272" width="26" height="26" fill="#3aa0a0" opacity="0.34"/>
    <rect x="112" y="272" width="26" height="26" fill="#3aa0a0" opacity="0.22"/>
    <rect x="138" y="272" width="26" height="26" fill="#3aa0a0" opacity="0.92"/>
    <rect x="164" y="272" width="26" height="26" fill="#3aa0a0" opacity="0.30"/>
    <rect x="190" y="272" width="26" height="26" fill="#3aa0a0" opacity="0.18"/>
    <rect x="60" y="298" width="26" height="26" fill="#3aa0a0" opacity="0.16"/>
    <rect x="86" y="298" width="26" height="26" fill="#3aa0a0" opacity="0.26"/>
    <rect x="112" y="298" width="26" height="26" fill="#3aa0a0" opacity="0.44"/>
    <rect x="138" y="298" width="26" height="26" fill="#3aa0a0" opacity="0.40"/>
    <rect x="164" y="298" width="26" height="26" fill="#3aa0a0" opacity="0.22"/>
    <rect x="190" y="298" width="26" height="26" fill="#3aa0a0" opacity="0.18"/>
  </g>
  <text x="60" y="348" fill="#41506a" font-size="12">ピーク ＝ いちばん似た位置</text>
  <text x="60" y="384" fill="#2f7f7f" font-size="12" font-weight="600">＝ 掛けて足す（相互相関）で一致を探す</text>
  <text x="60" y="416" fill="#6b7688" font-size="11">画像を候補位置でずらし、重なった画素を掛けて足す。</text>

  <!-- ===== right panel: attention ===== -->
  <rect x="510" y="98" width="414" height="352" rx="12" fill="#ffffff" stroke="#c9d3e2" stroke-width="2"/>
  <text x="530" y="130" fill="#1f2a44" font-size="16" font-weight="700">注意機構：スコア計算</text>

  <text x="530" y="174" fill="#1f2a44" font-size="13" font-weight="700">① 問い ＝ クエリ Q</text>
  <rect x="770" y="152" width="52" height="40" rx="6" fill="#eaf1fb" stroke="#2f6fb0" stroke-width="2"/>
  <text x="796" y="178" fill="#2f6fb0" font-size="17" font-weight="700" text-anchor="middle" font-family="'Consolas','SFMono-Regular',monospace">Q</text>

  <text x="530" y="216" fill="#1f2a44" font-size="13" font-weight="700">② 全 K と内積を計算</text>

  <text x="530" y="258" fill="#1f2a44" font-size="13" font-weight="700">③ 注意マップに山（softmax）</text>
  <g>
    <rect x="534" y="272" width="26" height="26" fill="#2f6fb0" opacity="0.20"/>
    <rect x="560" y="272" width="26" height="26" fill="#2f6fb0" opacity="0.30"/>
    <rect x="586" y="272" width="26" height="26" fill="#2f6fb0" opacity="0.24"/>
    <rect x="612" y="272" width="26" height="26" fill="#2f6fb0" opacity="0.90"/>
    <rect x="638" y="272" width="26" height="26" fill="#2f6fb0" opacity="0.34"/>
    <rect x="664" y="272" width="26" height="26" fill="#2f6fb0" opacity="0.18"/>
    <rect x="534" y="298" width="26" height="26" fill="#2f6fb0" opacity="0.16"/>
    <rect x="560" y="298" width="26" height="26" fill="#2f6fb0" opacity="0.28"/>
    <rect x="586" y="298" width="26" height="26" fill="#2f6fb0" opacity="0.48"/>
    <rect x="612" y="298" width="26" height="26" fill="#2f6fb0" opacity="0.42"/>
    <rect x="638" y="298" width="26" height="26" fill="#2f6fb0" opacity="0.24"/>
    <rect x="664" y="298" width="26" height="26" fill="#2f6fb0" opacity="0.18"/>
  </g>
  <text x="534" y="348" fill="#41506a" font-size="12">山 ＝ いちばん合う語に配分</text>
  <text x="534" y="384" fill="#2f6fb0" font-size="12" font-weight="600">＝ Q·Kᵀ の内積で似た語を探す</text>
  <text x="534" y="416" fill="#6b7688" font-size="11">問い Q を各見出し K に当て、合う語ほど強く注目する。</text>

  <!-- ===== center bridge ===== -->
  <line x1="480" y1="150" x2="480" y2="430" stroke="#c9d3e2" stroke-width="2" stroke-dasharray="5 5"/>
  <rect x="452" y="270" width="56" height="62" rx="10" fill="#fdeede" stroke="#d99a2b" stroke-width="2"/>
  <text x="480" y="302" fill="#1f2a44" font-size="22" font-weight="700" text-anchor="middle">＝</text>
  <text x="480" y="324" fill="#a5701a" font-size="13" font-weight="700" text-anchor="middle">内積</text>

  <!-- ===== bottom band ===== -->
  <rect x="36" y="462" width="888" height="40" rx="10" fill="#eef3f0" stroke="#3a6a53" stroke-width="2"/>
  <text x="480" y="487" fill="#1f2a44" font-size="13" text-anchor="middle">違いは選び方だけ ― 相関は一点を硬く選び、注意は softmax でやわらかく配分する。</text>

  <!-- footer -->
  <text x="480" y="524" fill="#6b7688" font-size="13" text-anchor="middle">シリーズ「作って分かった LLM の中身」第2回 ― 相関で似たものを探す</text>
</svg>
