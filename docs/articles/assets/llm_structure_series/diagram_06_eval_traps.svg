<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Segoe UI','Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif">
  <!-- 静的表示（家訓）: authored 属性が最終可視状態。SMIL/reveal-gate 不使用。赤緑の善悪対比なし。数値はキット実測のみ。 -->
  <defs>
    <linearGradient id="bgT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eef2f8"/>
    </linearGradient>
    <marker id="arrT" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6a86"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="url(#bgT)"/>

  <!-- Title band -->
  <rect x="0" y="0" width="960" height="92" fill="#1f2a44"/>
  <text x="40" y="46" fill="#ffffff" font-size="30" font-weight="700">評価の罠 ── 良い数字を、疑う技術</text>
  <text x="40" y="76" fill="#aebaccd0" font-size="17">うますぎる結果は、喜ぶ前に内訳を疑う（計測規律）</text>

  <!-- ===== Card A: winner's curse ===== -->
  <g>
    <rect x="40" y="120" width="410" height="300" rx="14" fill="#ffffff" stroke="#d5dde8" stroke-width="2"/>
    <rect x="40" y="120" width="410" height="52" rx="14" fill="#2f6fb0"/>
    <rect x="40" y="150" width="410" height="22" fill="#2f6fb0"/>
    <text x="62" y="153" fill="#ffffff" font-size="19" font-weight="700">① 勝者の呪い（winner's curse）</text>
    <text x="62" y="200" fill="#41506a" font-size="15">多数の候補から「最良」を選ぶと、値は楽観に偏る</text>

    <!-- candidate bars (schematic, no axis numbers) -->
    <g>
      <rect x="64"  y="294" width="16" height="42" fill="#a9bfdd"/>
      <rect x="88"  y="276" width="16" height="60" fill="#a9bfdd"/>
      <rect x="112" y="286" width="16" height="50" fill="#a9bfdd"/>
      <rect x="136" y="262" width="16" height="74" fill="#a9bfdd"/>
      <rect x="160" y="280" width="16" height="56" fill="#a9bfdd"/>
      <rect x="184" y="290" width="16" height="46" fill="#a9bfdd"/>
      <!-- highlighted best (selection-time optimism) -->
      <rect x="135" y="261" width="18" height="76" fill="none" stroke="#d99a2b" stroke-width="2.5"/>
      <text x="144" y="252" fill="#a5701a" font-size="12" font-weight="700" text-anchor="middle">最良</text>
    </g>
    <text x="64" y="352" fill="#6b7688" font-size="12">候補を多数評価</text>

    <!-- holdout re-eval bar (drops) -->
    <rect x="316" y="296" width="18" height="40" fill="#3aa0a0"/>
    <text x="325" y="352" fill="#6b7688" font-size="12" text-anchor="middle">holdout</text>

    <!-- reference line from best-top to holdout region + drop bracket -->
    <line x1="153" y1="262" x2="360" y2="262" stroke="#8a93a6" stroke-width="1.4" stroke-dasharray="5 4"/>
    <path d="M360,262 L360,296" stroke="#8a93a6" stroke-width="1.4"/>
    <text x="400" y="280" fill="#6b7688" font-size="12" text-anchor="middle">上振れが</text>
    <text x="400" y="296" fill="#6b7688" font-size="12" text-anchor="middle">剥がれる</text>

    <!-- arrow best -> holdout -->
    <path d="M206,272 C250,268 280,286 312,300" fill="none" stroke="#5b6a86" stroke-width="2" marker-end="url(#arrT)"/>
    <text x="232" y="244" fill="#41506a" font-size="12.5" font-weight="600">→ 新鮮な holdout で再評価</text>

    <text x="62" y="378" fill="#1f2a44" font-size="22" font-weight="800">選定時の最良 ＞ 実力</text>
    <text x="62" y="399" fill="#41506a" font-size="13">最良値 ＝ 実力 ＋ 幸運なノイズ。</text>
    <text x="62" y="416" fill="#41506a" font-size="13"><tspan font-weight="700">選定に使っていない</tspan>データで測り直す。</text>
  </g>

  <!-- ===== Card B: PPL-only gate ===== -->
  <g>
    <rect x="510" y="120" width="410" height="300" rx="14" fill="#ffffff" stroke="#d5dde8" stroke-width="2"/>
    <rect x="510" y="120" width="410" height="52" rx="14" fill="#d99a2b"/>
    <rect x="510" y="150" width="410" height="22" fill="#d99a2b"/>
    <text x="532" y="153" fill="#ffffff" font-size="19" font-weight="700">② PPL だけのゲートは危険</text>
    <text x="532" y="200" fill="#41506a" font-size="15">一本の物差し（PPL）だけでは、壊れを見逃す</text>

    <!-- meter: PPL passes -->
    <text x="532" y="240" fill="#41506a" font-size="14" font-weight="600">PPL</text>
    <rect x="596" y="229" width="250" height="14" rx="7" fill="#e6ebf3"/>
    <rect x="596" y="229" width="250" height="14" rx="7" fill="#5b6a86"/>
    <text x="838" y="240" fill="#3a6a53" font-size="13" font-weight="700" text-anchor="end">ゲート通過 ✓</text>

    <!-- meter: top-1 collapses -->
    <text x="532" y="276" fill="#41506a" font-size="14" font-weight="600">top-1</text>
    <rect x="596" y="265" width="250" height="14" rx="7" fill="#e6ebf3"/>
    <rect x="596" y="265" width="176" height="14" rx="7" fill="#5b6a86"/>
    <rect x="772" y="265" width="74" height="14" rx="7" fill="#f0d6a6"/>
    <path d="M772,258 L772,286" stroke="#d99a2b" stroke-width="2"/>
    <text x="809" y="298" fill="#a5701a" font-size="12" font-weight="700" text-anchor="middle">崩落</text>

    <text x="532" y="376" fill="#1f2a44" font-size="36" font-weight="800">top-1 −13.5pp</text>
    <text x="532" y="398" fill="#41506a" font-size="13">2bit は PPL 通過。でも出力の1語（top-1）が崩れた。</text>
    <text x="532" y="415" fill="#41506a" font-size="13" font-weight="700">→ top-1 保持で fail-closed</text>
  </g>

  <!-- Footer -->
  <rect x="40" y="452" width="880" height="60" rx="12" fill="#1f2a44"/>
  <text x="480" y="481" fill="#ffffff" font-size="17" font-weight="600" text-anchor="middle">物差しを一本にしない ── PPL＋top-1、選定とは別の holdout で。</text>
  <text x="480" y="502" fill="#aebaccd0" font-size="14" text-anchor="middle">良い数字が出たら、喜ぶ前に内訳を疑う（fail-closed）</text>
</svg>
