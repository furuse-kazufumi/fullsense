<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Transformer ブロックの全体像 ― 知識はどこに住むか。注意機構と順伝播層に残差接続とRMSNormを付けた1ブロックをN層積む縦の反復" style="width:100%;height:auto;max-width:1200px" font-family="'Segoe UI','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif">
  <title>Transformer ブロックの全体像 ― 知識はどこに住むか</title>
  <desc>注意機構(検索・ルーティング)と順伝播層(知識の貯蔵庫)を、各々に残差接続とRMSNormを付けて1ブロックとし、それをN層(例24層)積み重ねる縦の反復構造を静的完成形として表す。赤緑の善悪対比は用いない。</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="ahT" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#3aa0a0"/>
    </marker>
  </defs>
  <rect width="1200" height="360" fill="url(#bg3)"/>

  <!-- title -->
  <text x="600" y="36" fill="#e2e8f0" font-size="23" font-weight="700" text-anchor="middle">Transformer ブロックの全体像 ― 知識はどこに住むか</text>
  <text x="600" y="59" fill="#94a3b8" font-size="13" text-anchor="middle">注意機構 ＋ 順伝播層、各々に 残差接続 と RMSNorm。これを 1 ブロックとして N 層積む。</text>
  <rect x="0" y="74" width="1200" height="2" fill="#3aa0a0" opacity="0.5"/>

  <!-- Section A: one detailed block -->
  <text x="386" y="100" fill="#cbd5e1" font-size="14" font-weight="700" text-anchor="middle">1 ブロック（1 段）の中身</text>
  <rect x="56" y="110" width="660" height="204" rx="16" fill="#172033" stroke="#475569" stroke-width="1.5"/>

  <!-- residual stream + adders -->
  <path d="M96,158 L666,158" stroke="#3aa0a0" stroke-width="2.5" fill="none" stroke-dasharray="7 5"/>
  <text x="104" y="150" fill="#7fcccc" font-size="11">残差ストリーム（元を捨てず足し込む）</text>
  <path d="M96,224 L96,158" stroke="#3aa0a0" stroke-width="2" fill="none"/>
  <path d="M362,158 L362,211" stroke="#3aa0a0" stroke-width="2" fill="none" marker-end="url(#ahT)"/>
  <path d="M654,158 L654,211" stroke="#3aa0a0" stroke-width="2" fill="none" marker-end="url(#ahT)"/>

  <!-- flow: input -> RMSNorm -> Attention -> (+) -> RMSNorm -> FFN -> (+) -> out -->
  <text x="78" y="214" fill="#94a3b8" font-size="11" text-anchor="middle">入力 x</text>
  <path d="M60,224 L96,224" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#ah)"/>

  <rect x="98" y="210" width="60" height="28" rx="8" fill="#10202e" stroke="#3aa0a0" stroke-width="1.5"/>
  <text x="128" y="228" fill="#8fd0d0" font-size="9.5" text-anchor="middle">RMSNorm</text>
  <path d="M158,224 L172,224" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#ah)"/>

  <rect x="174" y="196" width="168" height="56" rx="10" fill="#1b2b47" stroke="#2f6fb0" stroke-width="2"/>
  <text x="258" y="220" fill="#cfe0f2" font-size="13" font-weight="700" text-anchor="middle">注意機構 (attention)</text>
  <text x="258" y="239" fill="#9fb4cf" font-size="11" text-anchor="middle">検索・ルーティング</text>

  <circle cx="362" cy="224" r="12" fill="#0f172a" stroke="#3aa0a0" stroke-width="2"/>
  <text x="362" y="229" fill="#7fcccc" font-size="14" text-anchor="middle">＋</text>
  <path d="M374,224 L388,224" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#ah)"/>

  <rect x="390" y="210" width="60" height="28" rx="8" fill="#10202e" stroke="#3aa0a0" stroke-width="1.5"/>
  <text x="420" y="228" fill="#8fd0d0" font-size="9.5" text-anchor="middle">RMSNorm</text>
  <path d="M450,224 L464,224" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#ah)"/>

  <rect x="466" y="196" width="168" height="56" rx="10" fill="#2e2716" stroke="#d99a2b" stroke-width="2"/>
  <text x="550" y="220" fill="#f0d9a8" font-size="13" font-weight="700" text-anchor="middle">順伝播層 (FFN)</text>
  <text x="550" y="239" fill="#d8c39a" font-size="11" text-anchor="middle">知識の貯蔵庫</text>

  <circle cx="654" cy="224" r="12" fill="#0f172a" stroke="#3aa0a0" stroke-width="2"/>
  <text x="654" y="229" fill="#7fcccc" font-size="14" text-anchor="middle">＋</text>
  <path d="M666,224 L706,224" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#ah)"/>

  <text x="384" y="286" fill="#94a3b8" font-size="11" text-anchor="middle">各モジュール：手前に RMSNorm（正規化）→ 通した結果を残差で足し戻す（pre-norm）</text>

  <!-- connector A -> B (stack N) -->
  <path d="M708,222 L806,150" stroke="#3aa0a0" stroke-width="2.5" fill="none" marker-end="url(#ahT)"/>
  <text x="760" y="180" fill="#7fcccc" font-size="12" font-weight="700" text-anchor="middle">×N 積む</text>

  <!-- Section B: stacked layers -->
  <text x="958" y="104" fill="#cbd5e1" font-size="14" font-weight="700" text-anchor="middle">この 1 段を N 層くり返す（例 24 層）</text>

  <rect x="812" y="120" width="292" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.2"/>
  <rect x="812" y="120" width="8" height="40" rx="4" fill="#2f6fb0"/>
  <rect x="820" y="120" width="8" height="40" fill="#d99a2b"/>
  <text x="838" y="145" fill="#cbd5e1" font-size="12" font-weight="600">層 0：注意 ＋ 順伝播</text>

  <rect x="812" y="172" width="292" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.2"/>
  <rect x="812" y="172" width="8" height="40" rx="4" fill="#2f6fb0"/>
  <rect x="820" y="172" width="8" height="40" fill="#d99a2b"/>
  <text x="838" y="197" fill="#cbd5e1" font-size="12" font-weight="600">層 1：注意 ＋ 順伝播</text>

  <text x="958" y="236" fill="#94a3b8" font-size="20" font-weight="700" text-anchor="middle">⋮</text>

  <rect x="812" y="246" width="292" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.2"/>
  <rect x="812" y="246" width="8" height="40" rx="4" fill="#2f6fb0"/>
  <rect x="820" y="246" width="8" height="40" fill="#d99a2b"/>
  <text x="838" y="271" fill="#cbd5e1" font-size="12" font-weight="600">層 23：注意 ＋ 順伝播</text>

  <path d="M1112,120 L1122,120 L1122,286 L1112,286" stroke="#8a93a6" stroke-width="1.5" fill="none"/>
  <path d="M958,160 L958,171" stroke="#94a3b8" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <path d="M958,212 L958,223" stroke="#94a3b8" stroke-width="1.6" fill="none" marker-end="url(#ah)"/>
  <path d="M958,245 L958,245" stroke="#94a3b8" stroke-width="1.6" fill="none"/>

  <text x="958" y="306" fill="#94a3b8" font-size="11" text-anchor="middle">→ 最終 RMSNorm → 出力層（次の一語, #4 へ）</text>

  <!-- footer -->
  <text x="600" y="346" fill="#64748b" font-size="12" text-anchor="middle">シリーズ「作って分かった LLM の中身」／ 第03回</text>
</svg>
