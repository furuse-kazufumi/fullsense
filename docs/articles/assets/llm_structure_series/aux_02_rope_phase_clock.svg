<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Segoe UI','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif">
  <!-- 静的表示: authored=最終可視。SMIL不使用。赤緑の善悪対比なし。 -->
  <rect width="960" height="540" fill="#f7f9fc"/>

  <rect x="0" y="0" width="960" height="78" fill="#1f2a44"/>
  <text x="40" y="38" fill="#ffffff" font-size="25" font-weight="700">RoPE ＝ 周波数ごとの位相時計 ― 位置を回転で刻む</text>
  <text x="40" y="64" fill="#aebacc" font-size="15">次元のペアごとに回る速さ（周波数）が違い、位置が進むと各時計の針（位相）が進む。</text>

  <text x="294" y="124" fill="#1f2a44" font-size="13" font-weight="700" text-anchor="middle">次元ペア i：高周波（速い針）→ 低周波（遅い針）</text>
  <text x="110" y="181" fill="#41506a" font-size="12" text-anchor="end">位置 m=0</text>
  <text x="110" y="273" fill="#41506a" font-size="12" text-anchor="end">m=1</text>
  <text x="110" y="365" fill="#41506a" font-size="12" text-anchor="end">m=2</text>

