  <text x="150" y="410" fill="#6b7688" font-size="11" text-anchor="middle">速い（高周波）</text>
  <text x="438" y="410" fill="#6b7688" font-size="11" text-anchor="middle">遅い（低周波）</text>

  <rect x="500" y="100" width="424" height="306" rx="12" fill="#ffffff" stroke="#c9d3e2" stroke-width="2"/>
  <text x="520" y="132" fill="#1f2a44" font-size="16" font-weight="700">位置を『周波数の位相』で符号化</text>
  <text x="520" y="170" fill="#1f2a44" font-size="15" font-family="'Consolas','SFMono-Regular',monospace">&#969;_i = &#952;^(-2i/d)    (&#952; = 1e6)</text>
  <text x="520" y="210" fill="#41506a" font-size="13">・高周波（速い針）＝近い位置を細かく刻む</text>
  <text x="520" y="240" fill="#41506a" font-size="13">・低周波（遅い針）＝遠くまで位置を取り違えない</text>
  <text x="520" y="270" fill="#41506a" font-size="13">・回すのは Q,K だけ（V は回さない）</text>
  <text x="520" y="308" fill="#2f7f7f" font-size="13" font-weight="700">フーリエの周波数スペクトル（高→低）</text>
  <rect x="522" y="332" width="18" height="60" rx="2" fill="#2f6fb0"/>
  <rect x="550" y="340" width="18" height="52" rx="2" fill="#3075ae"/>
  <rect x="578" y="347" width="18" height="45" rx="2" fill="#327bac"/>
  <rect x="606" y="354" width="18" height="38" rx="2" fill="#3381aa"/>
  <rect x="634" y="360" width="18" height="32" rx="2" fill="#3488a8"/>
  <rect x="662" y="366" width="18" height="26" rx="2" fill="#368ea6"/>
  <rect x="690" y="371" width="18" height="21" rx="2" fill="#3794a4"/>
  <rect x="718" y="375" width="18" height="17" rx="2" fill="#399aa2"/>
  <rect x="746" y="379" width="18" height="13" rx="2" fill="#3aa0a0"/>

  <rect x="36" y="470" width="888" height="34" rx="10" fill="#eef3f0" stroke="#3a6a53" stroke-width="2"/>
  <text x="480" y="492" fill="#1f2a44" font-size="13" text-anchor="middle">位置＝各周波数の位相。内積は相対位置 m&#8722;n だけで決まる（シフト定理）。</text>
  <text x="480" y="526" fill="#6b7688" font-size="13" text-anchor="middle">シリーズ「作って分かった LLM の中身」第2回 ― 位置を回転で刻む</text>
</svg>
