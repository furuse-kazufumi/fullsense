<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Segoe UI','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif">
  <!-- 静的表示: authored=最終可視。SMIL不使用。赤緑の善悪対比なし。 -->
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6a86"/>
    </marker>
    <marker id="ab" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2f6fb0"/>
    </marker>
    <marker id="at" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#3aa0a0"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#f7f9fc"/>

  <!-- title band -->
  <rect x="0" y="0" width="960" height="78" fill="#1f2a44"/>
  <text x="40" y="38" fill="#ffffff" font-size="24" font-weight="700">行きと帰りで同じ表を読む ― 重み共有(tied embeddings)</text>
  <text x="40" y="64" fill="#aebacc" font-size="15">1枚の重み行列 W を、入口『行を引く』と出口『各行と内積』の両方向に使い回す。</text>

  <!-- ghost of the second matrix (本来なら2枚。tied で不要) -->
  <text x="376" y="128" fill="#9aa6b6" font-size="11">本来はもう1枚（tied で不要）</text>
  <rect x="372" y="136" width="182" height="310" rx="12" fill="none" stroke="#c2ccd8" stroke-width="1.5" stroke-dasharray="6 6"/>

  <!-- ===== center: weight matrix W ===== -->
  <rect x="398" y="150" width="164" height="300" rx="12" fill="#ffffff" stroke="#c9d3e2" stroke-width="2"/>
  <text x="480" y="178" fill="#1f2a44" font-size="15" font-weight="700" text-anchor="middle">重み行列 W</text>
  <text x="480" y="197" fill="#41506a" font-size="11" text-anchor="middle">語彙 × 隠れ次元（1枚）</text>

  <!-- rows -->
  <g>
    <rect x="418" y="210" width="124" height="28" rx="5" fill="#eef3f8" stroke="#c9d3e2" stroke-width="1"/>
    <text x="426" y="229" fill="#41506a" font-size="11">行0</text>
    <rect x="470" y="217" width="14" height="14" fill="#2f6fb0" opacity="0.30"/>
    <rect x="488" y="217" width="14" height="14" fill="#2f6fb0" opacity="0.55"/>
    <rect x="506" y="217" width="14" height="14" fill="#2f6fb0" opacity="0.22"/>

    <rect x="418" y="242" width="124" height="28" rx="5" fill="#eef3f8" stroke="#c9d3e2" stroke-width="1"/>
    <text x="426" y="261" fill="#41506a" font-size="11">行1</text>
    <rect x="470" y="249" width="14" height="14" fill="#2f6fb0" opacity="0.50"/>
    <rect x="488" y="249" width="14" height="14" fill="#2f6fb0" opacity="0.20"/>
    <rect x="506" y="249" width="14" height="14" fill="#2f6fb0" opacity="0.42"/>

    <!-- row k: gathered on the way in -->
    <rect x="418" y="274" width="124" height="28" rx="5" fill="#eaf1fb" stroke="#2f6fb0" stroke-width="2"/>
    <text x="426" y="293" fill="#2f6fb0" font-size="11" font-weight="700">行k</text>
    <rect x="470" y="281" width="14" height="14" fill="#2f6fb0" opacity="0.85"/>
    <rect x="488" y="281" width="14" height="14" fill="#2f6fb0" opacity="0.55"/>
    <rect x="506" y="281" width="14" height="14" fill="#2f6fb0" opacity="0.72"/>

    <rect x="418" y="306" width="124" height="28" rx="5" fill="#eef3f8" stroke="#c9d3e2" stroke-width="1"/>
    <text x="426" y="325" fill="#41506a" font-size="11">行…</text>
    <rect x="470" y="313" width="14" height="14" fill="#2f6fb0" opacity="0.28"/>
    <rect x="488" y="313" width="14" height="14" fill="#2f6fb0" opacity="0.48"/>
    <rect x="506" y="313" width="14" height="14" fill="#2f6fb0" opacity="0.30"/>

    <rect x="418" y="338" width="124" height="28" rx="5" fill="#eef3f8" stroke="#c9d3e2" stroke-width="1"/>
    <text x="426" y="357" fill="#41506a" font-size="11">行n</text>
    <rect x="470" y="345" width="14" height="14" fill="#2f6fb0" opacity="0.44"/>
    <rect x="488" y="345" width="14" height="14" fill="#2f6fb0" opacity="0.24"/>
    <rect x="506" y="345" width="14" height="14" fill="#2f6fb0" opacity="0.58"/>
  </g>
  <text x="480" y="392" fill="#6b7688" font-size="16" text-anchor="middle">⋮</text>
  <text x="480" y="428" fill="#41506a" font-size="11" text-anchor="middle">各行 = 1トークンの座標</text>

  <!-- ===== left: 入口 (ID -> 座標) ===== -->
  <text x="40" y="118" fill="#2f6fb0" font-size="15" font-weight="700">① 入口 ─ ID から座標へ</text>
  <rect x="48" y="360" width="150" height="54" rx="10" fill="#eaf1fb" stroke="#2f6fb0" stroke-width="2"/>
  <text x="123" y="386" fill="#1f2a44" font-size="14" font-weight="700" text-anchor="middle">トークンID = k</text>
  <text x="123" y="404" fill="#41506a" font-size="11" text-anchor="middle">背番号（整数）</text>
  <!-- arrow ID -> row k -->
  <path d="M198,378 C 300,352 340,312 416,290" stroke="#2f6fb0" stroke-width="2.4" marker-end="url(#ab)" fill="none"/>
  <text x="300" y="330" fill="#2f6fb0" font-size="11" text-anchor="middle" font-weight="600">行 k を引く（gather）</text>
  <text x="300" y="348" fill="#2f6fb0" font-size="11" text-anchor="middle">＝ その行が意味の座標</text>

  <!-- ===== right: 出口 (座標 -> 語彙スコア) ===== -->
  <text x="600" y="118" fill="#3aa0a0" font-size="15" font-weight="700">② 出口 ─ 座標から語彙スコアへ</text>
  <rect x="770" y="150" width="150" height="52" rx="10" fill="#e6f2ee" stroke="#3aa0a0" stroke-width="2"/>
  <text x="845" y="176" fill="#1f2a44" font-size="14" font-weight="700" text-anchor="middle">内部ベクトル h</text>
  <text x="845" y="194" fill="#41506a" font-size="11" text-anchor="middle">（隠れ次元）</text>
  <!-- arrow h -> matrix (compare with every row) -->
  <path d="M770,176 C 700,176 640,210 566,250" stroke="#3aa0a0" stroke-width="2.4" marker-end="url(#at)" fill="none"/>
  <text x="672" y="200" fill="#3aa0a0" font-size="11" text-anchor="middle" font-weight="600">各行と内積(dot)</text>
  <!-- arrow matrix -> logits -->
  <path d="M562,360 C 640,392 700,388 762,372" stroke="#3aa0a0" stroke-width="2.4" marker-end="url(#at)" fill="none"/>
  <rect x="744" y="340" width="196" height="76" rx="12" fill="#eef3f0" stroke="#3a6a53" stroke-width="2"/>
  <text x="842" y="368" fill="#1f2a44" font-size="14" font-weight="700" text-anchor="middle">ロジット (logits)</text>
  <text x="842" y="388" fill="#41506a" font-size="11" text-anchor="middle">各トークンの点数（語彙ぶん）</text>
  <text x="842" y="406" fill="#41506a" font-size="11" text-anchor="middle">→ softmax で次トークン</text>

  <!-- bottom caption: memory saving -->
  <rect x="40" y="462" width="880" height="46" rx="11" fill="#fdf4e3" stroke="#d99a2b" stroke-width="1.6"/>
  <text x="480" y="490" fill="#7a5a1a" font-size="14" text-anchor="middle">別々の行列なら2枚ぶんのメモリ。tied は同じ1枚を行き帰りで使い、巨大行列を二重に持たない。</text>

  <!-- footer -->
  <text x="480" y="530" fill="#6b7688" font-size="12" text-anchor="middle">シリーズ「作って分かった LLM の中身」第1回 ― 重み共有(tied embeddings) の一枚図</text>
</svg>
