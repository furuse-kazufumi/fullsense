<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Segoe UI','Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif">
  <!-- 静的表示: authored 属性が最終可視状態。SMIL/reveal-gate 不使用。赤緑の善悪対比なし。数値はキット§5実測値のみ。 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eef2f8"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- Title band -->
  <rect x="0" y="0" width="960" height="88" fill="#1f2a44"/>
  <text x="40" y="42" fill="#ffffff" font-size="27" font-weight="700">KVキャッシュのメモリ膨張 ── 文脈が伸びるほど溜まる</text>
  <text x="40" y="72" fill="#aebaccd0" font-size="15">softmax型は文脈長 T に線形 O(T) ／ 定数状態(recurrent)は平坦 O(1)。長文脈ほど差が開く。</text>

  <!-- ===== Left: chart card ===== -->
  <rect x="32" y="104" width="576" height="396" rx="14" fill="#ffffff" stroke="#d5dde8" stroke-width="2"/>
  <text x="52" y="134" fill="#1f2a44" font-size="15" font-weight="700">KVキャッシュのサイズ（モデル全体, MB）</text>

  <!-- y grid + ticks (0..40 MB) -->
  <g stroke="#e4e9f1" stroke-width="1">
    <line x1="100" y1="440" x2="572" y2="440"/>
    <line x1="100" y1="367.5" x2="572" y2="367.5"/>
    <line x1="100" y1="295" x2="572" y2="295"/>
    <line x1="100" y1="222.5" x2="572" y2="222.5"/>
    <line x1="100" y1="150" x2="572" y2="150"/>
  </g>
  <g fill="#6b7688" font-size="12" text-anchor="end">
    <text x="92" y="444">0</text>
    <text x="92" y="371.5">10</text>
    <text x="92" y="299">20</text>
    <text x="92" y="226.5">30</text>
    <text x="92" y="154">40</text>
  </g>
  <!-- axes -->
  <line x1="100" y1="150" x2="100" y2="440" stroke="#8a93a6" stroke-width="2"/>
  <line x1="100" y1="440" x2="572" y2="440" stroke="#8a93a6" stroke-width="2"/>

  <!-- x ticks (T) -->
  <g fill="#6b7688" font-size="12" text-anchor="middle">
    <text x="100" y="458">256</text>
    <text x="167" y="458">512</text>
    <text x="302" y="458">1024</text>
    <text x="572" y="458">2048</text>
  </g>
  <text x="336" y="482" fill="#41506a" font-size="13" text-anchor="middle">文脈長 T（トークン）</text>

  <!-- constant-state flat line (teal) -->
  <line x1="100" y1="428" x2="572" y2="428" stroke="#3aa0a0" stroke-width="3"/>
  <circle cx="100" cy="428" r="3.5" fill="#3aa0a0"/>
  <circle cx="302" cy="428" r="3.5" fill="#3aa0a0"/>
  <circle cx="572" cy="428" r="3.5" fill="#3aa0a0"/>
  <text x="150" y="421" fill="#2f7d7d" font-size="12">定数状態(recurrent): 文脈長に不変（平坦・×1.00）</text>

  <!-- softmax KV cache line (blue, linear O(T)) -->
  <polyline points="100,405.8 572,166.3" fill="none" stroke="#2f6fb0" stroke-width="3.5"/>
  <circle cx="100" cy="405.8" r="5.5" fill="#2f6fb0"/>
  <circle cx="572" cy="166.3" r="5.5" fill="#2f6fb0"/>
  <text x="112" y="402" fill="#1f2a44" font-size="12" font-weight="700">T=256 : 4.72MB</text>
  <text x="562" y="160" fill="#1f2a44" font-size="12" font-weight="700" text-anchor="end">T=2048 : 37.75MB</text>
  <text x="330" y="238" fill="#2f6fb0" font-size="17" font-weight="800" transform="rotate(-20 330 238)">softmax KV ×8（線形 O(T)）</text>

  <!-- ===== Right: annotation cards ===== -->
  <!-- R1: RSS metric -->
  <rect x="624" y="104" width="304" height="126" rx="12" fill="#ffffff" stroke="#d5dde8" stroke-width="2"/>
  <rect x="624" y="104" width="304" height="30" rx="12" fill="#2f6fb0"/>
  <rect x="624" y="120" width="304" height="14" fill="#2f6fb0"/>
  <text x="642" y="125" fill="#ffffff" font-size="14" font-weight="700">別の物差し＝プロセス全体 (RSS)</text>
  <text x="642" y="158" fill="#1f2a44" font-size="14">T=4096: softmax <tspan font-weight="700">~1.67GB</tspan></text>
  <text x="642" y="180" fill="#1f2a44" font-size="14">定数状態 <tspan font-weight="700">205MB</tspan>　≒ ×8 の開き</text>
  <text x="642" y="208" fill="#6b7688" font-size="11.5">※測る場所で倍率が変わる</text>
  <text x="642" y="223" fill="#6b7688" font-size="11.5">（KV: ×8 ／ RSS 256→2048: ×2.65）</text>

  <!-- R2: crossover -->
  <rect x="624" y="244" width="304" height="104" rx="12" fill="#ffffff" stroke="#d5dde8" stroke-width="2"/>
  <rect x="624" y="244" width="304" height="30" rx="12" fill="#3aa0a0"/>
  <rect x="624" y="260" width="304" height="14" fill="#3aa0a0"/>
  <text x="642" y="265" fill="#ffffff" font-size="14" font-weight="700">交差点 ≈ 227 トークン</text>
  <text x="642" y="298" fill="#1f2a44" font-size="13.5">それより短い文脈では、</text>
  <text x="642" y="318" fill="#1f2a44" font-size="13.5">定数状態の方が<tspan font-weight="700">「大きい」</tspan>。</text>
  <text x="642" y="338" fill="#41506a" font-size="13">線形化は長文脈でだけ得。</text>

  <!-- R3: not free lunch -->
  <rect x="624" y="362" width="304" height="138" rx="12" fill="#ffffff" stroke="#d5dde8" stroke-width="2"/>
  <rect x="624" y="362" width="304" height="30" rx="12" fill="#d99a2b"/>
  <rect x="624" y="378" width="304" height="14" fill="#d99a2b"/>
  <text x="642" y="383" fill="#ffffff" font-size="14" font-weight="700">線形化はタダではない</text>
  <text x="642" y="416" fill="#1f2a44" font-size="13.5"><tspan font-weight="700">利得</tspan>＝長文脈のメモリ</text>
  <text x="642" y="435" fill="#41506a" font-size="12.5">（O(T) → O(1)）</text>
  <text x="642" y="459" fill="#1f2a44" font-size="13.5"><tspan font-weight="700">代償</tspan>＝品質（小さいが非ゼロ）</text>
  <text x="642" y="478" fill="#41506a" font-size="12.5">＋短文脈の余計な計算</text>
  <text x="642" y="496" fill="#6b7688" font-size="11.5">無料の昼食でなく、条件つきの交換。</text>

  <!-- Footer -->
  <text x="480" y="524" fill="#6b7688" font-size="13" text-anchor="middle">同じ「重さ」でも KVキャッシュ O(T) と 定数状態 O(1)。長い文脈ほど差は容赦なく開く。</text>
</svg>
