<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" role="img" aria-label="意味の座標空間: 王 − 男 + 女 ≈ 女王 の平行四辺形。近似であって厳密な等式ではない。" font-family="'Segoe UI','Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif">
  <title>意味の座標空間 ── 王 − 男 + 女 ≈ 女王</title>
  <desc>静的表示: authored 属性が最終可視状態。SMIL/reveal-gate 不使用。赤緑の善悪対比なし。埋め込み空間を2次元に落とし、王/男/女/女王を点で置く。男→女 と 王→女王 がほぼ平行で、王に同じ向きを足すと女王の近くに着く。計算結果と実際の女王には小さなズレがあり、これは近似(≈)であって厳密な等式(=)ではないことを示す。</desc>

  <defs>
    <marker id="arrBlue" markerWidth="11" markerHeight="11" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2f6fb0"/>
    </marker>
    <marker id="arrTeal" markerWidth="11" markerHeight="11" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#3aa0a0"/>
    </marker>
    <marker id="arrGray" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a93a6"/>
    </marker>
  </defs>

  <rect width="960" height="540" fill="#f7f9fc"/>

  <!-- title band -->
  <rect x="0" y="0" width="960" height="78" fill="#1f2a44"/>
  <text x="40" y="42" fill="#ffffff" font-size="27" font-weight="700">意味の座標空間 ── 王 − 男 + 女 ≈ 女王</text>
  <text x="40" y="66" fill="#aebaccd0" font-size="15">方向と距離で意味を扱える。ただし ≈（近似）であって ＝（厳密な等式）ではない。</text>

  <!-- plot card -->
  <rect x="40" y="98" width="880" height="340" rx="14" fill="#ffffff" stroke="#c9d3e2" stroke-width="2"/>
  <text x="60" y="126" fill="#41506a" font-size="14">PCA で高次元の埋め込みを2次元に落とした概念図（イメージ）</text>

  <!-- faint reference axes -->
  <line x1="150" y1="410" x2="770" y2="410" stroke="#d5dde8" stroke-width="1.5" marker-end="url(#arrGray)"/>
  <text x="770" y="428" fill="#8a93a6" font-size="12">性別の向き (gender) →</text>
  <line x1="150" y1="410" x2="150" y2="150" stroke="#d5dde8" stroke-width="1.5" marker-end="url(#arrGray)"/>
  <text x="162" y="150" fill="#8a93a6" font-size="12">↑ 王位の向き (royalty)</text>

  <!-- dashed parallelogram: 男 - 女 - 計算結果 - 王 -->
  <polygon points="270,380 560,340 620,170 330,210" fill="#eaf1fb" fill-opacity="0.35" stroke="#b9c6dc" stroke-width="1.5" stroke-dasharray="6 5"/>

  <!-- gender vector 男 -> 女 -->
  <line x1="270" y1="380" x2="560" y2="340" stroke="#2f6fb0" stroke-width="3" marker-end="url(#arrBlue)"/>
  <text x="392" y="378" fill="#2f6fb0" font-size="13" font-weight="700">男 → 女（性別の向き）</text>

  <!-- same vector applied at 王 -> 計算結果 -->
  <line x1="330" y1="210" x2="620" y2="170" stroke="#3aa0a0" stroke-width="3" stroke-dasharray="7 5" marker-end="url(#arrTeal)"/>
  <text x="372" y="176" fill="#2f7f7f" font-size="13" font-weight="700">王 に同じ向きを足す</text>

  <!-- points -->
  <g>
    <!-- 男 -->
    <circle cx="270" cy="380" r="8" fill="#1f2a44"/>
    <text x="252" y="404" fill="#1f2a44" font-size="17" font-weight="700">男</text>
    <text x="272" y="404" fill="#6b7688" font-size="12">(man)</text>
    <!-- 女 -->
    <circle cx="560" cy="340" r="8" fill="#1f2a44"/>
    <text x="576" y="336" fill="#1f2a44" font-size="17" font-weight="700">女</text>
    <text x="596" y="336" fill="#6b7688" font-size="12">(woman)</text>
    <!-- 王 -->
    <circle cx="330" cy="210" r="8" fill="#1f2a44"/>
    <text x="300" y="204" fill="#1f2a44" font-size="17" font-weight="700">王</text>
    <text x="320" y="204" fill="#6b7688" font-size="12">(king)</text>
    <!-- 計算結果 (王 - 男 + 女) -->
    <circle cx="620" cy="170" r="8" fill="none" stroke="#d99a2b" stroke-width="3"/>
    <text x="560" y="150" fill="#a5701a" font-size="13" font-weight="700">王 − 男 + 女（計算結果）</text>
    <!-- 女王 (actual) -->
    <circle cx="662" cy="196" r="8" fill="#1f2a44"/>
    <text x="678" y="200" fill="#1f2a44" font-size="17" font-weight="700">女王</text>
    <text x="712" y="200" fill="#6b7688" font-size="12">(queen)</text>
  </g>

  <!-- gap between computed point and actual queen -->
  <line x1="620" y1="170" x2="662" y2="196" stroke="#d99a2b" stroke-width="1.6" stroke-dasharray="3 3"/>
  <text x="612" y="236" fill="#a5701a" font-size="12">≈ ここがミソ：ぴったり一致ではなく「近く」に着く</text>

  <!-- honest note bar -->
  <rect x="40" y="452" width="880" height="66" rx="12" fill="#1f2a44"/>
  <text x="60" y="480" fill="#ffffff" font-size="14" font-weight="600">注：これは ≈（近似）であって ＝（厳密な等式）ではない。</text>
  <text x="60" y="503" fill="#c6d2e4" font-size="13">実際の意味空間は非線形で、きれいに揃うのは性別・単複など一部の分かりやすい方向だけ。生の座標は「下書き」で、文脈が清書する。</text>
</svg>
