<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Segoe UI','Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif">
  <!-- 静的表示（家訓）: authored 属性が最終可視状態。SMIL/reveal-gate 不使用。赤緑の善悪対比なし。数値はキット実測のみ。 -->
  <rect width="960" height="540" fill="#f7f9fc"/>

  <!-- Title band -->
  <rect x="0" y="0" width="960" height="92" fill="#1f2a44"/>
  <text x="40" y="46" fill="#ffffff" font-size="28" font-weight="700">文脈長スイープ ── proxy の死角</text>
  <text x="40" y="76" fill="#aebacc" font-size="16">短文脈だけの評価は、長文脈の劣化を過小に見る</text>

  <!-- Plot area -->
  <rect x="78" y="150" width="556" height="278" rx="10" fill="#ffffff" stroke="#d5dde8" stroke-width="2"/>

  <!-- short-context (proxy) region shade -->
  <rect x="118" y="176" width="96" height="220" fill="#e6ebf3"/>
  <text x="166" y="300" fill="#6b7688" font-size="12" text-anchor="middle">proxy は</text>
  <text x="166" y="316" fill="#6b7688" font-size="12" text-anchor="middle">ここだけ見る</text>

  <!-- axes -->
  <line x1="118" y1="176" x2="118" y2="396" stroke="#8a93a6" stroke-width="1.5"/>
  <line x1="118" y1="396" x2="610" y2="396" stroke="#8a93a6" stroke-width="1.5"/>
  <text x="124" y="170" fill="#41506a" font-size="12">Δnll（劣化）</text>
  <text x="364" y="418" fill="#41506a" font-size="13" text-anchor="middle">文脈長（短 → 長）</text>

  <!-- conservative (usable band) line -->
  <polyline points="118,360 241,357 364,356 487,355 610,354" fill="none" stroke="#5b6a86" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="250" y="348" fill="#5b6a86" font-size="12.5">控えめ（実用の帯）</text>

  <!-- aggressive line -->
  <polyline points="118,250 241,240 364,230 487,219 610,209" fill="none" stroke="#d99a2b" stroke-width="3"/>
  <circle cx="118" cy="250" r="4" fill="#d99a2b"/>
  <circle cx="610" cy="209" r="4" fill="#d99a2b"/>
  <text x="126" y="244" fill="#a5701a" font-size="13" font-weight="700">+0.45</text>
  <text x="604" y="202" fill="#a5701a" font-size="13" font-weight="700" text-anchor="end">+0.49</text>
  <text x="430" y="262" fill="#a5701a" font-size="13">≈1.6倍 PPL 悪化</text>

  <!-- Right panel: legend + notes -->
  <rect x="664" y="150" width="256" height="278" rx="12" fill="#ffffff" stroke="#d5dde8" stroke-width="2"/>
  <text x="682" y="178" fill="#1f2a44" font-size="15" font-weight="700">読み方</text>

  <rect x="682" y="196" width="22" height="10" fill="#d99a2b"/>
  <text x="712" y="205" fill="#41506a" font-size="13">攻めた線形化設定</text>
  <text x="712" y="226" fill="#6b7688" font-size="12.5">文脈が伸びるほど単調悪化</text>
  <text x="712" y="246" fill="#a5701a" font-size="13" font-weight="700">+0.45 → +0.49</text>

  <rect x="682" y="272" width="22" height="10" fill="#5b6a86"/>
  <text x="712" y="281" fill="#41506a" font-size="13">控えめ（実用の帯）</text>
  <text x="712" y="302" fill="#6b7688" font-size="12.5">30.8%削減で +7% PPL</text>

  <line x1="682" y1="322" x2="902" y2="322" stroke="#e0e6ef" stroke-width="1.4"/>
  <text x="682" y="348" fill="#41506a" font-size="13">短文脈 proxy は長文脈の</text>
  <text x="682" y="370" fill="#41506a" font-size="13">コストを過小検出する</text>
  <text x="682" y="400" fill="#2f6fb0" font-size="13" font-weight="700">→ 軸に沿って掃く</text>

  <!-- Footer -->
  <rect x="40" y="452" width="880" height="60" rx="12" fill="#1f2a44"/>
  <text x="480" y="481" fill="#ffffff" font-size="17" font-weight="600" text-anchor="middle">評価は『一点』でなく『軸に沿って掃く』</text>
  <text x="480" y="502" fill="#aebacc" font-size="13.5" text-anchor="middle">短文脈だけで通すと、長文脈で崩れるのを見逃す</text>
</svg>
