<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b6ea5"/>
    </marker>
    <marker id="arrowLoop" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0712f"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="300" fill="#f7f9fb"/>
  <text x="450" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#1f2d3d">スパイラル 1 サイクル</text>

  <!-- Row 1: steps 1-4 -->
  <g>
    <rect x="28"  y="70" width="150" height="52" rx="10" fill="#e9eef5" stroke="#3b6ea5" stroke-width="1.5"/>
    <text x="103" y="101" text-anchor="middle" font-size="14" fill="#1f2d3d">外部思想</text>

    <rect x="226" y="70" width="170" height="52" rx="10" fill="#e9eef5" stroke="#3b6ea5" stroke-width="1.5"/>
    <text x="311" y="101" text-anchor="middle" font-size="14" fill="#1f2d3d">Perplexity 要約</text>

    <rect x="444" y="70" width="190" height="52" rx="10" fill="#e9eef5" stroke="#3b6ea5" stroke-width="1.5"/>
    <text x="539" y="101" text-anchor="middle" font-size="14" fill="#1f2d3d">Claude Code 読込</text>

    <rect x="682" y="70" width="150" height="52" rx="10" fill="#e9eef5" stroke="#3b6ea5" stroke-width="1.5"/>
    <text x="757" y="101" text-anchor="middle" font-size="14" fill="#1f2d3d">要件化</text>
  </g>

  <!-- Row 1 arrows -->
  <line x1="178" y1="96" x2="222" y2="96" stroke="#3b6ea5" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="396" y1="96" x2="440" y2="96" stroke="#3b6ea5" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="634" y1="96" x2="678" y2="96" stroke="#3b6ea5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Connector row1 -> row2 (down from 要件化, across, into 実装) -->
  <path d="M757,122 L757,150 L539,150 L539,178" fill="none" stroke="#3b6ea5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 2: steps 5-7 -->
  <g>
    <rect x="444" y="180" width="150" height="52" rx="10" fill="#e9eef5" stroke="#3b6ea5" stroke-width="1.5"/>
    <text x="519" y="211" text-anchor="middle" font-size="14" fill="#1f2d3d">実装</text>

    <rect x="266" y="180" width="150" height="52" rx="10" fill="#e9eef5" stroke="#3b6ea5" stroke-width="1.5"/>
    <text x="341" y="211" text-anchor="middle" font-size="14" fill="#1f2d3d">ベンチ</text>

    <rect x="88"  y="180" width="150" height="52" rx="10" fill="#e9eef5" stroke="#3b6ea5" stroke-width="1.5"/>
    <text x="163" y="211" text-anchor="middle" font-size="14" fill="#1f2d3d">commit</text>
  </g>

  <!-- Row 2 arrows (right to left) -->
  <line x1="444" y1="206" x2="420" y2="206" stroke="#3b6ea5" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="266" y1="206" x2="242" y2="206" stroke="#3b6ea5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Loop back arrow: from commit back up to 外部思想 (next cycle) -->
  <path d="M88,206 L58,206 L58,96 L24,96" fill="none" stroke="#c0712f" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowLoop)"/>
  <text x="58" y="156" text-anchor="middle" font-size="13" fill="#c0712f" transform="rotate(-90 58 156)">次サイクル</text>
</svg>
