<svg xmlns="http://www.w3.org/2000/svg" width="900" height="780" viewBox="0 0 900 780" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="780" fill="#f8fafc"/>
  <text x="30" y="36" font-size="20" font-weight="700" fill="#0f172a">BriefRunner.submit() 의 트랜잭션 흐름</text>

  <!-- External client -->
  <rect x="320" y="56" width="260" height="44" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="450" y="83" font-size="15" font-weight="600" fill="#0c4a6e" text-anchor="middle">External client</text>

  <line x1="450" y1="100" x2="450" y2="128" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="460" y="120" font-size="12" fill="#475569">Brief (YAML / CLI / MCP)</text>

  <!-- BriefRunner.submit() -->
  <rect x="300" y="130" width="300" height="44" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450" y="157" font-size="15" font-weight="700" fill="#5b21b6" text-anchor="middle">BriefRunner.submit()</text>

  <line x1="450" y1="174" x2="450" y2="198" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ledger lane label -->
  <text x="828" y="216" font-size="13" font-weight="600" fill="#b45309" text-anchor="middle">ledger</text>
  <text x="828" y="232" font-size="11" fill="#92400e" text-anchor="middle">(append-only JSONL)</text>
  <line x1="828" y1="240" x2="828" y2="690" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- 1 -->
  <rect x="200" y="200" width="500" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="218" y="222" font-size="13" fill="#0f172a"><tspan font-weight="700">1.</tspan> brief_submitted</text>
  <line x1="700" y1="217" x2="820" y2="217" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2 optional -->
  <rect x="200" y="244" width="500" height="34" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="218" y="266" font-size="13" fill="#7c2d12"><tspan font-weight="700">2.</tspan> (선택) grounding_applied  (TRIZ × RAD citation)</text>

  <!-- 3 -->
  <rect x="200" y="288" width="500" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="218" y="310" font-size="13" fill="#0f172a"><tspan font-weight="700">3.</tspan> stimulus_built</text>
  <line x1="700" y1="305" x2="820" y2="305" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4 with substep -->
  <rect x="200" y="332" width="500" height="60" rx="8" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="218" y="354" font-size="13" fill="#0f172a"><tspan font-weight="700">4.</tspan> FullSenseLoop.process(stim)</text>
  <rect x="244" y="362" width="430" height="24" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="260" y="379" font-size="12" fill="#1e3a8a">└─ 6 stage loop (기존)</text>

  <!-- 5 -->
  <rect x="200" y="402" width="500" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="218" y="424" font-size="13" fill="#0f172a"><tspan font-weight="700">5.</tspan> loop_completed</text>
  <line x1="700" y1="419" x2="820" y2="419" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 6 -->
  <rect x="200" y="446" width="500" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="218" y="468" font-size="13" fill="#0f172a"><tspan font-weight="700">6.</tspan> decision</text>
  <line x1="700" y1="463" x2="820" y2="463" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 7 optional -->
  <rect x="200" y="490" width="500" height="34" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="218" y="512" font-size="13" fill="#7c2d12"><tspan font-weight="700">7.</tspan> (선택) governance_scored  (4 축)</text>

  <!-- 8 conditional -->
  <rect x="200" y="534" width="500" height="34" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="218" y="556" font-size="13" fill="#7f1d1d"><tspan font-weight="700">8.</tspan> Approval Bus gate  (PROPOSE / INTERVENE 일 때만)</text>

  <!-- 9 repeat -->
  <rect x="200" y="578" width="500" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="218" y="600" font-size="13" fill="#0f172a"><tspan font-weight="700">9.</tspan> tool_invoked × N</text>
  <line x1="700" y1="595" x2="820" y2="595" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 10 -->
  <rect x="200" y="622" width="500" height="34" rx="8" fill="#ecfdf5" stroke="#34d399" stroke-width="1.5"/>
  <text x="218" y="644" font-size="13" fill="#064e3b"><tspan font-weight="700">10.</tspan> outcome</text>
  <line x1="700" y1="639" x2="820" y2="639" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- spine -->
  <line x1="190" y1="217" x2="190" y2="639" stroke="#94a3b8" stroke-width="2"/>
  <line x1="190" y1="217" x2="200" y2="217" stroke="#94a3b8" stroke-width="2"/>
  <line x1="190" y1="261" x2="200" y2="261" stroke="#94a3b8" stroke-width="2"/>
  <line x1="190" y1="305" x2="200" y2="305" stroke="#94a3b8" stroke-width="2"/>
  <line x1="190" y1="362" x2="200" y2="362" stroke="#94a3b8" stroke-width="2"/>
  <line x1="190" y1="419" x2="200" y2="419" stroke="#94a3b8" stroke-width="2"/>
  <line x1="190" y1="463" x2="200" y2="463" stroke="#94a3b8" stroke-width="2"/>
  <line x1="190" y1="507" x2="200" y2="507" stroke="#94a3b8" stroke-width="2"/>
  <line x1="190" y1="551" x2="200" y2="551" stroke="#94a3b8" stroke-width="2"/>
  <line x1="190" y1="595" x2="200" y2="595" stroke="#94a3b8" stroke-width="2"/>
  <line x1="190" y1="639" x2="200" y2="639" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- legend -->
  <text x="30" y="712" font-size="12" fill="#475569"><tspan font-weight="600">범례:</tspan>  실선 테두리 = 필수 스텝</text>
  <rect x="250" y="702" width="22" height="14" rx="4" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="280" y="712" font-size="12" fill="#475569">= 선택 스텝</text>
  <line x1="380" y1="709" x2="412" y2="709" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="420" y="712" font-size="12" fill="#475569">= ledger 에 append</text>
  <text x="30" y="736" font-size="12" fill="#475569">모든 스텝은 하나의 트랜잭션으로 실행되어 append-only JSONL ledger 에 기록된다 (replay 가능).</text>
</svg>
