<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="560" fill="#f8fafc"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">MATH-02 形式検証ゲート</text>

  <!-- node 1 -->
  <rect x="300" y="56" width="300" height="46" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="84" text-anchor="middle" font-size="15" fill="#312e81">LLM 出力テキスト</text>
  <line x1="450" y1="102" x2="450" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- node 2 -->
  <rect x="270" y="132" width="360" height="46" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="450" y="160" text-anchor="middle" font-size="14" fill="#1e293b">[式抽出器] (MATH-03 multi-syntax parser)</text>
  <line x1="450" y1="178" x2="450" y2="206" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- node 3 -->
  <rect x="350" y="208" width="200" height="46" rx="10" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="450" y="236" text-anchor="middle" font-size="15" fill="#713f12">[Sympy AST]</text>

  <!-- branch lines -->
  <line x1="450" y1="254" x2="450" y2="284" stroke="#475569" stroke-width="2"/>
  <line x1="210" y1="284" x2="690" y2="284" stroke="#475569" stroke-width="2"/>
  <line x1="210" y1="284" x2="210" y2="312" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="690" y1="284" x2="690" y2="312" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- left branch: simplify -->
  <rect x="40" y="314" width="340" height="46" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="210" y="342" text-anchor="middle" font-size="14" fill="#1e293b">simplify(lhs - rhs) == 0 ?</text>

  <rect x="40" y="384" width="155" height="44" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="117" y="411" text-anchor="middle" font-size="14" fill="#14532d">&#10003; 通過</text>
  <rect x="225" y="384" width="155" height="44" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="302" y="411" text-anchor="middle" font-size="14" fill="#991b1b">&#10007; 失敗 flag</text>
  <line x1="160" y1="360" x2="117" y2="382" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="260" y1="360" x2="302" y2="382" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- right branch: Z3 -->
  <rect x="520" y="314" width="340" height="46" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="690" y="335" text-anchor="middle" font-size="13" fill="#1e293b">Z3 で satisfiability check</text>
  <text x="690" y="352" text-anchor="middle" font-size="12" fill="#475569">(&#8704; x. lhs(x) == rhs(x) ?)</text>

  <rect x="600" y="384" width="260" height="44" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="730" y="411" text-anchor="middle" font-size="13" fill="#991b1b">&#10007; 反例を ledger に記録</text>
  <line x1="730" y1="360" x2="730" y2="382" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>

  <text x="450" y="470" text-anchor="middle" font-size="13" fill="#64748b">SafeCalculator (MATH-08) では止められない記号幻覚を、Sympy + Z3 でゲートする</text>
</svg>
