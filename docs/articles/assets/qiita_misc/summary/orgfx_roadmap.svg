<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="760" fill="#f8fafc"/>
  <text x="450" y="36" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">ORG-FX 5 段階ロードマップ (Qwen 依存からの離脱)</text>

  <!-- Stage A -->
  <rect x="60" y="60" width="780" height="116" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.6"/>
  <text x="84" y="90" font-size="17" font-weight="700" fill="#1d4ed8">Stage A (短期, 〜3 ヶ月)</text>
  <text x="104" y="116" font-size="14" fill="#1e293b">├ LLM コアは凍結</text>
  <text x="104" y="139" font-size="14" fill="#1e293b">├ 周辺差別化を最大化</text>
  <text x="104" y="162" font-size="14" fill="#1e293b">└ CABT forward hook / MATH-08 / CREAT-01 で「LLM を使わない層」を厚く</text>

  <!-- Stage B -->
  <rect x="60" y="196" width="780" height="92" rx="12" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.6"/>
  <text x="84" y="226" font-size="17" font-weight="700" fill="#0e7490">Stage B (中期 1, 3〜6 ヶ月)</text>
  <text x="104" y="252" font-size="14" fill="#1e293b">├ LoRA で llive 用 specialised adapter</text>
  <text x="104" y="275" font-size="14" fill="#1e293b">├ RTX 3090 級で訓練可  &#8230;&#8195;└ Attention に memory bias 注入</text>

  <!-- Stage C -->
  <rect x="60" y="308" width="780" height="92" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.6"/>
  <text x="84" y="338" font-size="17" font-weight="700" fill="#15803d">Stage C (中期 2, 6〜12 ヶ月)</text>
  <text x="104" y="364" font-size="14" fill="#1e293b">├ Distillation: qwen2.5:14b → llive-7b</text>
  <text x="104" y="387" font-size="14" fill="#1e293b">├ 学習データ: RAD 49 分野 + ledger 成功例 + TRIZ 出力  &#8195;└ Multi-track sub-network</text>

  <!-- Stage D -->
  <rect x="60" y="420" width="780" height="92" rx="12" fill="#fefce8" stroke="#eab308" stroke-width="1.6"/>
  <text x="84" y="450" font-size="17" font-weight="700" fill="#a16207">Stage D (長期 1, 1〜2 年)</text>
  <text x="104" y="476" font-size="14" fill="#1e293b">├ Transformer block を memory-coupled に置換</text>
  <text x="104" y="499" font-size="14" fill="#1e293b">├ Cognitive Block Replacement (CABT-01〜07 本実装)  &#8195;└ Approval-native decoding</text>

  <!-- Stage E -->
  <rect x="60" y="532" width="780" height="92" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="1.6"/>
  <text x="84" y="562" font-size="17" font-weight="700" fill="#b91c1c">Stage E (長期 2, 2〜3 年)</text>
  <text x="104" y="588" font-size="14" fill="#1e293b">├ Transformer 以外の LLM コア (Mamba / RWKV / Hyena / RetNet)</text>
  <text x="104" y="611" font-size="14" fill="#1e293b">├ Surprise-native pretraining (Bayesian Surprise を loss に)  &#8195;└ TRIZ-guided architecture search</text>

  <!-- connectors -->
  <line x1="450" y1="176" x2="450" y2="194" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="450" y1="288" x2="450" y2="306" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="450" y1="400" x2="450" y2="418" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="450" y1="512" x2="450" y2="530" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <text x="450" y="660" text-anchor="middle" font-size="14" fill="#64748b">凍結 LLM コアの周辺強化から始め、段階的に LLM コア自体を独自化する</text>
</svg>
