<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" font-family="system-ui, sans-serif">
  <rect x="0" y="0" width="900" height="320" fill="#f8fafc"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Two-layer structure — complementary strategy and originalization in parallel</text>

  <rect x="50" y="64" width="800" height="80" rx="12" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.6"/>
  <text x="74" y="96" font-size="16" font-weight="700" fill="#0e7490">Track 1: Standing complementary strategy (Local-environment focused)</text>
  <text x="94" y="124" font-size="14" fill="#1e293b">- Value that stays invariant even as Qwen / Llama evolve</text>

  <rect x="50" y="160" width="800" height="80" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.6"/>
  <text x="74" y="192" font-size="16" font-weight="700" fill="#15803d">Track 2: Originalization as research (ORG-FX 5 stages)</text>
  <text x="94" y="220" font-size="14" fill="#1e293b">- Sustains research value over the mid-to-long term</text>

  <text x="450" y="282" text-anchor="middle" font-size="15" font-weight="600" fill="#475569">Both can run in parallel</text>
</svg>
