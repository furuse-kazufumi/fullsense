  </defs>
  <rect x="0" y="0" width="900" height="640" fill="#f8fafc"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">人間の思考フロー &#8596; llive のマッピング</text>

