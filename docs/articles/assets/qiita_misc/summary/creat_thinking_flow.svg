  <text x="670" y="575" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">BriefRunner.submit → Loop (実装済)</text>
  <line x1="420" y1="569" x2="480" y2="569" stroke="#6366f1" stroke-width="2" marker-start="url(#bi)" marker-end="url(#bi)"/>

  <!-- vertical down arrows on the human column -->
  <line x1="230" y1="122" x2="230" y2="156" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#down)"/>
  <line x1="230" y1="200" x2="230" y2="234" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#down)"/>
  <line x1="230" y1="278" x2="230" y2="312" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#down)"/>
  <line x1="230" y1="356" x2="230" y2="390" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#down)"/>
  <line x1="230" y1="434" x2="230" y2="468" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#down)"/>
  <line x1="230" y1="512" x2="230" y2="546" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#down)"/>
