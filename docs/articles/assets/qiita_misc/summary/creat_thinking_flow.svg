<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" viewBox="0 0 900 640" font-family="system-ui, sans-serif">
  <defs>
    <marker id="down" markerWidth="10" markerHeight="10" refX="3" refY="8" orient="auto">
      <path d="M0,0 L6,0 L3,8 Z" fill="#94a3b8"/>
    </marker>
    <marker id="bi" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
