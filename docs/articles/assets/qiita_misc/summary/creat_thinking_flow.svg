  <text x="670" y="66" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">[llive]</text>

  <!-- rows -->
  <!-- row 1 -->
  <rect x="40" y="80" width="380" height="42" rx="9" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.4"/>
