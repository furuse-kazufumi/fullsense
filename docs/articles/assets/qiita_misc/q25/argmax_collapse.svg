<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="320" fill="#ffffff"/>
  <text x="24" y="34" font-size="20" font-weight="700" fill="#1f2937">argmax 潰し — 多軸ベクトルが 1 本のスカラーに潰れる</text>

  <!-- 本来あるべき: multi-axis vector -->
  <text x="24" y="78" font-size="14" font-weight="600" fill="#059669">本来あるべき: pressure profile = 複数軸ベクトル</text>
  <rect x="24" y="92" width="120" height="40" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="84" y="117" font-size="13" fill="#065f46" text-anchor="middle">典型性</text>
  <rect x="156" y="92" width="120" height="40" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="216" y="117" font-size="13" fill="#065f46" text-anchor="middle">多様性</text>
  <rect x="288" y="92" width="120" height="40" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="348" y="117" font-size="13" fill="#065f46" text-anchor="middle">専門性</text>
  <rect x="420" y="92" width="120" height="40" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="480" y="117" font-size="13" fill="#065f46" text-anchor="middle">...</text>

  <!-- collapse arrow -->
  <line x1="282" y1="146" x2="282" y2="196" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="298" y="178" font-size="14" font-weight="600" fill="#dc2626">argmax = max() で潰す (多目的性が消滅)</text>

  <!-- 実際の実装: single scalar -->
  <text x="24" y="232" font-size="14" font-weight="600" fill="#b91c1c">実際の実装: fitness = max(個体と各 archetype の類似度)</text>
  <rect x="24" y="246" width="120" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="84" y="271" font-size="13" font-weight="700" fill="#991b1b" text-anchor="middle">単一スカラー</text>
  <text x="160" y="271" font-size="13" fill="#6b7280">→ ちょっとでも似ていれば高得点 → すぐ天井 (満点インフレ)</text>
</svg>
