<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280" font-family="system-ui, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="280" fill="#ffffff"/>
  <text x="24" y="34" font-size="20" font-weight="700" fill="#1f2937">"안경"과 "도태기"의 2단 구조</text>

  <!-- row 1: individual -> lleval -> pressure profile -->
  <rect x="24" y="70" width="120" height="56" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="84" y="103" font-size="15" font-weight="600" fill="#3730a3" text-anchor="middle">개체</text>

  <line x1="144" y1="98" x2="208" y2="98" stroke="#374151" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="212" y="70" width="180" height="56" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="302" y="95" font-size="15" font-weight="700" fill="#1e40af" text-anchor="middle">lleval = 안경</text>
  <text x="302" y="115" font-size="12" fill="#1e3a8a" text-anchor="middle">(측정)</text>

  <line x1="392" y1="98" x2="456" y2="98" stroke="#374151" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="460" y="70" width="240" height="56" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="580" y="95" font-size="14" font-weight="600" fill="#15803d" text-anchor="middle">pressure profile</text>
  <text x="580" y="115" font-size="12" fill="#166534" text-anchor="middle">(복수 축의 case 벡터)</text>

  <!-- vertical connector down from pressure profile -->
  <line x1="580" y1="126" x2="580" y2="178" stroke="#374151" stroke-width="2" marker-end="url(#ar)"/>

  <!-- row 2: lldarwin -> next-gen parents -->
  <rect x="460" y="182" width="240" height="56" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="580" y="207" font-size="15" font-weight="700" fill="#92400e" text-anchor="middle">lldarwin = 도태기</text>
  <text x="580" y="227" font-size="12" fill="#78350f" text-anchor="middle">(도태)</text>

  <line x1="460" y1="210" x2="396" y2="210" stroke="#374151" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="216" y="182" width="180" height="56" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="306" y="215" font-size="15" font-weight="600" fill="#3730a3" text-anchor="middle">다음 세대의 부모</text>

  <text x="24" y="262" font-size="12" fill="#b45309">#25 실패 = 양단 모두 고장 (안경 즉시 만점으로 측정 불가, 도태기 미배선)</text>
</svg>
