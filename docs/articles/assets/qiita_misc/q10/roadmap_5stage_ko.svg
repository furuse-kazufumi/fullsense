<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1180" viewBox="0 0 900 1180" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1,1 L11,6 L1,11 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="1180" fill="#f8fafc"/>
  <text x="450" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Qwen 의존에서 벗어나는 5 단계 로드맵</text>

  <!-- Stage A -->
  <rect x="120" y="70" width="660" height="150" rx="14" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
  <text x="150" y="105" font-size="19" font-weight="700" fill="#0c4a6e">Stage A (단기, 〜3 개월)</text>
  <text x="150" y="138" font-size="16" fill="#0f172a">• LLM 코어는 동결</text>
  <text x="150" y="166" font-size="16" fill="#0f172a">• 주변 차별화를 최대화</text>
  <text x="150" y="194" font-size="16" fill="#0f172a">• CABT forward hook / MATH-08 / CREAT-01 로 「LLM 을 쓰지 않는 계층」을 두껍게</text>
  <line x1="450" y1="220" x2="450" y2="248" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage B -->
  <rect x="120" y="255" width="660" height="150" rx="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="150" y="290" font-size="19" font-weight="700" fill="#1e3a8a">Stage B (중기 1, 3〜6 개월)</text>
  <text x="150" y="323" font-size="16" fill="#0f172a">• llive 용 specialised LoRA adapter</text>
  <text x="150" y="351" font-size="16" fill="#0f172a">• RTX 3090 급에서 훈련 가능</text>
  <text x="150" y="379" font-size="16" fill="#0f172a">• Attention 에 memory bias 주입 (CABT-07 본 구현의 전 단계)</text>
  <line x1="450" y1="405" x2="450" y2="433" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage C -->
  <rect x="120" y="440" width="660" height="150" rx="14" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="150" y="475" font-size="19" font-weight="700" fill="#3730a3">Stage C (중기 2, 6〜12 개월)</text>
  <text x="150" y="508" font-size="16" fill="#0f172a">• Distillation: qwen2.5:14b → llive-7b</text>
  <text x="150" y="536" font-size="16" fill="#0f172a">• 학습 데이터: RAD 49 분야 + ledger 성공 사례 + TRIZ 출력</text>
  <text x="150" y="564" font-size="16" fill="#0f172a">• Multi-track sub-network (EpistemicType 별)</text>
  <line x1="450" y1="590" x2="450" y2="618" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage D -->
  <rect x="120" y="625" width="660" height="150" rx="14" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="150" y="660" font-size="19" font-weight="700" fill="#5b21b6">Stage D (장기 1, 1〜2 년)</text>
  <text x="150" y="693" font-size="16" fill="#0f172a">• Transformer block 을 memory-coupled 로 치환</text>
  <text x="150" y="721" font-size="16" fill="#0f172a">• Cognitive Block Replacement (CABT-01〜07 의 본 구현)</text>
  <text x="150" y="749" font-size="16" fill="#0f172a">• Approval-native decoding (constitutional AI 의 architectural 버전)</text>
  <line x1="450" y1="775" x2="450" y2="803" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage E -->
  <rect x="120" y="810" width="660" height="150" rx="14" fill="#fae8ff" stroke="#c026d3" stroke-width="2"/>
  <text x="150" y="845" font-size="19" font-weight="700" fill="#86198f">Stage E (장기 2, 2〜3 년)</text>
  <text x="150" y="878" font-size="16" fill="#0f172a">• Transformer 이외의 LLM 코어 (Mamba / RWKV / Hyena / RetNet)</text>
  <text x="150" y="906" font-size="16" fill="#0f172a">• Surprise-native pretraining (Bayesian Surprise 를 loss 에 내장)</text>
  <text x="150" y="934" font-size="16" fill="#0f172a">• TRIZ-guided architecture search (AutoML-Zero + TRIZ 하이브리드)</text>

  <text x="450" y="1010" text-anchor="middle" font-size="16" fill="#475569">주변 강화 (동결) → LoRA → 증류 → block 치환 → 비 Transformer 코어</text>
  <text x="450" y="1042" text-anchor="middle" font-size="15" fill="#64748b">「Qwen 위에 래핑」에서 「Qwen 을 내장에서 빼낸다」로</text>
</svg>
