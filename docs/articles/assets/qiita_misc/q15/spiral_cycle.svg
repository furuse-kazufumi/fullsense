<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="300" fill="#f8fafc"/>
  <text x="450" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">スパイラル 1 サイクル</text>

  <!-- Row of 7 step boxes -->
  <!-- box1 -->
  <g>
    <rect x="24" y="72" width="110" height="56" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="79" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#0c4a6e">外部思想</text>
    <text x="79" y="118" text-anchor="middle" font-size="11" fill="#0369a1">(書籍/論文/動画)</text>
  </g>
  <line x1="134" y1="100" x2="156" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- box2 -->
  <g>
    <rect x="158" y="72" width="118" height="56" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="217" y="96" text-anchor="middle" font-size="14" font-weight="600" fill="#5b21b6">Perplexity</text>
    <text x="217" y="114" text-anchor="middle" font-size="13" fill="#5b21b6">要約</text>
  </g>
  <line x1="276" y1="100" x2="298" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- box3 -->
  <g>
    <rect x="300" y="72" width="128" height="56" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
    <text x="364" y="96" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">Claude Code</text>
    <text x="364" y="114" text-anchor="middle" font-size="13" fill="#166534">読込</text>
  </g>
  <line x1="428" y1="100" x2="450" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- box4 -->
  <g>
    <rect x="452" y="72" width="96" height="56" rx="10" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
    <text x="500" y="105" text-anchor="middle" font-size="14" font-weight="600" fill="#854d0e">要件化</text>
  </g>
  <line x1="548" y1="100" x2="570" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- box5 -->
  <g>
    <rect x="572" y="72" width="84" height="56" rx="10" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
    <text x="614" y="105" text-anchor="middle" font-size="14" font-weight="600" fill="#9a3412">実装</text>
  </g>
  <line x1="656" y1="100" x2="678" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- box6 -->
  <g>
    <rect x="680" y="72" width="84" height="56" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="722" y="105" text-anchor="middle" font-size="14" font-weight="600" fill="#991b1b">ベンチ</text>
  </g>
  <line x1="764" y1="100" x2="786" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- box7 -->
  <g>
    <rect x="788" y="72" width="88" height="56" rx="10" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <text x="832" y="105" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">commit</text>
  </g>

  <!-- Loop-back arrow: from box7 bottom, down, left across, up to box1 -->
  <path d="M832,128 L832,210 L79,210 L79,128" fill="none" stroke="#0ea5e9" stroke-width="2.5" marker-end="url(#arrowLoop)"/>
  <rect x="378" y="194" width="144" height="32" rx="8" fill="#f8fafc" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="450" y="215" text-anchor="middle" font-size="14" font-weight="600" fill="#0369a1">次サイクル</text>

  <text x="450" y="274" text-anchor="middle" font-size="12.5" fill="#64748b">外部思想が短時間で実装に着地する閉ループ — 要件 → 実装 → テスト → commit を数時間で完走</text>
</svg>
