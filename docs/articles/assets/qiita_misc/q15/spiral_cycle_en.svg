<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="300" fill="#f8fafc"/>
  <text x="450" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">One Spiral Cycle</text>

  <!-- box1 -->
  <g>
    <rect x="20" y="72" width="120" height="56" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="80" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#0c4a6e">External ideas</text>
    <text x="80" y="116" text-anchor="middle" font-size="10.5" fill="#0369a1">(books/papers/video)</text>
  </g>
  <line x1="140" y1="100" x2="160" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- box2 -->
  <g>
    <rect x="162" y="72" width="118" height="56" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="221" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">Perplexity</text>
    <text x="221" y="114" text-anchor="middle" font-size="12" fill="#5b21b6">summary</text>
  </g>
  <line x1="280" y1="100" x2="300" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- box3 -->
  <g>
    <rect x="302" y="72" width="128" height="56" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
    <text x="366" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">Claude Code</text>
    <text x="366" y="114" text-anchor="middle" font-size="12" fill="#166534">read-in</text>
  </g>
  <line x1="430" y1="100" x2="450" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- box4 -->
  <g>
    <rect x="452" y="72" width="104" height="56" rx="10" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
    <text x="504" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#854d0e">Requirements</text>
  </g>
  <line x1="556" y1="100" x2="576" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- box5 -->
  <g>
    <rect x="578" y="72" width="86" height="56" rx="10" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
    <text x="621" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412">Implement</text>
  </g>
  <line x1="664" y1="100" x2="682" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- box6 -->
  <g>
    <rect x="684" y="72" width="86" height="56" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="727" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">Benchmark</text>
  </g>
  <line x1="770" y1="100" x2="788" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- box7 -->
  <g>
    <rect x="790" y="72" width="86" height="56" rx="10" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <text x="833" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">commit</text>
  </g>

  <!-- Loop-back arrow -->
  <path d="M833,128 L833,210 L80,210 L80,128" fill="none" stroke="#0ea5e9" stroke-width="2.5" marker-end="url(#arrowLoop)"/>
  <rect x="372" y="194" width="156" height="32" rx="8" fill="#f8fafc" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="450" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="#0369a1">Next cycle</text>

  <text x="450" y="274" text-anchor="middle" font-size="12" fill="#64748b">A closed loop where external ideas land into implementation fast — requirements to commit within hours</text>
</svg>
