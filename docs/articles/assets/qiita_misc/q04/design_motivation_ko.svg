<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="430" fill="#f8fafc"/>

  <!-- Left column: current attention -->
  <text x="225" y="40" text-anchor="middle" font-size="19" font-weight="700" fill="#334155">현재의 attention</text>
  <rect x="30" y="58" width="390" height="50" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="225" y="89" text-anchor="middle" font-size="16" font-family="ui-monospace, monospace" fill="#0f172a">attn_output = softmax(QK^T) &#183; V</text>

  <rect x="30" y="150" width="390" height="200" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="225" y="185" text-anchor="middle" font-size="17" font-weight="700" fill="#4338ca">V (float[B, S, H])</text>
  <line x1="60" y1="205" x2="390" y2="205" stroke="#c7d2fe" stroke-width="1"/>
  <text x="225" y="245" text-anchor="middle" font-size="16" fill="#1e293b">값 그 자체</text>
  <text x="225" y="285" text-anchor="middle" font-size="16" fill="#b91c1c">메타 정보를 보유 불가</text>

  <!-- Right column: CABT replacement -->
  <text x="675" y="40" text-anchor="middle" font-size="19" font-weight="700" fill="#334155">CABT 의 치환안</text>
  <rect x="480" y="58" width="390" height="78" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="675" y="86" text-anchor="middle" font-size="16" font-family="ui-monospace, monospace" fill="#0f172a">ref_id = softmax(QK^T)</text>
  <text x="675" y="116" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#0f172a">attn_output = lookup(ref_id) + metadata_bias</text>

  <rect x="480" y="150" width="390" height="200" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="675" y="185" text-anchor="middle" font-size="17" font-weight="700" fill="#047857">token table</text>
  <line x1="510" y1="205" x2="840" y2="205" stroke="#a7f3d0" stroke-width="1"/>
  <text x="675" y="245" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#1e293b">(id, embedding, metadata)</text>
  <text x="675" y="285" text-anchor="middle" font-size="16" fill="#047857">참조 가능, 부가 정보 가능</text>

  <!-- Transformation arrow -->
  <line x1="430" y1="250" x2="470" y2="250" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="450" y="235" text-anchor="middle" font-size="14" fill="#475569">치환</text>

  <!-- Caption -->
  <text x="450" y="395" text-anchor="middle" font-size="15" fill="#64748b">값 혼합 (메타 정보 없음) &#8594; 참조 포인터 선택 + metadata 집약</text>
</svg>
