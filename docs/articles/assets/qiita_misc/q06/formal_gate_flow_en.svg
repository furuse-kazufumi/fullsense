<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="#f8fafc"/>

  <!-- LLM output -->
  <rect x="320" y="20" width="260" height="48" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="450" y="49" text-anchor="middle" font-size="16" fill="#0c4a6e">LLM output text</text>

  <line x1="450" y1="68" x2="450" y2="98" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Formula extractor -->
  <rect x="200" y="98" width="500" height="56" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450" y="122" text-anchor="middle" font-size="15" fill="#4c1d95">[Formula extractor] (MATH-03 multi-syntax parser,</text>
  <text x="450" y="142" text-anchor="middle" font-size="15" fill="#4c1d95">LaTeX / MathML / Sympy)</text>

  <line x1="450" y1="154" x2="450" y2="184" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Sympy AST -->
  <rect x="350" y="184" width="200" height="48" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="450" y="213" text-anchor="middle" font-size="16" fill="#713f12">[Sympy AST]</text>

  <!-- branch split -->
  <line x1="450" y1="232" x2="450" y2="260" stroke="#475569" stroke-width="1.5"/>
  <line x1="230" y1="260" x2="670" y2="260" stroke="#475569" stroke-width="1.5"/>
  <line x1="230" y1="260" x2="230" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="670" y1="260" x2="670" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Left branch: simplify -->
  <rect x="40" y="290" width="380" height="56" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="230" y="314" text-anchor="middle" font-size="15" fill="#14532d">simplify(lhs - rhs) == 0 ?</text>
  <text x="230" y="334" text-anchor="middle" font-size="13" fill="#166534">check the difference</text>

  <!-- simplify outcomes -->
  <line x1="160" y1="346" x2="160" y2="386" stroke="#15803d" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <rect x="50" y="386" width="220" height="40" rx="8" fill="#bbf7d0" stroke="#15803d" stroke-width="1.5"/>
  <text x="160" y="411" text-anchor="middle" font-size="14" fill="#14532d">✅ pass</text>

  <line x1="300" y1="346" x2="300" y2="386" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="290" y="386" width="120" height="40" rx="8" fill="#fee2e2" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="350" y="411" text-anchor="middle" font-size="14" fill="#7f1d1d">❌ failure flag</text>

  <!-- Right branch: Z3 -->
  <rect x="480" y="290" width="380" height="56" rx="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="670" y="314" text-anchor="middle" font-size="15" fill="#312e81">satisfiability check with Z3</text>
  <text x="670" y="334" text-anchor="middle" font-size="14" fill="#3730a3">(∀ x. lhs(x) == rhs(x) ?)</text>

  <!-- Z3 outcome -->
  <line x1="670" y1="346" x2="670" y2="386" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="490" y="386" width="360" height="48" rx="8" fill="#fee2e2" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="670" y="415" text-anchor="middle" font-size="14" fill="#7f1d1d">❌ record the counterexample in the ledger</text>

  <!-- caption -->
  <text x="450" y="478" text-anchor="middle" font-size="13" fill="#64748b">MATH-02 formal verification gate: LLM output -&gt; extract -&gt; verify equation truth with Sympy / Z3</text>
</svg>
