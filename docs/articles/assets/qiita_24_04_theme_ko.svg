<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" role="img" aria-label="#24-04 theme: B-series 수렴형 최적화 ε-greedy bandit + UCB1" style="width:100%;height:auto;max-width:1200px">
  <title>B-series: SynapticSelector ε-greedy + UCB1 bandit 시각화</title>
  <rect width="1000" height="280" fill="#0f172a"/>
  <text x="500" y="28" font-family="-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0" text-anchor="middle">「수렴하는 뇌」B-series: SynapticSelector ε-greedy × UCB1 × Hebbian</text>

  <!-- 5 bandit arms (variants) -->
  <g transform="translate(80, 80)" font-family="-apple-system,sans-serif">
    <text x="0" y="-12" font-size="11" fill="#a5b4fc">5 variants (bandit arms) — UCB1이 탐색 / 활용을 balance</text>
    <g>
      <!-- arm 1 -->
      <g transform="translate(0, 0)">
        <rect width="160" height="60" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
        <text x="14" y="22" font-size="11" fill="#22c55e" font-weight="700">arm 1 (최적)</text>
        <rect x="14" y="32" width="110" height="8" fill="#22c55e">
          <animate attributeName="width" values="0;110;110" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite"/>
        </rect>
        <text x="138" y="40" font-size="9" fill="#94a3b8" text-anchor="end">μ̂=0.82</text>
      </g>
      <g transform="translate(180, 0)">
        <rect width="160" height="60" rx="8" fill="#1e293b" stroke="#a78bfa"/>
        <text x="14" y="22" font-size="11" fill="#a78bfa" font-weight="700">arm 2</text>
        <rect x="14" y="32" width="0" height="8" fill="#a78bfa">
          <animate attributeName="width" values="0;72;72" keyTimes="0;0.5;1" dur="3s" begin="0.4s" repeatCount="indefinite"/>
        </rect>
        <text x="138" y="40" font-size="9" fill="#94a3b8" text-anchor="end">μ̂=0.54</text>
      </g>
      <g transform="translate(360, 0)">
        <rect width="160" height="60" rx="8" fill="#1e293b" stroke="#22d3ee"/>
        <text x="14" y="22" font-size="11" fill="#22d3ee" font-weight="700">arm 3</text>
        <rect x="14" y="32" width="0" height="8" fill="#22d3ee">
          <animate attributeName="width" values="0;88;88" keyTimes="0;0.5;1" dur="3s" begin="0.8s" repeatCount="indefinite"/>
        </rect>
        <text x="138" y="40" font-size="9" fill="#94a3b8" text-anchor="end">μ̂=0.66</text>
      </g>
      <g transform="translate(540, 0)">
        <rect width="160" height="60" rx="8" fill="#1e293b" stroke="#fb923c"/>
        <text x="14" y="22" font-size="11" fill="#fb923c" font-weight="700">arm 4 (UCB)</text>
        <rect x="14" y="32" width="0" height="8" fill="#fb923c">
          <animate attributeName="width" values="0;50;50" keyTimes="0;0.5;1" dur="3s" begin="1.2s" repeatCount="indefinite"/>
        </rect>
        <text x="138" y="40" font-size="9" fill="#94a3b8" text-anchor="end">μ̂=0.38</text>
        <!-- exploration bonus indicator -->
        <circle cx="80" cy="50" r="10" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.6">
          <animate attributeName="r" values="6;14;6" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
        </circle>
      </g>
      <g transform="translate(720, 0)">
        <rect width="160" height="60" rx="8" fill="#1e293b" stroke="#f472b6"/>
        <text x="14" y="22" font-size="11" fill="#f472b6" font-weight="700">arm 5</text>
        <rect x="14" y="32" width="0" height="8" fill="#f472b6">
          <animate attributeName="width" values="0;42;42" keyTimes="0;0.5;1" dur="3s" begin="1.6s" repeatCount="indefinite"/>
        </rect>
        <text x="138" y="40" font-size="9" fill="#94a3b8" text-anchor="end">μ̂=0.32</text>
      </g>
    </g>
  </g>

  <!-- Selection arrow rotating across arms (ε-greedy + UCB1 pick) -->
  <g transform="translate(80, 180)">
    <text x="0" y="-6" font-size="11" fill="#22c55e">SynapticSelector의 선택 이력 (상단 arm을 pick)</text>
    <g>
      <line x1="0" y1="20" x2="800" y2="20" stroke="#334155"/>
      <circle cy="20" r="6" fill="#fbbf24">
        <animate attributeName="cx" values="40;220;400;580;760;40" dur="6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <text x="500" y="262" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">UCB1 = μ̂ + √(2 ln t / n) — 시행 횟수 n이 적은 arm에도 보너스, exploration / exploitation을 자동 balance</text>
</svg>
