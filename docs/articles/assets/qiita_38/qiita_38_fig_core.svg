<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" role="img" aria-label="Memory core recurrence with leak (decay), saturation (tanh) and recurrent coupling (W), RWKV-style">
  <title>Memory core: leaky, saturating recurrence</title>
  <desc>State update s_{t+1} = decay * s_t + (1 - decay) * tanh(W s_t + V x_t); RWKV-style recurrence with leak and saturation.</desc>

  <rect width="800" height="520" fill="#f7f9fc"/>

  <text x="400" y="40" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1f2a44" text-anchor="middle">The memory core</text>
  <text x="400" y="66" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5a6477" text-anchor="middle">a leaky, saturating recurrence (RWKV-style)</text>

  <!-- Central formula -->
  <rect x="90" y="120" width="620" height="86" rx="10" fill="#ffffff" stroke="#3b7dd8" stroke-width="2"/>
  <text x="400" y="173" font-family="'Courier New', monospace" font-size="24" font-weight="700" fill="#1f2a44" text-anchor="middle">s&#8348;&#8330;&#8321; = decay &#8857; s&#8348; + (1 &#8722; decay) &#8857; tanh(W s&#8348; + V x&#8348;)</text>

  <!-- Callout: decay = leak -->
  <line x1="270" y1="206" x2="250" y2="280" stroke="#2e9e8f" stroke-width="1.5"/>
  <rect x="120" y="280" width="200" height="74" rx="8" fill="#dff0ec" stroke="#2e9e8f" stroke-width="1.8"/>
  <text x="138" y="306" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#1d7a6e">decay = leak</text>
  <text x="138" y="326" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#3a4459">fraction of the old state</text>
  <text x="138" y="343" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#3a4459">carried forward (memory)</text>

  <!-- Callout: tanh = saturation -->
  <line x1="470" y1="206" x2="400" y2="280" stroke="#8a55c4" stroke-width="1.5"/>
  <rect x="300" y="280" width="200" height="74" rx="8" fill="#ece2f7" stroke="#8a55c4" stroke-width="1.8"/>
  <text x="318" y="306" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#6f3fa8">tanh = saturation</text>
  <text x="318" y="326" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#3a4459">bounds the update to</text>
  <text x="318" y="343" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#3a4459">(&#8722;1, 1), keeps it stable</text>

  <!-- Callout: W = recurrent coupling -->
  <line x1="540" y1="206" x2="600" y2="280" stroke="#c9802e" stroke-width="1.5"/>
  <rect x="500" y="280" width="200" height="74" rx="8" fill="#fbf0df" stroke="#c9802e" stroke-width="1.8"/>
  <text x="518" y="306" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#a5651f">W = recurrent coupling</text>
  <text x="518" y="326" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#3a4459">state feeds back on itself;</text>
  <text x="518" y="343" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#3a4459">V x&#8348; injects the input</text>

  <!-- Mini recurrence diagram -->
  <g>
    <rect x="320" y="400" width="160" height="62" rx="10" fill="#e3eefb" stroke="#3b7dd8" stroke-width="2"/>
    <text x="400" y="436" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#2c5aa0" text-anchor="middle">state s&#8348;</text>

    <!-- input arrow in -->
    <defs>
      <marker id="ah2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0 0 L8 3 L0 6 Z" fill="#5a6477"/>
      </marker>
    </defs>
    <line x1="200" y1="431" x2="316" y2="431" stroke="#5a6477" stroke-width="2" marker-end="url(#ah2)"/>
    <text x="180" y="435" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5a6477" text-anchor="end">x&#8348;</text>

    <!-- self-loop (recurrence) -->
    <path d="M480 415 C560 390, 560 472, 480 447" fill="none" stroke="#c9802e" stroke-width="2" marker-end="url(#ah2)"/>
    <text x="572" y="435" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#a5651f">recurrence</text>
  </g>

  <text x="400" y="498" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7a8499" text-anchor="middle">leak retains, tanh bounds, W couples &#8212; a true recurrent memory, not a transformer block</text>
</svg>
