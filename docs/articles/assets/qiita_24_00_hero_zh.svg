<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="llive 完全解说 — 9 篇连载 hero (认知/优化/执行/贯穿 4 层, 公开/限定共享 状态 animated)" style="width:100%;height:auto;max-width:1200px">
  <title>llive 完全解说 — 9 篇连载: 认知 / 优化 / 执行 / 贯穿 4 层 × 8 章 + index</title>
  <desc>连载 #24-00 至 #24-08 以 4 层结构 animated 显示. 公开 = 绿色脉冲, 限定共享 = 黄色脉冲, 数据流以箭头动画呈现.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <symbol id="arrow" viewBox="0 0 24 12">
      <path d="M0 6 L20 6 L16 2 M20 6 L16 10" stroke="#94a3b8" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <rect width="1200" height="360" fill="url(#bgGrad)"/>

  <!-- title -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#e2e8f0">
    <text x="600" y="38" font-size="22" font-weight="700" text-anchor="middle">llive 完全解说 — 9 篇连载 (#24-00 → #24-08)</text>
    <text x="600" y="62" font-size="12" fill="#94a3b8" text-anchor="middle">构成本地 LLM 认知 OS 的 4 层 × 8 章</text>
  </g>

  <!-- ribbon: flowing accent across full width -->
  <rect x="0" y="78" width="1200" height="2" fill="url(#ribbon)">
    <animate attributeName="x" from="-1200" to="1200" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- 4 layers as columns; chapters as rounded boxes within each layer -->
  <!-- Layer column dims -->
  <!-- layer x: 60, 360, 660, 960 ; width 240 -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

    <!-- Layer 1: 認知層 (chapters 01, 02, 03) -->
    <g transform="translate(60, 100)">
      <text x="120" y="-6" font-size="13" fill="#a5b4fc" text-anchor="middle" font-weight="600">认知层</text>
      <rect x="0" y="0" width="240" height="220" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <!-- chapter 01: public -->
      <g transform="translate(20, 18)">
        <rect width="200" height="56" rx="10" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
        <text x="14" y="22" font-size="12" fill="#22c55e" font-weight="700">(1) memory layer</text>
        <text x="14" y="40" font-size="10" fill="#cbd5e1">4 层记忆 + surprise gate</text>
        <circle cx="186" cy="14" r="4" fill="#22c55e">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
        </circle>
      </g>
      <!-- chapter 02: private -->
      <g transform="translate(20, 80)">
        <rect width="200" height="56" rx="10" fill="#0f172a" stroke="#eab308" stroke-width="1.5"/>
        <text x="14" y="22" font-size="12" fill="#eab308" font-weight="700">(2) 思考因子 + COG-MESH</text>
        <text x="14" y="40" font-size="10" fill="#cbd5e1">10 因子 × 9 component</text>
        <circle cx="186" cy="14" r="4" fill="#eab308">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" begin="0.3s" repeatCount="indefinite"/>
        </circle>
      </g>
      <!-- chapter 03: private -->
      <g transform="translate(20, 142)">
        <rect width="200" height="56" rx="10" fill="#0f172a" stroke="#eab308" stroke-width="1.5"/>
        <text x="14" y="22" font-size="12" fill="#eab308" font-weight="700">(3) 结构进化 × TRIZ</text>
        <text x="14" y="40" font-size="10" fill="#cbd5e1">40 原理 + ChangeOp + Z3</text>
        <circle cx="186" cy="14" r="4" fill="#eab308">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>

    <!-- Layer 2: 最適化層 (chapters 04, 05) -->
    <g transform="translate(360, 100)">
      <text x="120" y="-6" font-size="13" fill="#fb923c" text-anchor="middle" font-weight="600">优化层</text>
      <rect x="0" y="0" width="240" height="220" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <g transform="translate(20, 18)">
        <rect width="200" height="56" rx="10" fill="#0f172a" stroke="#eab308" stroke-width="1.5"/>
        <text x="14" y="22" font-size="12" fill="#eab308" font-weight="700">(4) 收敛型 B-0..B-9</text>
        <text x="14" y="40" font-size="10" fill="#cbd5e1">SynapticSelector + UCB1</text>
        <circle cx="186" cy="14" r="4" fill="#eab308">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" begin="0.9s" repeatCount="indefinite"/>
        </circle>
      </g>
      <g transform="translate(20, 80)">
        <rect width="200" height="56" rx="10" fill="#0f172a" stroke="#eab308" stroke-width="1.5"/>
        <text x="14" y="22" font-size="12" fill="#eab308" font-weight="700">(5) 进化型 v0.B/C/D/E ★</text>
        <text x="14" y="40" font-size="10" fill="#cbd5e1">派生群体进化 (系列核心)</text>
        <circle cx="186" cy="14" r="4" fill="#eab308">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
        </circle>
      </g>
      <!-- decorative: pulse beat for the centerpiece chapter -->
      <circle cx="120" cy="190" r="14" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.5">
        <animate attributeName="r" values="14;24;14" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0;0.5" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <text x="120" y="194" font-size="10" fill="#fb923c" text-anchor="middle" font-weight="600">核心 (5)</text>
    </g>

    <!-- Layer 3: 実行層 (chapter 06) -->
    <g transform="translate(660, 100)">
      <text x="120" y="-6" font-size="13" fill="#a78bfa" text-anchor="middle" font-weight="600">执行层</text>
      <rect x="0" y="0" width="240" height="220" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <g transform="translate(20, 18)">
        <rect width="200" height="56" rx="10" fill="#0f172a" stroke="#eab308" stroke-width="1.5"/>
        <text x="14" y="22" font-size="12" fill="#eab308" font-weight="700">(6) LLM backend</text>
        <text x="14" y="40" font-size="10" fill="#cbd5e1">Mamba/Jamba/RWKV/Diffusion</text>
        <circle cx="186" cy="14" r="4" fill="#eab308">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" begin="1.5s" repeatCount="indefinite"/>
        </circle>
      </g>
      <!-- decorative: 4 backend dots cycling -->
      <g transform="translate(40, 100)">
        <circle cx="0" cy="0" r="6" fill="#a78bfa">
          <animate attributeName="opacity" values="1;0.2;0.2;0.2" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="50" cy="0" r="6" fill="#a78bfa">
          <animate attributeName="opacity" values="0.2;1;0.2;0.2" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="100" cy="0" r="6" fill="#a78bfa">
          <animate attributeName="opacity" values="0.2;0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="150" cy="0" r="6" fill="#a78bfa">
          <animate attributeName="opacity" values="0.2;0.2;0.2;1" dur="3s" repeatCount="indefinite"/>
        </circle>
        <text x="0" y="22" font-size="9" fill="#94a3b8" text-anchor="middle">Mamba</text>
        <text x="50" y="22" font-size="9" fill="#94a3b8" text-anchor="middle">Jamba</text>
        <text x="100" y="22" font-size="9" fill="#94a3b8" text-anchor="middle">RWKV</text>
        <text x="150" y="22" font-size="9" fill="#94a3b8" text-anchor="middle">Diff</text>
      </g>
      <text x="120" y="180" font-size="10" fill="#94a3b8" text-anchor="middle">non-transformer 5 候选</text>
    </g>

    <!-- Layer 4: 横断層 (chapters 07, 08) -->
    <g transform="translate(960, 100)">
      <text x="120" y="-6" font-size="13" fill="#f472b6" text-anchor="middle" font-weight="600">贯穿层</text>
      <rect x="0" y="0" width="240" height="220" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <g transform="translate(20, 18)">
        <rect width="200" height="56" rx="10" fill="#0f172a" stroke="#eab308" stroke-width="1.5"/>
        <text x="14" y="22" font-size="12" fill="#eab308" font-weight="700">(7) 观测 + 治理</text>
        <text x="14" y="40" font-size="10" fill="#cbd5e1">Approval Bus + Ed25519</text>
        <circle cx="186" cy="14" r="4" fill="#eab308">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" begin="1.8s" repeatCount="indefinite"/>
        </circle>
      </g>
      <g transform="translate(20, 80)">
        <rect width="200" height="56" rx="10" fill="#0f172a" stroke="#eab308" stroke-width="1.5"/>
        <text x="14" y="22" font-size="12" fill="#eab308" font-weight="700">(8) lleval</text>
        <text x="14" y="40" font-size="10" fill="#cbd5e1">honest disclosure 5+1 因子</text>
        <circle cx="186" cy="14" r="4" fill="#eab308">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" begin="2.1s" repeatCount="indefinite"/>
        </circle>
      </g>
      <!-- decorative: audit dots rotating -->
      <g transform="translate(120, 180)">
        <circle r="14" fill="none" stroke="#f472b6" stroke-width="0.8" opacity="0.6"/>
        <circle cx="14" cy="0" r="3" fill="#f472b6">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>

    <!-- Inter-layer flow arrows (animated dashes) -->
    <g stroke="#22d3ee" stroke-width="1.6" fill="none" opacity="0.8">
      <line x1="300" y1="210" x2="360" y2="210" stroke-dasharray="4 4">
        <animate attributeName="stroke-dashoffset" from="0" to="16" dur="1s" repeatCount="indefinite"/>
      </line>
      <line x1="600" y1="210" x2="660" y2="210" stroke-dasharray="4 4">
        <animate attributeName="stroke-dashoffset" from="0" to="16" dur="1s" repeatCount="indefinite"/>
      </line>
      <line x1="900" y1="210" x2="960" y2="210" stroke-dasharray="4 4">
        <animate attributeName="stroke-dashoffset" from="0" to="16" dur="1s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>

  <!-- legend -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" transform="translate(60, 340)">
    <circle cx="6" cy="-4" r="4" fill="#22c55e"/>
    <text x="16" y="0" font-size="11" fill="#cbd5e1">公开 (Qiita 首页露出)</text>
    <circle cx="170" cy="-4" r="4" fill="#eab308"/>
    <text x="180" y="0" font-size="11" fill="#cbd5e1">限定共享 (仅知道 URL 的人)</text>
    <text x="380" y="0" font-size="11" fill="#94a3b8">→ Loop 6s data flow ribbon</text>
    <text x="1130" y="0" font-size="10" fill="#64748b" text-anchor="end">#24-00 series hero</text>
  </g>
</svg>
