<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" font-family="Segoe UI, Arial, sans-serif">
<rect width="760" height="300" fill="#ffffff"/>
<text x="380" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">Certifier admit coverage vs the exact 2-norm certifier</text>
<text x="238" y="79" text-anchor="end" font-size="12.5" fill="#333">cert_two (exact 2^n)</text>
<rect x="250" y="60" width="380.0" height="26" fill="#7f7f7f"/>
<text x="636.0" y="79" font-size="12" fill="#333">1310  (100.0% of exact)</text>
<text x="238" y="121" text-anchor="end" font-size="12.5" fill="#333">cert_inf (O(n^2))</text>
<rect x="250" y="102" width="311.0" height="26" fill="#9bbb59"/>
<text x="567.0" y="121" font-size="12" fill="#333">1072  (81.8% of exact)</text>
<text x="238" y="163" text-anchor="end" font-size="12.5" fill="#333">B1 = sigma(M)+sigma(R)</text>
<rect x="250" y="144" width="112.3" height="26" fill="#d99694"/>
<text x="368.3" y="163" font-size="12" fill="#333">387  (29.5% of exact)</text>
<text x="238" y="205" text-anchor="end" font-size="12.5" fill="#333">B2 = sigma(|M|+R)  [1 SVD]</text>
<rect x="250" y="186" width="295.0" height="26" fill="#4f81bd"/>
<text x="551.0" y="205" font-size="12" fill="#333">1017  (77.6% of exact)</text>
<text x="238" y="247" text-anchor="end" font-size="12.5" fill="#333">cert_inf OR B2</text>
<rect x="250" y="228" width="331.3" height="26" fill="#8064a2"/>
<text x="587.3" y="247" font-size="12" fill="#333">1142  (87.2% of exact)</text>
<text x="250" y="288" font-size="11" fill="#666">n=8, 3000 random genes; all bounds 0 soundness violations. B2 recovers 78% of the 2^n reach at 1 SVD.</text></svg>
