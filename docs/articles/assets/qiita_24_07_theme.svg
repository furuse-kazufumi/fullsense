<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360" role="img" aria-label="#24-07 theme: Approval Bus + Ed25519 audit chain animation">
  <title>「審査つき AI」: Approval Bus + Ed25519 signature chain</title>
  <rect width="1000" height="360" fill="#0f172a"/>
  <text x="500" y="28" font-family="-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0" text-anchor="middle">「審査つき AI」: runtime_metadata × Approval Bus × Ed25519 audit chain</text>

  <!-- Left: incoming events (LLM actions / changes) -->
  <g transform="translate(70, 80)" font-family="-apple-system,sans-serif">
    <text x="0" y="-8" font-size="11" fill="#fb923c" font-weight="600">incoming events</text>
    <g>
      <g transform="translate(0, 10)">
        <rect width="140" height="34" rx="6" fill="#1e293b" stroke="#fb923c"/>
        <text x="10" y="14" font-size="10" fill="#fb923c" font-weight="700">LoRA attach</text>
        <text x="10" y="28" font-size="9" fill="#94a3b8">sha=a8f3...</text>
      </g>
      <g transform="translate(0, 56)">
        <rect width="140" height="34" rx="6" fill="#1e293b" stroke="#fb923c"/>
        <text x="10" y="14" font-size="10" fill="#fb923c" font-weight="700">DB write</text>
        <text x="10" y="28" font-size="9" fill="#94a3b8">target=memory.semantic</text>
      </g>
      <g transform="translate(0, 102)">
        <rect width="140" height="34" rx="6" fill="#1e293b" stroke="#fb923c"/>
        <text x="10" y="14" font-size="10" fill="#fb923c" font-weight="700">external API</text>
        <text x="10" y="28" font-size="9" fill="#94a3b8">target=https://...</text>
      </g>
      <g transform="translate(0, 148)">
        <rect width="140" height="34" rx="6" fill="#1e293b" stroke="#fb923c"/>
        <text x="10" y="14" font-size="10" fill="#fb923c" font-weight="700">tool call</text>
        <text x="10" y="28" font-size="9" fill="#94a3b8">target=fs.write</text>
      </g>
    </g>
  </g>

  <!-- Middle: Approval Bus (centerpiece with policies orbiting) -->
  <g transform="translate(500, 180)">
    <circle r="70" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <circle r="78" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.4">
      <animate attributeName="r" values="70;90;70" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="-4" font-size="13" font-weight="700" fill="#22d3ee" font-family="-apple-system,sans-serif" text-anchor="middle">Approval</text>
    <text x="0" y="14" font-size="13" font-weight="700" fill="#22d3ee" font-family="-apple-system,sans-serif" text-anchor="middle">Bus</text>
    <!-- 4 policies orbiting -->
    <g>
      <g>
        <circle cx="0" cy="-100" r="10" fill="#1e293b" stroke="#a78bfa"/>
        <text x="0" y="-96" font-size="8" fill="#a78bfa" font-family="-apple-system,sans-serif" text-anchor="middle">P1</text>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
      </g>
      <g>
        <circle cx="0" cy="-100" r="10" fill="#1e293b" stroke="#22c55e"/>
        <text x="0" y="-96" font-size="8" fill="#22c55e" font-family="-apple-system,sans-serif" text-anchor="middle">P2</text>
        <animateTransform attributeName="transform" type="rotate" from="90" to="450" dur="10s" repeatCount="indefinite"/>
      </g>
      <g>
        <circle cx="0" cy="-100" r="10" fill="#1e293b" stroke="#f472b6"/>
        <text x="0" y="-96" font-size="8" fill="#f472b6" font-family="-apple-system,sans-serif" text-anchor="middle">P3</text>
        <animateTransform attributeName="transform" type="rotate" from="180" to="540" dur="10s" repeatCount="indefinite"/>
      </g>
      <g>
        <circle cx="0" cy="-100" r="10" fill="#1e293b" stroke="#fb923c"/>
        <text x="0" y="-96" font-size="8" fill="#fb923c" font-family="-apple-system,sans-serif" text-anchor="middle">P4</text>
        <animateTransform attributeName="transform" type="rotate" from="270" to="630" dur="10s" repeatCount="indefinite"/>
      </g>
    </g>
  </g>

  <!-- Particles flowing left → Approval Bus -->
  <g fill="#fbbf24">
    <circle r="3">
      <animate attributeName="cx" values="210;430" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="98;180" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animate attributeName="cx" values="210;430" dur="3s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="144;180" dur="3s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animate attributeName="cx" values="210;430" dur="3s" begin="1.6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="190;180" dur="3s" begin="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animate attributeName="cx" values="210;430" dur="3s" begin="2.4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="236;180" dur="3s" begin="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Right: Ed25519 signature chain (block-chain-like) -->
  <g transform="translate(640, 80)" font-family="-apple-system,sans-serif">
    <text x="0" y="-8" font-size="11" fill="#22c55e" font-weight="600">Ed25519 audit chain</text>
    <g>
      <g transform="translate(0, 10)">
        <rect width="280" height="36" rx="6" fill="#1e293b" stroke="#22c55e"/>
        <text x="10" y="16" font-size="10" fill="#22c55e" font-weight="700">block #1</text>
        <text x="10" y="30" font-size="9" fill="#94a3b8">prev=null  sig=fa12c9...</text>
        <circle cx="262" cy="18" r="4" fill="#22c55e"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
      </g>
      <g transform="translate(0, 56)">
        <rect width="280" height="36" rx="6" fill="#1e293b" stroke="#22c55e"/>
        <text x="10" y="16" font-size="10" fill="#22c55e" font-weight="700">block #2</text>
        <text x="10" y="30" font-size="9" fill="#94a3b8">prev=fa12c9 sig=8d4e21...</text>
        <circle cx="262" cy="18" r="4" fill="#22c55e"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle>
      </g>
      <g transform="translate(0, 102)">
        <rect width="280" height="36" rx="6" fill="#1e293b" stroke="#22c55e"/>
        <text x="10" y="16" font-size="10" fill="#22c55e" font-weight="700">block #3</text>
        <text x="10" y="30" font-size="9" fill="#94a3b8">prev=8d4e21 sig=c75ab0...</text>
        <circle cx="262" cy="18" r="4" fill="#22c55e"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="1s" repeatCount="indefinite"/></circle>
      </g>
      <g transform="translate(0, 148)">
        <rect width="280" height="36" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="10" y="16" font-size="10" fill="#22d3ee" font-weight="700">block #4 (new)</text>
        <text x="10" y="30" font-size="9" fill="#94a3b8">prev=c75ab0 sig=...</text>
        <circle cx="262" cy="18" r="6" fill="none" stroke="#22d3ee" stroke-width="1.5">
          <animate attributeName="r" values="4;10;4" dur="1.5s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
    <!-- chain links -->
    <g stroke="#22c55e" stroke-width="1.5" fill="none">
      <line x1="140" y1="46" x2="140" y2="56"/>
      <line x1="140" y1="92" x2="140" y2="102"/>
      <line x1="140" y1="138" x2="140" y2="148"/>
    </g>
  </g>

  <text x="500" y="346" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">incoming event → Approval Bus (4 policy orbit) → Ed25519 で署名して block chain に append</text>
</svg>
