<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="Segoe UI, Hiragino Kaku Gothic ProN, Meiryo, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#8b949e"/>
    </marker>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#f85149"/>
    </marker>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#3fb950"/>
    </marker>
  </defs>
  <rect width="760" height="440" fill="url(#bg)"/>

  <text x="34" y="40" fill="#e6edf3" font-size="22" font-weight="700">テストが揺れたのは設計の臭い — 判定と I/O を分けた</text>
  <text x="34" y="64" fill="#8b949e" font-size="13.5">「判定」と「ファイル書き込み」が 1 関数に癒着 → flaky。判定を純関数に切り出すと決定的に。</text>

  <!-- divider between BEFORE / AFTER -->
  <line x1="380" y1="88" x2="380" y2="372" stroke="#21262d" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="200" y="106" fill="#f85149" font-size="14" font-weight="700" text-anchor="middle">BEFORE — 癒着 → flaky</text>
  <text x="560" y="106" fill="#3fb950" font-size="14" font-weight="700" text-anchor="middle">AFTER — 分離 → 決定的</text>

  <!-- ============ BEFORE (left) ============ -->
  <!-- input -->
  <rect x="48" y="124" width="120" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="108" y="142" fill="#c9d1d9" font-size="12.5" text-anchor="middle">能力検収 report</text>
  <text x="108" y="158" fill="#8b949e" font-size="11" text-anchor="middle">+ force フラグ</text>

  <!-- arrow into mixed box -->
  <line x1="108" y1="164" x2="108" y2="190" stroke="#8b949e" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- the mixed function (one box, two roles) -->
  <rect x="48" y="194" width="284" height="92" rx="8" fill="#161b22" stroke="#da3633" stroke-width="1.8"/>
  <text x="190" y="214" fill="#f85149" font-size="12.5" font-weight="700" text-anchor="middle">1 つの関数に判定 + I/O が混在</text>
  <rect x="66" y="226" width="118" height="46" rx="5" fill="#1c2128" stroke="#d29922" stroke-width="1.3"/>
  <text x="125" y="245" fill="#d29922" font-size="12" text-anchor="middle">PASS/FAIL 判定</text>
  <text x="125" y="262" fill="#8b949e" font-size="10.5" text-anchor="middle">(非決定の経路)</text>
  <rect x="196" y="226" width="118" height="46" rx="5" fill="#1c2128" stroke="#30363d" stroke-width="1.3"/>
  <text x="255" y="245" fill="#c9d1d9" font-size="12" text-anchor="middle">ファイル書込</text>
  <text x="255" y="262" fill="#8b949e" font-size="10.5" text-anchor="middle">(副作用 I/O)</text>

  <!-- arrow to test result -->
  <line x1="190" y1="286" x2="190" y2="312" stroke="#f85149" stroke-width="1.8" marker-end="url(#arrR)"/>

  <!-- flaky test outcome -->
  <rect x="60" y="316" width="260" height="44" rx="8" fill="#161b22" stroke="#da3633" stroke-width="1.5"/>
  <text x="190" y="335" fill="#f85149" font-size="13" font-weight="700" text-anchor="middle">CLI 丸ごとテスト = PASS/FAIL が揺れる</text>
  <text x="190" y="352" fill="#8b949e" font-size="11" text-anchor="middle">int8 ノイズで top-1 が境界をまたぐ</text>

  <!-- ============ AFTER (right) ============ -->
  <!-- input -->
  <rect x="408" y="124" width="138" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="477" y="142" fill="#c9d1d9" font-size="12" text-anchor="middle">report, force</text>
  <text x="477" y="158" fill="#8b949e" font-size="10.5" text-anchor="middle">(同入力 → 同出力)</text>

  <!-- pure function -->
  <line x1="477" y1="164" x2="477" y2="186" stroke="#3fb950" stroke-width="1.6" marker-end="url(#arrG)"/>
  <rect x="396" y="190" width="318" height="58" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.8"/>
  <text x="555" y="210" fill="#3fb950" font-size="13" font-weight="700" text-anchor="middle">純関数で判定だけ切り出し</text>
  <text x="555" y="230" fill="#c9d1d9" font-size="12" text-anchor="middle" font-family="Consolas, monospace">_should_promote → (bool, reason)</text>
  <text x="555" y="242" fill="#8b949e" font-size="10" text-anchor="middle">副作用なし・ファイルは書かない</text>

  <!-- split into two deterministic test lanes -->
  <line x1="470" y1="248" x2="470" y2="268" stroke="#3fb950" stroke-width="1.6" marker-end="url(#arrG)"/>
  <line x1="640" y1="248" x2="640" y2="268" stroke="#3fb950" stroke-width="1.6" marker-end="url(#arrG)"/>

  <rect x="396" y="272" width="156" height="60" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="474" y="291" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle">判定の単体テスト</text>
  <text x="474" y="309" fill="#c9d1d9" font-size="11" text-anchor="middle">gate=PASS/FAIL/未測定</text>
  <text x="474" y="324" fill="#c9d1d9" font-size="11" text-anchor="middle">の 3 通り × force</text>

  <rect x="558" y="272" width="156" height="60" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="636" y="291" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle">CLI は決定的経路のみ</text>
  <text x="636" y="309" fill="#c9d1d9" font-size="10.5" text-anchor="middle" font-family="Consolas, monospace">--min-retention 0.0 → PASS</text>
  <text x="636" y="324" fill="#c9d1d9" font-size="10.5" text-anchor="middle">コーパス無 → 必ず拒否</text>

  <!-- result strip -->
  <text x="555" y="356" fill="#3fb950" font-size="12.5" font-weight="700" text-anchor="middle">→ flaky 消滅(リトライではなく分離で)</text>

  <!-- footer -->
  <line x1="34" y1="398" x2="726" y2="398" stroke="#21262d" stroke-width="1"/>
  <text x="34" y="420" fill="#8b949e" font-size="12.5">テストの書きにくさ・揺れは「テストを直せ」でなく<tspan fill="#c9d1d9" font-weight="700">「設計を分けろ」という無料のレビュアー</tspan>。判定を純関数へ。</text>
</svg>
