<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="Segoe UI, Hiragino Kaku Gothic ProN, Meiryo, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="760" height="440" fill="url(#bg)"/>

  <text x="34" y="40" fill="#e6edf3" font-size="22" font-weight="700">「PASS」でも能力は半減 — 単一スコアが見逃した崖</text>
  <text x="34" y="64" fill="#8b949e" font-size="13.5">2bit 量子化・極小 char-LM(自宅 CPU PoC)。ゆるい PPL ゲートは通過、top-1 正解率は実測でほぼ半減。</text>

  <!-- left: bar chart of top-1 before/after. plot x 90..430, baseline y 330, top y 120 (0..30%) -->
  <line x1="90" y1="330" x2="430" y2="330" stroke="#30363d" stroke-width="2"/>
  <line x1="90" y1="120" x2="90" y2="330" stroke="#30363d" stroke-width="2"/>
  <text x="34" y="112" fill="#6e7681" font-size="12">top-1 正解率 (%)</text>

  <!-- y gridlines 10/20/30 -->
  <line x1="90" y1="260" x2="430" y2="260" stroke="#21262d" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="84" y="264" fill="#6e7681" font-size="11" text-anchor="end">10</text>
  <line x1="90" y1="190" x2="430" y2="190" stroke="#21262d" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="84" y="194" fill="#6e7681" font-size="11" text-anchor="end">20</text>
  <line x1="90" y1="120" x2="430" y2="120" stroke="#21262d" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="84" y="124" fill="#6e7681" font-size="11" text-anchor="end">30</text>

  <!-- bar1: 圧縮前 28.7% -> h=200.9, top y=129 -->
  <rect x="150" y="129" width="80" height="201" rx="3" fill="#3fb950"/>
  <text x="190" y="121" fill="#3fb950" font-size="14" font-weight="700" text-anchor="middle">28.7%</text>
  <text x="190" y="350" fill="#8b949e" font-size="12" text-anchor="middle">圧縮前</text>

  <!-- bar2: 2bit 後 15.2% -> h=106.4, top y=224 -->
  <rect x="290" y="224" width="80" height="106" rx="3" fill="#f85149"/>
  <text x="330" y="216" fill="#f85149" font-size="14" font-weight="700" text-anchor="middle">15.2%</text>
  <text x="330" y="350" fill="#8b949e" font-size="12" text-anchor="middle">2bit 後</text>

  <!-- drop annotation -->
  <path d="M230 134 q60 6 92 86" fill="none" stroke="#d29922" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="300" y="170" fill="#d29922" font-size="12.5" font-weight="700" text-anchor="middle">−13.5pp ≈ ほぼ半減</text>

  <!-- right: the two verdicts -->
  <text x="470" y="112" fill="#e6edf3" font-size="14" font-weight="700">同じモデル、2つの判定</text>

  <rect x="470" y="128" width="256" height="78" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="486" y="152" fill="#3fb950" font-size="14" font-weight="700">✓ ゆるい PPL ゲート → PASS</text>
  <text x="486" y="174" fill="#c9d1d9" font-size="11">PPL 101.1 &lt; 183(=素朴予測よりマシ、の床)</text>
  <text x="486" y="194" fill="#8b949e" font-size="12">床がゆるすぎて半壊モデルを通した。</text>

  <rect x="470" y="218" width="256" height="78" rx="8" fill="#161b22" stroke="#da3633" stroke-width="1.5"/>
  <text x="486" y="242" fill="#f85149" font-size="14" font-weight="700">✗ 能力 97% 維持ゲート → FAIL</text>
  <text x="486" y="264" fill="#c9d1d9" font-size="12.5">圧縮前=100% に対し <tspan fill="#f85149" font-weight="700">53% しか残存</tspan></text>
  <text x="486" y="284" fill="#8b949e" font-size="12">「わからない時は落とす」fail-closed。</text>

  <!-- footer -->
  <line x1="34" y1="398" x2="726" y2="398" stroke="#21262d" stroke-width="1"/>
  <text x="34" y="420" fill="#8b949e" font-size="12.5">良い点が出たことより<tspan fill="#c9d1d9" font-weight="700">「悪いものを落とせる検査か」</tspan>。同じ数字でも、ゲートの引き方で PASS にも FAIL にもなる。</text>
</svg>
