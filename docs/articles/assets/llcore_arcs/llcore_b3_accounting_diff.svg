<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="Segoe UI, Hiragino Kaku Gothic ProN, Meiryo, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="760" height="440" fill="url(#bg)"/>

  <text x="34" y="40" fill="#e6edf3" font-size="22" font-weight="700">「捏造」の正体は 1.57MB の causal-mask buffer</text>
  <text x="34" y="64" fill="#8b949e" font-size="13.5">同じ realp1 モデルの fp32 footprint。差は嘘ではなく「何を数えたか(会計基準)」の違い。</text>

  <!-- ===== left: stacked decomposition bar (my accounting) ===== -->
  <!-- scale: 49.23MB over height 240px. baseline y=350, so 1MB = 4.875px -->
  <!-- params 47.66MB -> 232.3px ; mask 1.57MB -> 7.65px -->
  <text x="60" y="104" fill="#6e7681" font-size="12">fp32 footprint (MB)</text>

  <!-- axis -->
  <line x1="60" y1="350" x2="60" y2="110" stroke="#30363d" stroke-width="2"/>
  <line x1="60" y1="350" x2="300" y2="350" stroke="#30363d" stroke-width="2"/>

  <!-- params block: 47.66MB, from y=350 up 232.3 -> top y=117.7 -->
  <rect x="120" y="117.7" width="92" height="232.3" rx="3" fill="#3fb950"/>
  <text x="166" y="240" fill="#0d1117" font-size="13" font-weight="700" text-anchor="middle">params</text>
  <text x="166" y="258" fill="#0d1117" font-size="13" font-weight="700" text-anchor="middle">47.66 MB</text>

  <!-- mask block: 1.57MB sits ON TOP of params -> from y=117.7 up 7.65 -> top y=110.05 -->
  <rect x="120" y="110.05" width="92" height="7.65" fill="#d29922"/>

  <!-- mask callout to the right of the thin amber slab -->
  <line x1="212" y1="113.9" x2="246" y2="113.9" stroke="#d29922" stroke-width="1.5"/>
  <text x="250" y="110" fill="#d29922" font-size="12.5" font-weight="700">causal-mask buffer</text>
  <text x="250" y="127" fill="#d29922" font-size="12.5" font-weight="700">+1.57 MB</text>

  <!-- total label -->
  <text x="166" y="372" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">= 49.23 MB</text>
  <text x="166" y="389" fill="#8b949e" font-size="11.5" text-anchor="middle">params + buffers 会計</text>

  <!-- ===== middle: the factorisation of the gap ===== -->
  <text x="430" y="108" fill="#e6edf3" font-size="14" font-weight="700">差 1,572,864 B を素因数分解</text>
  <rect x="430" y="120" width="296" height="62" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="448" y="150" fill="#d29922" font-size="17" font-weight="700">6 × 256 × 256 × 4</text>
  <text x="448" y="171" fill="#8b949e" font-size="11.5">層数 6 × 文脈 256² × fp32 4B = mask 6 層ぶん</text>

  <!-- ===== two verdicts ===== -->
  <rect x="430" y="196" width="296" height="74" rx="8" fill="#161b22" stroke="#da3633" stroke-width="1.5"/>
  <text x="448" y="220" fill="#f85149" font-size="13.5" font-weight="700">批評家: params-only = 47.66 MB</text>
  <text x="448" y="241" fill="#c9d1d9" font-size="12">11,914,752 params × 4B、mask を数えない</text>
  <text x="448" y="260" fill="#8b949e" font-size="11.5">→「49.23 は捏造だ(CRITICAL)」と断じた</text>

  <rect x="430" y="284" width="296" height="96" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="448" y="308" fill="#3fb950" font-size="13.5" font-weight="700">私: params + buffers = 49.23 MB</text>
  <text x="448" y="329" fill="#c9d1d9" font-size="12">RAM 常駐の重み系を数える resident 会計</text>
  <text x="448" y="348" fill="#8b949e" font-size="11.5">mask 込みで int8 削減率は <tspan fill="#c9d1d9" font-weight="700">71.6%</tspan></text>
  <text x="448" y="368" fill="#8b949e" font-size="11.5">と控えめ(underclaim)</text>

  <!-- footer -->
  <line x1="34" y1="398" x2="726" y2="398" stroke="#21262d" stroke-width="1"/>
  <text x="34" y="420" fill="#8b949e" font-size="12.5">どちらも嘘ではない。差の正体を<tspan fill="#c9d1d9" font-weight="700">バイト単位で素因数分解</tspan>するまで、捏造かどうかは分からなかった。</text>
</svg>
