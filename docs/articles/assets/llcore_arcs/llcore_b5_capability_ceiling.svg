<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="Segoe UI, Hiragino Kaku Gothic ProN, Meiryo, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arrR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#f85149"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3fb950"/>
    </marker>
    <marker id="arrN" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8b949e"/>
    </marker>
  </defs>
  <rect width="760" height="440" fill="url(#bg)"/>

  <text x="34" y="40" fill="#e6edf3" font-size="22" font-weight="700">賢さの天井は環境でなく構造 — だから北極星を動かした</text>
  <text x="34" y="64" fill="#8b949e" font-size="13.5">文字単位 tiny LM(realp1 / 11.9M params, CPU)。次の1文字 top-1=0.2866 が capability の上限を決める。</text>

  <!-- start node: the model -->
  <rect x="40" y="150" width="172" height="92" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="126" y="178" fill="#e6edf3" font-size="14" font-weight="700" text-anchor="middle">手元の文字単位 LM</text>
  <text x="126" y="200" fill="#c9d1d9" font-size="12.5" text-anchor="middle">realp1 / 11.9M params</text>
  <text x="126" y="220" fill="#8b949e" font-size="12" text-anchor="middle">語彙 3044・約32万字</text>

  <!-- top-1 ceiling badge -->
  <rect x="40" y="262" width="172" height="56" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="126" y="285" fill="#d29922" font-size="13" font-weight="700" text-anchor="middle">次の1文字 top-1 = 28.66%</text>
  <text x="126" y="305" fill="#8b949e" font-size="11.5" text-anchor="middle">3〜4文字に1文字あたる程度</text>

  <!-- split arrows from model to two paths -->
  <path d="M212 178 L286 130" fill="none" stroke="#f85149" stroke-width="2.5" marker-end="url(#arrR)"/>
  <path d="M212 214 L286 300" fill="none" stroke="#3fb950" stroke-width="2.5" marker-end="url(#arrG)"/>

  <!-- PATH A: capability (closed / red) -->
  <rect x="296" y="98" width="424" height="118" rx="10" fill="#161b22" stroke="#da3633" stroke-width="1.5"/>
  <text x="316" y="123" fill="#f85149" font-size="15" font-weight="700">✗ 賢さ(capability)を追う道</text>
  <text x="316" y="145" fill="#c9d1d9" font-size="12.5">top-1≈29% では意味の通る文・質問への回答は構造的に出ない</text>
  <text x="316" y="164" fill="#c9d1d9" font-size="12.5">「漱石の幽霊」= 文体の断片は出るが会話は不成立(富士山も出ず)</text>
  <!-- closed ceiling row -->
  <line x1="316" y1="178" x2="700" y2="178" stroke="#30363d" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="316" y="197" fill="#f85149" font-size="12.5" font-weight="700">天井は環境でなく本質</text>
  <text x="316" y="211" fill="#8b949e" font-size="11">文字単位・極小params・極小データ。賢くする道は構造的に閉じている。</text>

  <!-- PATH B: memory efficiency (open / green) -->
  <rect x="296" y="252" width="424" height="118" rx="10" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="316" y="277" fill="#3fb950" font-size="15" font-weight="700">✓ メモリ効率に賭ける道(北極星)</text>
  <text x="316" y="299" fill="#c9d1d9" font-size="12.5">同じ tiny LM でも「working set を小さく・予測可能に」は</text>
  <text x="316" y="318" fill="#c9d1d9" font-size="12.5">研究として意味のある実測と設計ができる勝てる土俵</text>
  <line x1="316" y1="332" x2="700" y2="332" stroke="#30363d" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="316" y="351" fill="#3fb950" font-size="12.5" font-weight="700">会話 LLM は分担</text>
  <text x="316" y="365" fill="#8b949e" font-size="11">会話が要る用途は既存の優秀な LLM を llmesh 経由で on-prem 実行。</text>

  <!-- pivot label between the two paths -->
  <text x="258" y="238" fill="#d29922" font-size="11" font-weight="700" text-anchor="middle">北極星を</text>
  <text x="258" y="252" fill="#d29922" font-size="11" font-weight="700" text-anchor="middle">切替</text>

  <!-- footer -->
  <line x1="34" y1="398" x2="726" y2="398" stroke="#21262d" stroke-width="1"/>
  <text x="34" y="420" fill="#8b949e" font-size="12.5">負けの告白は同時に<tspan fill="#c9d1d9" font-weight="700">戦略の宣言</tspan> — 賢さは既存 LLM に任せ、自分は「小さく・予測可能に」へ賭けた。</text>
</svg>
