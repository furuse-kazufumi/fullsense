<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1000 360" role="img" aria-label="#24-02 theme: 10 思考因子 radar + COG-MESH ring" style="width:100%;height:auto;max-width:1200px">
  <title>10 思考因子 radar pulse + COG-MESH 9 component</title>
  <defs>
    <radialGradient id="bg02" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
  </defs>
  <rect width="1000" height="360" fill="url(#bg02)"/>
  <text x="500" y="28" font-family="-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0" text-anchor="middle">「10 軸で考える AI」: 思考因子 radar × COG-MESH 9 component</text>

  <!-- 10-axis radar (left) -->
  <g transform="translate(250, 200)">
    <!-- grid rings -->
    <circle r="40" fill="none" stroke="#334155" stroke-width="0.6"/>
    <circle r="80" fill="none" stroke="#334155" stroke-width="0.6"/>
    <circle r="120" fill="none" stroke="#334155" stroke-width="0.6"/>
    <!-- 10 spokes + labels -->
    <g font-family="-apple-system,sans-serif" font-size="9" fill="#94a3b8">
      <line x1="0" y1="0" x2="0" y2="-130" stroke="#334155" stroke-width="0.6"/><text x="0" y="-140" text-anchor="middle">構造化</text>
      <line x1="0" y1="0" x2="76" y2="-105" stroke="#334155" stroke-width="0.6"/><text x="84" y="-110" text-anchor="middle">再構成</text>
      <line x1="0" y1="0" x2="124" y2="-40" stroke="#334155" stroke-width="0.6"/><text x="138" y="-38" text-anchor="middle">閉ループ</text>
      <line x1="0" y1="0" x2="124" y2="40" stroke="#334155" stroke-width="0.6"/><text x="138" y="44" text-anchor="middle">自己拡張</text>
      <line x1="0" y1="0" x2="76" y2="105" stroke="#334155" stroke-width="0.6"/><text x="86" y="118" text-anchor="middle">不確実性</text>
      <line x1="0" y1="0" x2="0" y2="130" stroke="#334155" stroke-width="0.6"/><text x="0" y="146" text-anchor="middle">探索</text>
      <line x1="0" y1="0" x2="-76" y2="105" stroke="#334155" stroke-width="0.6"/><text x="-84" y="118" text-anchor="middle">整合</text>
      <line x1="0" y1="0" x2="-124" y2="40" stroke="#334155" stroke-width="0.6"/><text x="-140" y="44" text-anchor="middle">来歴</text>
      <line x1="0" y1="0" x2="-124" y2="-40" stroke="#334155" stroke-width="0.6"/><text x="-140" y="-38" text-anchor="middle">多視点</text>
      <line x1="0" y1="0" x2="-76" y2="-105" stroke="#334155" stroke-width="0.6"/><text x="-86" y="-110" text-anchor="middle">現実接続</text>
    </g>
    <!-- pulsing polygon (radar value) -->
    <polygon points="0,-100 70,-95 100,-32 110,35 65,90 0,110 -65,90 -110,35 -100,-32 -70,-95"
             fill="#22d3ee" fill-opacity="0.25" stroke="#22d3ee" stroke-width="1.6">
      <animateTransform attributeName="transform" type="scale" values="0.92;1.08;0.92" dur="3.2s" repeatCount="indefinite"/>
    </polygon>
    <!-- center dot -->
    <circle r="4" fill="#22d3ee"/>
  </g>

  <!-- COG-MESH 9 component (right) ring layout -->
  <g transform="translate(720, 200)" font-family="-apple-system,sans-serif" font-size="9" fill="#cbd5e1">
    <text x="0" y="-150" font-size="12" fill="#a78bfa" font-weight="700" text-anchor="middle">COG-MESH (9 component)</text>
    <circle r="100" fill="none" stroke="#475569" stroke-width="0.6"/>
    <!-- 9 nodes around the ring + cycle pulse -->
    <g>
      <circle cx="0" cy="-100" r="14" fill="#1e293b" stroke="#a78bfa"/><text x="0" y="-97" text-anchor="middle" font-size="9" fill="#a78bfa">M01</text>
      <circle cx="64" cy="-77" r="14" fill="#1e293b" stroke="#a78bfa"/><text x="64" y="-74" text-anchor="middle" font-size="9" fill="#a78bfa">M02</text>
      <circle cx="98" cy="-17" r="14" fill="#1e293b" stroke="#a78bfa"/><text x="98" y="-14" text-anchor="middle" font-size="9" fill="#a78bfa">M03</text>
      <circle cx="86" cy="51" r="14" fill="#1e293b" stroke="#a78bfa"/><text x="86" y="54" text-anchor="middle" font-size="9" fill="#a78bfa">M04</text>
      <circle cx="34" cy="94" r="14" fill="#1e293b" stroke="#a78bfa"/><text x="34" y="97" text-anchor="middle" font-size="9" fill="#a78bfa">M05</text>
      <circle cx="-34" cy="94" r="14" fill="#1e293b" stroke="#a78bfa"/><text x="-34" y="97" text-anchor="middle" font-size="9" fill="#a78bfa">M06</text>
      <circle cx="-86" cy="51" r="14" fill="#1e293b" stroke="#a78bfa"/><text x="-86" y="54" text-anchor="middle" font-size="9" fill="#a78bfa">M07</text>
      <circle cx="-98" cy="-17" r="14" fill="#1e293b" stroke="#a78bfa"/><text x="-98" y="-14" text-anchor="middle" font-size="9" fill="#a78bfa">M08</text>
      <circle cx="-64" cy="-77" r="14" fill="#1e293b" stroke="#a78bfa"/><text x="-64" y="-74" text-anchor="middle" font-size="9" fill="#a78bfa">M09</text>
    </g>
    <!-- traveling pulse around the ring -->
    <circle r="6" fill="#22d3ee">
      <animateMotion dur="6s" repeatCount="indefinite" rotate="auto">
        <mpath xlink:href="#ringpath"/>
      </animateMotion>
    </circle>
    <path id="ringpath" d="M0,-100 A100,100 0 1 1 -0.1,-100 Z" fill="none" stroke="none"/>
  </g>

  <text x="500" y="346" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">10 axis radar pulse (思考因子) と 9-component COG-MESH ring (M01..M09) — 認知層の 2 軸表現</text>
</svg>
