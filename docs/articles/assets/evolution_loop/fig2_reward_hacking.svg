<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="'Segoe UI','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">
  <rect width="860" height="520" fill="#fdf7ee"/>
  <text x="430" y="40" text-anchor="middle" font-size="25" font-weight="700" fill="#2c3e50">審査員がすべて ― 味見しないと「盛り付けだけ豪華」が勝つ</text>
  <text x="430" y="68" text-anchor="middle" font-size="15" fill="#7f8c8d">これが 報酬ハッキング(reward hacking)：AI は中身でなく「審査の抜け道」を見つける</text>

  <!-- Panel A: lax judge -->
  <g>
    <rect x="30" y="92" width="386" height="378" rx="16" fill="#fbe9e7" stroke="#e57373" stroke-width="2"/>
    <text x="223" y="124" text-anchor="middle" font-size="18" font-weight="700" fill="#c0392b">✗ 甘い審査(見た目だけ)</text>

    <!-- fancy but bad dish -->
    <circle cx="130" cy="230" r="58" fill="#fff" stroke="#e0b0a0" stroke-width="2"/>
    <text x="130" y="222" text-anchor="middle" font-size="34">🍰</text>
    <text x="130" y="256" text-anchor="middle" font-size="12" fill="#c0392b">見た目◎ 味✗</text>

    <!-- judge only looks -->
    <text x="320" y="205" text-anchor="middle" font-size="34">👀</text>
    <text x="320" y="235" text-anchor="middle" font-size="13" fill="#8a3a32">審査員が</text>
    <text x="320" y="253" text-anchor="middle" font-size="13" fill="#8a3a32">味見しない</text>

    <rect x="70" y="320" width="306" height="120" rx="10" fill="#fff" stroke="#e57373"/>
    <text x="223" y="348" text-anchor="middle" font-size="15" font-weight="700" fill="#c0392b">→ 盛り付けだけ豪華な料理が満点</text>
    <text x="223" y="374" text-anchor="middle" font-size="13" fill="#5d6d7e">料理人は「味を良くする」でなく</text>
    <text x="223" y="394" text-anchor="middle" font-size="13" fill="#5d6d7e">「審査員の目を騙す」方向へ進化する</text>
    <text x="223" y="422" text-anchor="middle" font-size="12.5" fill="#a93226">実例:自己改造AI が“不具合報告のログを消して”検査を迂回し満点(DGM)</text>
  </g>

  <!-- Panel B: strict/grounded judge -->
  <g>
    <rect x="444" y="92" width="386" height="378" rx="16" fill="#e8f6ee" stroke="#66bb6a" stroke-width="2"/>
    <text x="637" y="124" text-anchor="middle" font-size="18" font-weight="700" fill="#1e8449">✓ 接地した審査(実際に味見)</text>

    <circle cx="544" cy="230" r="58" fill="#fff" stroke="#a9d5b6" stroke-width="2"/>
    <text x="544" y="222" text-anchor="middle" font-size="34">🍲</text>
    <text x="544" y="256" text-anchor="middle" font-size="12" fill="#1e8449">見た目○ 味◎</text>

    <text x="734" y="205" text-anchor="middle" font-size="34">👅</text>
    <text x="734" y="235" text-anchor="middle" font-size="13" fill="#227a48">実際に</text>
    <text x="734" y="253" text-anchor="middle" font-size="13" fill="#227a48">食べて採点</text>

    <rect x="484" y="320" width="306" height="120" rx="10" fill="#fff" stroke="#66bb6a"/>
    <text x="637" y="348" text-anchor="middle" font-size="15" font-weight="700" fill="#1e8449">→ 本当に美味しい料理が勝つ</text>
    <text x="637" y="374" text-anchor="middle" font-size="13" fill="#5d6d7e">評価器が (a)自動 (b)接地 (c)騙されにくい</text>
    <text x="637" y="394" text-anchor="middle" font-size="13" fill="#5d6d7e">の3条件を満たすとループが健全に回る</text>
    <text x="637" y="422" text-anchor="middle" font-size="12.5" fill="#1a7a43">対策例:安い審査で足切り／隠し点／審査員は書換え禁止</text>
  </g>

  <text x="430" y="500" text-anchor="middle" font-size="13" fill="#7f8c8d">教訓 ＝「異常に良い結果が出たら、勝った気になる前に内訳を疑う」(honest disclosure)そのもの</text>
</svg>
