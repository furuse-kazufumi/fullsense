    <text x="570" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#1f6391">③ 棚＝QD</text>
    <text x="570" y="185" text-anchor="middle" font-size="12" fill="#2a6f9e">名人を並べる</text>
    <rect x="486" y="200" width="168" height="36" rx="8" fill="#2e86c1"/>
    <text x="570" y="223" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">✓ 持っている</text>
  </g>
  <g>
    <rect x="690" y="100" width="200" height="150" rx="14" fill="#dff3e6" stroke="#27ae60" stroke-width="2.5"/>
