    <text x="790" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#1e8449">④ 選抜＝選択圧</text>
    <text x="790" y="185" text-anchor="middle" font-size="12" fill="#227a48">残すものを決める</text>
    <rect x="706" y="200" width="168" height="36" rx="8" fill="#27ae60"/>
    <text x="790" y="223" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">✓ 持っている</text>
  </g>

  <line x1="230" y1="175" x2="250" y2="175" stroke="#bdc3c7" stroke-width="2.5"/>
  <line x1="450" y1="175" x2="470" y2="175" stroke="#bdc3c7" stroke-width="2.5"/>
  <line x1="670" y1="175" x2="690" y2="175" stroke="#bdc3c7" stroke-width="2.5"/>

  <text x="130" y="292" text-anchor="middle" font-size="13" fill="#5d6d7e">↑ 今：パラメータいじり</text>
  <text x="130" y="312" text-anchor="middle" font-size="13.5" font-weight="700" fill="#b35a26">→ コードを LLM に書換えさせる</text>
  <text x="350" y="292" text-anchor="middle" font-size="13" fill="#5d6d7e">gaitlab の</text>
  <text x="350" y="312" text-anchor="middle" font-size="13.5" font-weight="700" fill="#a03328">fitness proxy(MuJoCo)</text>
  <text x="570" y="292" text-anchor="middle" font-size="13" fill="#5d6d7e">gaitlab の</text>
  <text x="570" y="312" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1f6391">MapElitesArchive</text>
  <text x="790" y="292" text-anchor="middle" font-size="13" fill="#5d6d7e">lldarwin の</text>
  <text x="790" y="312" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1e8449">ε-lexicase ＋ QD</text>

  <rect x="150" y="352" width="600" height="86" rx="12" fill="#fff" stroke="#f0a860" stroke-width="2"/>
  <text x="450" y="382" text-anchor="middle" font-size="15" font-weight="700" fill="#b35a26">今週の最小構成:pip install openevolve</text>
  <text x="450" y="406" text-anchor="middle" font-size="13" fill="#5d6d7e">既存の採点関数を審査員に差す＋歩行コードを EVOLVE-BLOCK で囲む＋変異は Gemini-Flash の API</text>
  <text x="450" y="427" text-anchor="middle" font-size="13" fill="#5d6d7e">→ 生成を API にすれば 手元 GPU なしの CPU 完結で回せる(gaitlab)</text>
</svg>
