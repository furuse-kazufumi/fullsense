    <text x="350" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#a03328">② 審査員＝評価器</text>
    <text x="350" y="185" text-anchor="middle" font-size="12" fill="#8a3a32">実際に動かし採点</text>
    <rect x="266" y="200" width="168" height="36" rx="8" fill="#f2d7d3"/>
