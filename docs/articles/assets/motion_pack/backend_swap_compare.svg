<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-label="Backend swap compare" style="width:100%;height:auto;max-width:1200px">
  <title>Backend swap compare</title>
  <desc>Static-safe comparison asset showing a stable harness and a moving backend selector.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1c33"/>
      <stop offset="100%" stop-color="#09111f"/>
    </linearGradient>
    
  </defs>
  <rect width="960" height="320" fill="url(#bg)"/>
  
  <text x="480" y="32" text-anchor="middle" fill="#e5eefc" font-family="'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif" font-size="22" font-weight="700">Backend Swap Compare</text>
  <text x="480" y="54" text-anchor="middle" fill="#93a6c6" font-family="'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">Same interface, different engines, stable outer harness</text>

  <g font-family="'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif">
    <rect x="74" y="112" width="178" height="96" rx="14" fill="#13253f" stroke="#5dd1ff" stroke-opacity="0.35"/>
    <text x="163" y="144" text-anchor="middle" fill="#e5eefc" font-size="18" font-weight="700">Harness</text>
    <text x="163" y="168" text-anchor="middle" fill="#93a6c6" font-size="11">prompt, memory, gate, verifier</text>

    <rect x="708" y="88" width="162" height="144" rx="14" fill="#101f35" stroke="#8b7dff" stroke-opacity="0.35"/>
    <text x="789" y="118" text-anchor="middle" fill="#e5eefc" font-size="17" font-weight="700">Backend lane</text>
    <g fill="#e5eefc" font-size="12" text-anchor="middle">
      <text x="789" y="146">Transformer</text>
      <text x="789" y="168">SSM</text>
      <text x="789" y="190">RWKV</text>
      <text x="789" y="212">Mamba</text>
    </g>

    <g>
      <rect x="372" y="132" width="184" height="56" rx="12" fill="#112a24" stroke="#7ee787" stroke-opacity="0.35"/>
      <text x="464" y="154" text-anchor="middle" fill="#e5eefc" font-size="16" font-weight="700">Stable API</text>
      <text x="464" y="174" text-anchor="middle" fill="#93a6c6" font-size="11">same contract, swap engine beneath</text>
    </g>

    <path d="M252 160 H372" stroke="#5dd1ff" stroke-width="2.2" opacity="0.75"/>
    <path d="M556 160 H708" stroke="#7ee787" stroke-width="2.2" opacity="0.75"/>

    <rect x="732" y="132" width="114" height="20" rx="10" fill="#8b7dff" opacity="0.82">
      <animate attributeName="y" values="132;154;176;198;132" dur="7s" repeatCount="indefinite"/>
    </rect>
    <text x="789" y="244" text-anchor="middle" fill="#93a6c6" font-family="'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif" font-size="10">engine cursor moves, outer contract stays</text>
  </g>

</svg>
