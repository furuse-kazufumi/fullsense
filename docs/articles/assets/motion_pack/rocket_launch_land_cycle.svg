<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-label="Rocket launch and landing cycle" style="width:100%;height:auto;max-width:1200px">
  <title>Rocket launch and landing cycle</title>
  <desc>A booster ascends, flips, descends, and lands in one static-safe strip suitable for Qiita.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1c33"/>
      <stop offset="100%" stop-color="#09111f"/>
    </linearGradient>
    
  </defs>
  <rect width="960" height="320" fill="url(#bg)"/>
  
  <text x="480" y="32" text-anchor="middle" fill="#e5eefc" font-family="'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif" font-size="22" font-weight="700">Rocket Launch -&gt; Flip -&gt; Landing</text>
  <text x="480" y="54" text-anchor="middle" fill="#93a6c6" font-family="'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">One static-safe strip for ascent, boostback, descent, and soft touchdown</text>

  <g font-family="'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif">
    <rect x="72" y="92" width="816" height="176" rx="18" fill="#0b1629" stroke="#5dd1ff" stroke-opacity="0.16"/>
    <path d="M104 240 H856" stroke="#93a6c6" stroke-opacity="0.28" stroke-width="2"/>

    <text x="152" y="118" text-anchor="middle" fill="#e5eefc" font-size="14" font-weight="700">launch</text>
    <text x="364" y="118" text-anchor="middle" fill="#e5eefc" font-size="14" font-weight="700">coast / flip</text>
    <text x="584" y="118" text-anchor="middle" fill="#e5eefc" font-size="14" font-weight="700">descent burn</text>
    <text x="804" y="118" text-anchor="middle" fill="#e5eefc" font-size="14" font-weight="700">landing</text>

    <path d="M140 224
             C196 180 256 126 320 120
             S434 150 508 178
             S636 226 744 232
             S810 236 836 226"
          fill="none" stroke="#5dd1ff" stroke-width="3" stroke-opacity="0.72" stroke-linecap="round"/>

    <g fill="none" stroke="#93a6c6" stroke-opacity="0.22" stroke-dasharray="4 6">
      <path d="M284 126 L284 240"/>
      <path d="M496 126 L496 240"/>
      <path d="M708 126 L708 240"/>
    </g>

    <g id="rocket-phase-launch" transform="translate(136 208)">
      <rect x="-8" y="-44" width="16" height="44" rx="7" fill="#e5eefc" opacity="0.96"/>
      <rect x="-10" y="-48" width="20" height="8" rx="4" fill="#5dd1ff" opacity="0.95"/>
      <path d="M-8 0 L-13 11 H-6 L0 3 L6 11 H13 L8 0 Z" fill="#ef476f" opacity="0.72"/>
    </g>
    <g id="rocket-phase-coast" transform="translate(342 126) rotate(-22)">
      <rect x="-8" y="-44" width="16" height="44" rx="7" fill="#e5eefc" opacity="0.92"/>
      <rect x="-10" y="-48" width="20" height="8" rx="4" fill="#5dd1ff" opacity="0.86"/>
    </g>
    <g id="rocket-phase-flip" transform="translate(470 166) rotate(18)">
      <rect x="-8" y="-44" width="16" height="44" rx="7" fill="#e5eefc" opacity="0.9"/>
      <rect x="-10" y="-48" width="20" height="8" rx="4" fill="#8b7dff" opacity="0.82"/>
    </g>
    <g id="rocket-phase-descent" transform="translate(584 206) rotate(8)">
      <rect x="-8" y="-44" width="16" height="44" rx="7" fill="#e5eefc" opacity="0.94"/>
      <rect x="-10" y="-48" width="20" height="8" rx="4" fill="#ffd166" opacity="0.92"/>
      <path d="M-8 0 L-13 10 H-6 L0 3 L6 10 H13 L8 0 Z" fill="#ffd166" opacity="0.54"/>
    </g>
    <g id="rocket-phase-landing" transform="translate(804 220)">
      <rect x="-8" y="-44" width="16" height="44" rx="7" fill="#e5eefc" opacity="0.98"/>
      <rect x="-10" y="-48" width="20" height="8" rx="4" fill="#7ee787" opacity="0.96"/>
      <path d="M-8 0 L-12 8 H-6 L0 2 L6 8 H12 L8 0 Z" fill="#7ee787" opacity="0.42"/>
    </g>

    <g transform="translate(0 0)">
      <g id="rocket-animated-token" transform="translate(130 208)">
        <rect x="-8" y="-44" width="16" height="44" rx="7" fill="#e5eefc" opacity="0.48"/>
        <rect x="-10" y="-48" width="20" height="8" rx="4" fill="#5dd1ff" opacity="0.46"/>
        <path d="M-8 0 L-13 11 H-6 L0 3 L6 11 H13 L8 0 Z" fill="#ef476f" opacity="0.56">
          <animate attributeName="opacity" values="0.18;0.72;0.18" dur="0.55s" repeatCount="indefinite"/>
        </path>
        <animateTransform attributeName="transform" type="translate"
          values="130 208;230 138;340 120;450 164;572 205;700 224;814 220"
          keyTimes="0;0.18;0.35;0.55;0.74;0.88;1"
          dur="8.5s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" additive="sum" type="rotate"
          values="0 0 -22;0 0 -22;0 0 18;0 0 12;0 0 0;0 0 0;0 0 0"
          keyTimes="0;0.22;0.4;0.58;0.76;0.9;1"
          dur="8.5s" repeatCount="indefinite"/>
      </g>
    </g>

    <g>
      <circle cx="230" cy="138" r="5" fill="#ffd166" opacity="0.9"/>
      <circle cx="340" cy="120" r="5" fill="#8b7dff" opacity="0.9"/>
      <circle cx="572" cy="205" r="5" fill="#7ee787" opacity="0.82"/>
      <circle cx="814" cy="220" r="5" fill="#7ee787" opacity="0.95"/>
    </g>

    <path d="M122 214 C128 198 134 186 142 174" stroke="#ef476f" stroke-width="2.2" stroke-opacity="0.38" fill="none"/>
    <path d="M562 206 C572 212 582 216 592 220" stroke="#ffd166" stroke-width="2.2" stroke-opacity="0.34" fill="none"/>
    <path d="M804 220 C804 206 804 194 804 180" stroke="#7ee787" stroke-width="2.4" stroke-opacity="0.42" fill="none"/>

    <text x="480" y="289" text-anchor="middle" fill="#93a6c6" font-size="11">Use with the real GIF when motion matters; use this strip when Qiita must stay static-safe.</text>
  </g>

</svg>
