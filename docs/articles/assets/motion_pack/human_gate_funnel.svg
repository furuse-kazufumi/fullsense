<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-label="Human gate funnel" style="width:100%;height:auto;max-width:1200px">
  <title>Human gate funnel</title>
  <desc>Multiple proposals converge into a fail-closed policy gate, then one safe write passes through.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1c33"/>
      <stop offset="100%" stop-color="#09111f"/>
    </linearGradient>
    
  </defs>
  <rect width="960" height="320" fill="url(#bg)"/>
  
  <text x="480" y="32" text-anchor="middle" fill="#e5eefc" font-family="'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif" font-size="22" font-weight="700">Human Gate Funnel</text>
  <text x="480" y="54" text-anchor="middle" fill="#93a6c6" font-family="'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">Fast model proposals narrow into a small set of operator-approved writes</text>

  <g font-family="'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif">
    <text x="178" y="102" text-anchor="middle" fill="#e5eefc" font-size="17" font-weight="700">Many proposals</text>
    <text x="480" y="102" text-anchor="middle" fill="#e5eefc" font-size="17" font-weight="700">Policy / verifier</text>
    <text x="784" y="102" text-anchor="middle" fill="#e5eefc" font-size="17" font-weight="700">Approved action</text>

    <g fill="#5dd1ff" opacity="0.75">
      <circle cx="118" cy="132" r="10"><animateTransform attributeName="transform" type="translate" values="0 0;18 0;0 0" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="172" cy="158" r="9"><animateTransform attributeName="transform" type="translate" values="0 0;18 0;0 0" dur="3.4s" repeatCount="indefinite"/></circle>
      <circle cx="226" cy="132" r="10"><animateTransform attributeName="transform" type="translate" values="0 0;18 0;0 0" dur="3.1s" repeatCount="indefinite"/></circle>
      <circle cx="150" cy="192" r="9"><animateTransform attributeName="transform" type="translate" values="0 0;18 0;0 0" dur="3.6s" repeatCount="indefinite"/></circle>
      <circle cx="214" cy="192" r="9"><animateTransform attributeName="transform" type="translate" values="0 0;18 0;0 0" dur="3.8s" repeatCount="indefinite"/></circle>
    </g>

    <path d="M300 116 L610 116 L680 160 L610 204 L300 204 L370 160 Z" fill="#142942" stroke="#ffd166" stroke-opacity="0.45"/>
    <text x="470" y="152" text-anchor="middle" fill="#e5eefc" font-size="16" font-weight="700">fail closed</text>
    <text x="470" y="173" text-anchor="middle" fill="#93a6c6" font-size="11">unsafe or ambiguous paths do not pass</text>

    <rect x="736" y="128" width="96" height="64" rx="14" fill="#112a24" stroke="#7ee787" stroke-opacity="0.5"/>
    <text x="784" y="155" text-anchor="middle" fill="#e5eefc" font-size="16" font-weight="700">WRITE</text>
    <text x="784" y="174" text-anchor="middle" fill="#93a6c6" font-size="10">one bounded delta</text>

    <circle cx="226" cy="132" r="8" fill="#ffd166">
      <animate attributeName="cx" values="226;352;784;784;226" dur="5.8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="132;160;160;160;132" dur="5.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="192" r="7" fill="#ef476f" opacity="0.32">
      <animate attributeName="opacity" values="0.32;0.32;0.1;0.32" dur="4.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;120 -30;0 0" dur="4.2s" repeatCount="indefinite"/>
    </circle>
  </g>

</svg>
