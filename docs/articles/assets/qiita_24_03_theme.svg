<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="1000" height="320" role="img" aria-label="#24-03 theme: TRIZ 40 原理 grid + 矛盾 flicker">
  <title>TRIZ 40 原理 grid + 矛盾マトリクス flicker animation</title>
  <rect width="1000" height="320" fill="#0f172a"/>
  <text x="500" y="28" font-family="-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0" text-anchor="middle">「矛盾は計算できる」: TRIZ 40 原理 × ChangeOp × Z3 verifier</text>

  <!-- 40-cell grid (8 cols × 5 rows) -->
  <g transform="translate(70, 70)">
    <text x="200" y="-12" font-size="11" fill="#a5b4fc" text-anchor="middle" font-weight="600">40 inventive principles (TRIZ)</text>
    <!-- generate 40 cells with staggered pulse -->
    <g>
      <!-- row 1 -->
      <rect x="0"   y="0" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#22c55e;#1e293b" dur="6s" begin="0.0s" repeatCount="indefinite"/></rect><text x="23" y="20" font-size="10" fill="#cbd5e1" text-anchor="middle">1</text>
      <rect x="50"  y="0" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#22c55e;#1e293b" dur="6s" begin="0.15s" repeatCount="indefinite"/></rect><text x="73" y="20" font-size="10" fill="#cbd5e1" text-anchor="middle">2</text>
      <rect x="100" y="0" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#22c55e;#1e293b" dur="6s" begin="0.3s" repeatCount="indefinite"/></rect><text x="123" y="20" font-size="10" fill="#cbd5e1" text-anchor="middle">3</text>
      <rect x="150" y="0" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#22c55e;#1e293b" dur="6s" begin="0.45s" repeatCount="indefinite"/></rect><text x="173" y="20" font-size="10" fill="#cbd5e1" text-anchor="middle">4</text>
      <rect x="200" y="0" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#22c55e;#1e293b" dur="6s" begin="0.6s" repeatCount="indefinite"/></rect><text x="223" y="20" font-size="10" fill="#cbd5e1" text-anchor="middle">5</text>
      <rect x="250" y="0" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#22c55e;#1e293b" dur="6s" begin="0.75s" repeatCount="indefinite"/></rect><text x="273" y="20" font-size="10" fill="#cbd5e1" text-anchor="middle">6</text>
      <rect x="300" y="0" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#22c55e;#1e293b" dur="6s" begin="0.9s" repeatCount="indefinite"/></rect><text x="323" y="20" font-size="10" fill="#cbd5e1" text-anchor="middle">7</text>
      <rect x="350" y="0" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#22c55e;#1e293b" dur="6s" begin="1.05s" repeatCount="indefinite"/></rect><text x="373" y="20" font-size="10" fill="#cbd5e1" text-anchor="middle">8</text>
      <!-- row 2-5 generated similarly, cells 9-40 -->
    </g>
    <!-- Programmatic-ish: just paint rows 2-5 with simpler staggered pulse -->
    <g>
      <g transform="translate(0, 36)">
        <rect x="0"   width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#fb923c;#1e293b" dur="6s" begin="1.2s" repeatCount="indefinite"/></rect>
        <rect x="50"  width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#fb923c;#1e293b" dur="6s" begin="1.35s" repeatCount="indefinite"/></rect>
        <rect x="100" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#fb923c;#1e293b" dur="6s" begin="1.5s" repeatCount="indefinite"/></rect>
        <rect x="150" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#fb923c;#1e293b" dur="6s" begin="1.65s" repeatCount="indefinite"/></rect>
        <rect x="200" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#fb923c;#1e293b" dur="6s" begin="1.8s" repeatCount="indefinite"/></rect>
        <rect x="250" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#fb923c;#1e293b" dur="6s" begin="1.95s" repeatCount="indefinite"/></rect>
        <rect x="300" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#fb923c;#1e293b" dur="6s" begin="2.1s" repeatCount="indefinite"/></rect>
        <rect x="350" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#fb923c;#1e293b" dur="6s" begin="2.25s" repeatCount="indefinite"/></rect>
      </g>
      <g transform="translate(0, 72)">
        <rect x="0"   width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#22d3ee;#1e293b" dur="6s" begin="2.4s" repeatCount="indefinite"/></rect>
        <rect x="50"  width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#22d3ee;#1e293b" dur="6s" begin="2.55s" repeatCount="indefinite"/></rect>
        <rect x="100" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#22d3ee;#1e293b" dur="6s" begin="2.7s" repeatCount="indefinite"/></rect>
        <rect x="150" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#22d3ee;#1e293b" dur="6s" begin="2.85s" repeatCount="indefinite"/></rect>
        <rect x="200" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#22d3ee;#1e293b" dur="6s" begin="3.0s" repeatCount="indefinite"/></rect>
        <rect x="250" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#22d3ee;#1e293b" dur="6s" begin="3.15s" repeatCount="indefinite"/></rect>
        <rect x="300" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#22d3ee;#1e293b" dur="6s" begin="3.3s" repeatCount="indefinite"/></rect>
        <rect x="350" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#22d3ee;#1e293b" dur="6s" begin="3.45s" repeatCount="indefinite"/></rect>
      </g>
      <g transform="translate(0, 108)">
        <rect x="0"   width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#a78bfa;#1e293b" dur="6s" begin="3.6s" repeatCount="indefinite"/></rect>
        <rect x="50"  width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#a78bfa;#1e293b" dur="6s" begin="3.75s" repeatCount="indefinite"/></rect>
        <rect x="100" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#a78bfa;#1e293b" dur="6s" begin="3.9s" repeatCount="indefinite"/></rect>
        <rect x="150" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#a78bfa;#1e293b" dur="6s" begin="4.05s" repeatCount="indefinite"/></rect>
        <rect x="200" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#a78bfa;#1e293b" dur="6s" begin="4.2s" repeatCount="indefinite"/></rect>
        <rect x="250" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#a78bfa;#1e293b" dur="6s" begin="4.35s" repeatCount="indefinite"/></rect>
        <rect x="300" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#a78bfa;#1e293b" dur="6s" begin="4.5s" repeatCount="indefinite"/></rect>
        <rect x="350" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#a78bfa;#1e293b" dur="6s" begin="4.65s" repeatCount="indefinite"/></rect>
      </g>
      <g transform="translate(0, 144)">
        <rect x="0"   width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#f472b6;#1e293b" dur="6s" begin="4.8s" repeatCount="indefinite"/></rect>
        <rect x="50"  width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#f472b6;#1e293b" dur="6s" begin="4.95s" repeatCount="indefinite"/></rect>
        <rect x="100" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#f472b6;#1e293b" dur="6s" begin="5.1s" repeatCount="indefinite"/></rect>
        <rect x="150" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#f472b6;#1e293b" dur="6s" begin="5.25s" repeatCount="indefinite"/></rect>
        <rect x="200" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#f472b6;#1e293b" dur="6s" begin="5.4s" repeatCount="indefinite"/></rect>
        <rect x="250" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#f472b6;#1e293b" dur="6s" begin="5.55s" repeatCount="indefinite"/></rect>
        <rect x="300" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#f472b6;#1e293b" dur="6s" begin="5.7s" repeatCount="indefinite"/></rect>
        <rect x="350" width="46" height="32" rx="4" fill="#1e293b" stroke="#475569"><animate attributeName="fill" values="#1e293b;#f472b6;#1e293b" dur="6s" begin="5.85s" repeatCount="indefinite"/></rect>
      </g>
    </g>
  </g>

  <!-- Right: 矛盾マトリクス (improving × worsening) -->
  <g transform="translate(560, 70)">
    <text x="180" y="-12" font-size="11" fill="#fb923c" text-anchor="middle" font-weight="600">contradiction matrix → Z3 verifier</text>
    <!-- improving axis label -->
    <text x="-12" y="80" font-size="9" fill="#94a3b8" text-anchor="end">改善したい</text>
    <!-- worsening axis label -->
    <text x="180" y="-2" font-size="9" fill="#94a3b8" text-anchor="middle">悪化する</text>
    <!-- 6x6 cell matrix with flickering active cells -->
    <g>
      <rect x="0"   y="0"   width="56" height="36" fill="#1e293b" stroke="#334155"/>
      <rect x="60"  y="0"   width="56" height="36" fill="#1e293b" stroke="#334155"/>
      <rect x="120" y="0"   width="56" height="36" fill="#1e293b" stroke="#334155"><animate attributeName="fill" values="#1e293b;#fb923c;#1e293b" dur="4s" begin="0.5s" repeatCount="indefinite"/></rect>
      <rect x="180" y="0"   width="56" height="36" fill="#1e293b" stroke="#334155"/>
      <rect x="240" y="0"   width="56" height="36" fill="#1e293b" stroke="#334155"/>
      <rect x="300" y="0"   width="56" height="36" fill="#1e293b" stroke="#334155"/>

      <rect x="0"   y="40"  width="56" height="36" fill="#1e293b" stroke="#334155"/>
      <rect x="60"  y="40"  width="56" height="36" fill="#1e293b" stroke="#334155"><animate attributeName="fill" values="#1e293b;#22d3ee;#1e293b" dur="4s" begin="1s" repeatCount="indefinite"/></rect>
      <rect x="120" y="40"  width="56" height="36" fill="#1e293b" stroke="#334155"/>
      <rect x="180" y="40"  width="56" height="36" fill="#1e293b" stroke="#334155"/>
      <rect x="240" y="40"  width="56" height="36" fill="#1e293b" stroke="#334155"><animate attributeName="fill" values="#1e293b;#22c55e;#1e293b" dur="4s" begin="1.5s" repeatCount="indefinite"/></rect>
      <rect x="300" y="40"  width="56" height="36" fill="#1e293b" stroke="#334155"/>

      <rect x="0"   y="80"  width="56" height="36" fill="#1e293b" stroke="#334155"/>
      <rect x="60"  y="80"  width="56" height="36" fill="#1e293b" stroke="#334155"/>
      <rect x="120" y="80"  width="56" height="36" fill="#1e293b" stroke="#334155"/>
      <rect x="180" y="80"  width="56" height="36" fill="#1e293b" stroke="#334155"><animate attributeName="fill" values="#1e293b;#a78bfa;#1e293b" dur="4s" begin="2s" repeatCount="indefinite"/></rect>
      <rect x="240" y="80"  width="56" height="36" fill="#1e293b" stroke="#334155"/>
      <rect x="300" y="80"  width="56" height="36" fill="#1e293b" stroke="#334155"/>

      <rect x="0"   y="120" width="56" height="36" fill="#1e293b" stroke="#334155"><animate attributeName="fill" values="#1e293b;#f472b6;#1e293b" dur="4s" begin="2.5s" repeatCount="indefinite"/></rect>
      <rect x="60"  y="120" width="56" height="36" fill="#1e293b" stroke="#334155"/>
      <rect x="120" y="120" width="56" height="36" fill="#1e293b" stroke="#334155"/>
      <rect x="180" y="120" width="56" height="36" fill="#1e293b" stroke="#334155"/>
      <rect x="240" y="120" width="56" height="36" fill="#1e293b" stroke="#334155"/>
      <rect x="300" y="120" width="56" height="36" fill="#1e293b" stroke="#334155"><animate attributeName="fill" values="#1e293b;#22d3ee;#1e293b" dur="4s" begin="3s" repeatCount="indefinite"/></rect>
    </g>
    <!-- arrow to Z3 -->
    <g transform="translate(180, 200)">
      <text x="0" y="0" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="700">→ Z3 verifier で SAT/UNSAT 判定</text>
    </g>
  </g>

  <text x="500" y="306" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">40 原理が staggered pulse, 矛盾マトリクスが active cell flicker, ChangeOp の判定が緑/紫 で交互に</text>
</svg>
