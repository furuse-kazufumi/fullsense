<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" role="img" aria-label="Approval Bus verdict flow with Ed25519 signed ledger" style="width:100%;height:auto;max-width:1200px">
  <title>llive #24-07 — Approval Bus verdict + Ed25519 audit chain</title>
  <desc>A proposal flows into the Approval Bus, gets evaluated as approve/deny, and is sealed into a chained ledger with Ed25519 signature. SMIL-only animation.</desc>
  <defs>
    <linearGradient id="bg24_07" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1426"/>
      <stop offset="100%" stop-color="#0a0f17"/>
    </linearGradient>
    <linearGradient id="bus24_07" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5dd1ff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="okgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ee787"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
    <linearGradient id="denygrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef476f"/>
      <stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="240" fill="url(#bg24_07)"/>

  <text x="400" y="32" text-anchor="middle" fill="#e6edf3"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="17" font-weight="700">
    Approval Bus — 自己進化する AI が判断を全部署名する
  </text>
  <text x="400" y="54" text-anchor="middle" fill="#94a3b8"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">
    proposal → policy → approve / deny → Ed25519 ledger
  </text>

  <g font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#e6edf3">
    <g transform="translate(40 105)">
      <rect width="120" height="60" rx="8" fill="#1f2937" stroke="#5dd1ff" stroke-width="1.4"/>
      <text x="60" y="22" text-anchor="middle" font-weight="600">proposal</text>
      <text x="60" y="40" text-anchor="middle" font-size="10" fill="#cbd5e1">mutate Genome[5]</text>
      <text x="60" y="54" text-anchor="middle" font-size="10" fill="#94a3b8">agent_id=variant_07</text>
    </g>

    <g transform="translate(200 105)">
      <rect width="180" height="60" rx="8" fill="url(#bus24_07)" opacity="0.25"/>
      <rect width="180" height="60" rx="8" fill="none" stroke="url(#bus24_07)" stroke-width="1.6"/>
      <text x="90" y="22" text-anchor="middle" font-weight="700">Approval Bus</text>
      <text x="90" y="40" text-anchor="middle" font-size="10" fill="#cbd5e1">policy + collusion detector</text>
      <text x="90" y="54" text-anchor="middle" font-size="10" fill="#94a3b8">human / autopolicy</text>
    </g>

    <!-- verdict gates that alternate -->
    <g transform="translate(440 80)">
      <g opacity="1">
        <animate attributeName="opacity" values="1;1;1;1;1;1;1;1" dur="6s" repeatCount="indefinite" keyTimes="0;0.1;0.4;0.5;0.55;0.6;0.9;1"/>
        <rect width="110" height="50" rx="8" fill="url(#okgrad)" opacity="0.75"/>
        <text x="55" y="22" text-anchor="middle" font-weight="700">approve</text>
        <text x="55" y="40" text-anchor="middle" font-size="10" fill="#0e1426">policy.passed</text>
      </g>
      <g opacity="1" transform="translate(0 70)">
        <animate attributeName="opacity" values="1;1;1;1;1;1;1;1" dur="6s" repeatCount="indefinite" keyTimes="0;0.1;0.4;0.5;0.55;0.6;0.9;1"/>
        <rect width="110" height="50" rx="8" fill="url(#denygrad)" opacity="0.75"/>
        <text x="55" y="22" text-anchor="middle" font-weight="700" fill="#fff">deny</text>
        <text x="55" y="40" text-anchor="middle" font-size="10" fill="#fff">collusion detected</text>
      </g>
    </g>

    <g transform="translate(610 95)">
      <text x="65" y="-6" text-anchor="middle" fill="#94a3b8" font-size="10">Ed25519 audit chain</text>
      <g>
        <rect x="0"  y="0" width="38" height="30" rx="4" fill="#1f2937" stroke="#7ee787" stroke-width="1"/>
        <text x="19" y="20" text-anchor="middle" font-size="10" fill="#7ee787">#n-2</text>
        <rect x="44" y="0" width="38" height="30" rx="4" fill="#1f2937" stroke="#7ee787" stroke-width="1"/>
        <text x="63" y="20" text-anchor="middle" font-size="10" fill="#7ee787">#n-1</text>
        <rect x="88" y="0" width="38" height="30" rx="4" fill="#1f2937" stroke="#7ee787" stroke-width="1">
          <animate attributeName="stroke-width" values="1;3;1" dur="2s" repeatCount="indefinite"/>
        </rect>
        <text x="107" y="20" text-anchor="middle" font-size="10" fill="#7ee787">#n</text>
      </g>
      <g transform="translate(0 38)" font-size="10" fill="#cbd5e1">
        <text x="65" y="10" text-anchor="middle">hash + sig + parent_hash</text>
      </g>
    </g>

    <g stroke="url(#bus24_07)" stroke-width="1.5" fill="none" stroke-dasharray="4 3" opacity="0.6">
      <line x1="160" y1="135" x2="200" y2="135"/>
      <line x1="380" y1="135" x2="440" y2="105"/>
      <line x1="380" y1="135" x2="440" y2="175"/>
      <line x1="550" y1="105" x2="610" y2="110"/>
      <line x1="550" y1="175" x2="610" y2="110"/>
    </g>

    <circle r="5" fill="#ffd166">
      <animateMotion dur="6s" repeatCount="indefinite"
        path="M 160 135 L 200 135 L 380 135 L 440 105 L 550 105 L 610 110"/>
      <animate attributeName="opacity" values="0;1;1;1;1;0" keyTimes="0;0.1;0.4;0.55;0.85;1" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="400" y="225" text-anchor="middle" fill="#64748b"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">
    E.4 governance: 共謀検出 → Approval Bus 連携、判断は全部 Ed25519 + SHA-256 で chain
  </text>
</svg>
