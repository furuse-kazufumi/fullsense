<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="Segoe UI,Helvetica,Arial,sans-serif">
  <title>ラングトンの蟻: 単純な決定論ルールが「見かけの秩序」を生む</title>
  <desc>暗い格子の上を蟻が animateMotion で歩き、軌跡セルが順に塗られて、最初は無秩序だがやがて反復構造(ハイウェイ)が現れる様子をループ再生する。単純な決定論ルールが見かけの秩序を生み、経験的観測がその幻に騙されることを示す比喩図。図中に「※ラングトンの蟻は一般に知られた現象であり本研究 llcore の実験データではない」と明記し、下部に verified-plasticity が sound certificate でこの見かけを見抜くという橋渡し一文を添える。</desc>

  <defs>
    <!-- 蟻本体 (小さな三角) -->
    <g id="ant">
      <polygon points="0,-7 6,6 -6,6" fill="#ff9f43" stroke="#0f1320" stroke-width="1"/>
      <circle cx="0" cy="-4" r="2.2" fill="#ffd9a8"/>
    </g>
    <!-- ハイウェイ方向の矢印 marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4ea1ff"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="720" height="480" fill="#0f1320"/>

  <!-- タイトル / キャッチ -->
  <text x="36" y="44" fill="#e8ecf4" font-size="23" font-weight="700">単純な決定論ルールが「見かけの秩序」を生む</text>
  <text x="36" y="70" fill="#9aa3b2" font-size="14.5">経験的観測は、この幻に騙される。</text>

  <!-- ============ 格子盤面 ============ -->
  <!-- 盤面領域: x 36..396, y 96..456 (18x18 セル, 20px) -->
  <g>
    <rect x="36" y="96" width="360" height="360" fill="#141a2c" stroke="#2a3350" stroke-width="1.5"/>
    <!-- 薄いグリッド線 -->
    <g stroke="#1d2540" stroke-width="1">
      <line x1="56"  y1="96" x2="56"  y2="456"/>
      <line x1="76"  y1="96" x2="76"  y2="456"/>
      <line x1="96"  y1="96" x2="96"  y2="456"/>
      <line x1="116" y1="96" x2="116" y2="456"/>
      <line x1="136" y1="96" x2="136" y2="456"/>
      <line x1="156" y1="96" x2="156" y2="456"/>
      <line x1="176" y1="96" x2="176" y2="456"/>
      <line x1="196" y1="96" x2="196" y2="456"/>
      <line x1="216" y1="96" x2="216" y2="456"/>
      <line x1="236" y1="96" x2="236" y2="456"/>
      <line x1="256" y1="96" x2="256" y2="456"/>
      <line x1="276" y1="96" x2="276" y2="456"/>
      <line x1="296" y1="96" x2="296" y2="456"/>
      <line x1="316" y1="96" x2="316" y2="456"/>
      <line x1="336" y1="96" x2="336" y2="456"/>
      <line x1="356" y1="96" x2="356" y2="456"/>
      <line x1="376" y1="96" x2="376" y2="456"/>
      <line x1="36"  y1="116" x2="396" y2="116"/>
      <line x1="36"  y1="136" x2="396" y2="136"/>
      <line x1="36"  y1="156" x2="396" y2="156"/>
      <line x1="36"  y1="176" x2="396" y2="176"/>
      <line x1="36"  y1="196" x2="396" y2="196"/>
      <line x1="36"  y1="216" x2="396" y2="216"/>
      <line x1="36"  y1="236" x2="396" y2="236"/>
      <line x1="36"  y1="256" x2="396" y2="256"/>
      <line x1="36"  y1="276" x2="396" y2="276"/>
      <line x1="36"  y1="296" x2="396" y2="296"/>
      <line x1="36"  y1="316" x2="396" y2="316"/>
      <line x1="36"  y1="336" x2="396" y2="336"/>
      <line x1="36"  y1="356" x2="396" y2="356"/>
      <line x1="36"  y1="376" x2="396" y2="376"/>
      <line x1="36"  y1="396" x2="396" y2="396"/>
      <line x1="36"  y1="416" x2="396" y2="416"/>
      <line x1="36"  y1="436" x2="396" y2="436"/>
    </g>

    <!-- ===== 軌跡セル: 初期は無秩序にバラつき、後半で対角ハイウェイの反復構造へ ===== -->
    <!-- 各セルは 8s ループ内で「順番に」点灯。静止(アニメ停止)時は全点灯=完成パターンが見える -->
    <!-- フェーズ1: 無秩序な散らばり (中央付近のランダム風) -->
    <g fill="#566075">
      <!-- 無秩序ブロック (蟻が暴れる初期相) -->
      <rect x="196" y="256" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1;1;1;1" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="216" y="256" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1;1;1;1" begin="0.15s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="216" y="236" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1;1;1;1" begin="0.3s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="196" y="236" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1;1;1;1" begin="0.45s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="176" y="236" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1;1;1;1" begin="0.6s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="176" y="256" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1;1;1;1" begin="0.75s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="176" y="276" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1;1;1;1" begin="0.9s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="196" y="276" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1;1;1;1" begin="1.05s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="216" y="276" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1;1;1;1" begin="1.2s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="236" y="276" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1;1;1;1" begin="1.35s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="236" y="256" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1;1;1;1" begin="1.5s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="156" y="296" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1;1;1;1" begin="1.65s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="156" y="276" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1;1;1;1" begin="1.8s" dur="8s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- フェーズ2: 反復構造(ハイウェイ) — 対角に規則的に伸びるブロック -->
    <g fill="#4ea1ff">
      <rect x="156" y="296" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;0.85;0.85;0.85;0.85" begin="2.0s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="136" y="316" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;0.85;0.85;0.85;0.85" begin="2.3s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="156" y="316" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;0.85;0.85;0.85;0.85" begin="2.45s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="116" y="336" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;0.85;0.85;0.85;0.85" begin="2.75s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="136" y="336" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;0.85;0.85;0.85;0.85" begin="2.9s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="96" y="356" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;0.85;0.85;0.85;0.85" begin="3.2s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="116" y="356" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;0.85;0.85;0.85;0.85" begin="3.35s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="76" y="376" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;0.85;0.85;0.85;0.85" begin="3.65s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="96" y="376" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;0.85;0.85;0.85;0.85" begin="3.8s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="56" y="396" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;0.85;0.85;0.85;0.85" begin="4.1s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="76" y="396" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;0.85;0.85;0.85;0.85" begin="4.25s" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="56" y="416" width="20" height="20" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;0.85;0.85;0.85;0.85" begin="4.55s" dur="8s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- ハイウェイ方向ラベル -->
    <text x="60" y="448" fill="#4ea1ff" font-size="10.5" opacity="0">
      規則的な「ハイウェイ」が出現
      <animate attributeName="opacity" values="0;0;0;0;1;1;1;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <!-- ===== 蟻: animateMotion で盤面上を歩く (無秩序→ハイウェイ経路) ===== -->
    <g>
      <use href="#ant"/>
      <animateMotion dur="8s" repeatCount="indefinite" rotate="auto"
        path="M 206,266 L 226,266 L 226,246 L 206,246 L 186,246 L 186,266 L 186,286 L 206,286 L 226,286 L 246,286 L 246,266 L 166,306 L 166,286 L 166,306 L 146,326 L 166,326 L 126,346 L 146,346 L 106,366 L 126,366 L 86,386 L 106,386 L 66,406 L 86,406 L 66,426 L 206,266"/>
    </g>
  </g>

  <!-- ============ 右側: 解説パネル ============ -->
  <g>
    <text x="430" y="120" fill="#e8ecf4" font-size="15.5" font-weight="700">1 匹 + 2 つのルール</text>
    <text x="430" y="144" fill="#9aa3b2" font-size="12.5">白マス → 右に曲がり色を反転</text>
    <text x="430" y="163" fill="#9aa3b2" font-size="12.5">黒マス → 左に曲がり色を反転</text>

    <text x="430" y="200" fill="#ff9f43" font-size="13.5" font-weight="600">最初の約1万歩: 無秩序</text>
    <text x="430" y="221" fill="#9aa3b2" font-size="12">「カオスだ。発散している」と</text>
    <text x="430" y="238" fill="#9aa3b2" font-size="12">観測者は感じる(=経験的判断)。</text>

    <text x="430" y="276" fill="#4ea1ff" font-size="13.5" font-weight="600">やがて: 反復構造(ハイウェイ)</text>
    <text x="430" y="297" fill="#9aa3b2" font-size="12">同じ決定論ルールが、突如</text>
    <text x="430" y="314" fill="#9aa3b2" font-size="12">「見かけの秩序」を吐き出す。</text>

    <!-- 騙される観測者アイコン -->
    <g transform="translate(430,348)">
      <circle cx="12" cy="0" r="11" fill="none" stroke="#ff9f43" stroke-width="2"/>
      <circle cx="9" cy="-2" r="1.8" fill="#ff9f43"/>
      <circle cx="15" cy="-2" r="1.8" fill="#ff9f43"/>
      <path d="M7,4 Q12,8 17,4" fill="none" stroke="#ff9f43" stroke-width="1.8"/>
      <animateTransform attributeName="transform" type="translate"
        values="430,348; 433,348; 430,348" dur="1.2s" repeatCount="indefinite" additive="sum"/>
    </g>
    <text x="452" y="345" fill="#e8ecf4" font-size="12.5" font-weight="600">経験的観測は</text>
    <text x="452" y="362" fill="#e8ecf4" font-size="12.5" font-weight="600">この幻に騙される</text>
  </g>

  <!-- ============ 注記 (honest 制約: 比喩であって実験データではない) ============ -->
  <text x="430" y="402" fill="#566075" font-size="11">※ラングトンの蟻は一般に知られた現象であり、</text>
  <text x="430" y="418" fill="#566075" font-size="11">　本研究 llcore の実験データではない(比喩)。</text>

  <!-- ============ 下部 橋渡し ============ -->
  <line x1="36" y1="462" x2="684" y2="462" stroke="#2a3350" stroke-width="1"/>
  <g>
    <rect x="36" y="467" width="648" height="0" fill="none"/>
    <text x="36" y="478" fill="#2ecc71" font-size="13" font-weight="600">
      verified-plasticity は、この「見かけ」を sound certificate で見抜く
      <tspan fill="#9aa3b2" font-weight="400" font-size="11.5">  — 経験ではなく box-sup の σ_max で真の発散を判定</tspan>
    </text>
  </g>
</svg>
