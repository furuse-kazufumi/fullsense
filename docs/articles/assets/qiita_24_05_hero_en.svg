<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" role="img" aria-label="Population evolution across generations" style="width:100%;height:auto;max-width:1200px">
  <title>llive #24-05 — generational transition of the N=64 derived population</title>
  <desc>An 8x8 grid of population cells fades fitness colors generation by generation; low-fitness cells get culled, high-fitness cells brighten and recombine. SMIL-only animation.</desc>
  <defs>
    <linearGradient id="bg24_05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1426"/>
      <stop offset="100%" stop-color="#0a0f17"/>
    </linearGradient>
  </defs>
  <style>
    .cell { transition: none; }
    .gen-label { font-family: ui-sans-serif,system-ui,sans-serif; font-size: 11px; fill: #cbd5e1; }
  </style>
  <rect width="800" height="240" fill="url(#bg24_05)"/>

  <text x="400" y="34" text-anchor="middle" fill="#e6edf3"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="18" font-weight="700">
    the derived population N=64 turns generations
  </text>
  <text x="400" y="56" text-anchor="middle" fill="#94a3b8"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">
    v0.B Genome → v0.C subprocess → v0.D meta-mutation → v0.E peer evaluation
  </text>

  <g transform="translate(260 80)">
    <g>
      <animate attributeName="opacity" values="1;1" dur="12s" repeatCount="indefinite"/>
    </g>
    <g>
      <!-- 8x8 grid of cells, each cell uses staggered animation to suggest generations evolving -->
      <g id="grid">
        <!-- row 0..7 cell 0..7; we'll loop by rendering 64 cells with per-cell begin offset -->
        <g>
          <!-- Each cell: 24x24 square; color cycles fitness low->high in waves -->
        </g>
      </g>
    </g>
  </g>

  <g transform="translate(260 80)">
    <!-- Generate 8x8 grid -->
    <g>
      <g><rect x="0"  y="0"  width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ffd166;#7ee787;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" repeatCount="indefinite"/></rect></g>
      <g><rect x="28" y="0"  width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ef476f;#ffd166;#7ee787" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.1s" repeatCount="indefinite"/></rect></g>
      <g><rect x="56" y="0"  width="24" height="24" rx="3" fill="#ffd166"><animate attributeName="fill" values="#ffd166;#7ee787;#7ee787;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.2s" repeatCount="indefinite"/></rect></g>
      <g><rect x="84" y="0"  width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ffd166;#ffd166;#7ee787" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.3s" repeatCount="indefinite"/></rect></g>
      <g><rect x="112" y="0" width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ef476f;#ffd166;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.15s" repeatCount="indefinite"/></rect></g>
      <g><rect x="140" y="0" width="24" height="24" rx="3" fill="#ffd166"><animate attributeName="fill" values="#ffd166;#ffd166;#7ee787;#7ee787" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.25s" repeatCount="indefinite"/></rect></g>
      <g><rect x="168" y="0" width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ffd166;#7ee787;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.35s" repeatCount="indefinite"/></rect></g>
      <g><rect x="196" y="0" width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ffd166;#ffd166;#7ee787" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.45s" repeatCount="indefinite"/></rect></g>

      <g><rect x="0"  y="28" width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ef476f;#ffd166;#7ee787" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.05s" repeatCount="indefinite"/></rect></g>
      <g><rect x="28" y="28" width="24" height="24" rx="3" fill="#ffd166"><animate attributeName="fill" values="#ffd166;#7ee787;#7ee787;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.15s" repeatCount="indefinite"/></rect></g>
      <g><rect x="56" y="28" width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ffd166;#7ee787;#7ee787" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.2s" repeatCount="indefinite"/></rect></g>
      <g><rect x="84" y="28" width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ef476f;#ffd166;#7ee787" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.3s" repeatCount="indefinite"/></rect></g>
      <g><rect x="112" y="28" width="24" height="24" rx="3" fill="#ffd166"><animate attributeName="fill" values="#ffd166;#7ee787;#7ee787;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.4s" repeatCount="indefinite"/></rect></g>
      <g><rect x="140" y="28" width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ffd166;#ffd166;#7ee787" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.5s" repeatCount="indefinite"/></rect></g>
      <g><rect x="168" y="28" width="24" height="24" rx="3" fill="#ffd166"><animate attributeName="fill" values="#ffd166;#7ee787;#5dd1ff;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.55s" repeatCount="indefinite"/></rect></g>
      <g><rect x="196" y="28" width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ffd166;#7ee787;#7ee787" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.6s" repeatCount="indefinite"/></rect></g>

      <g><rect x="0"  y="56" width="24" height="24" rx="3" fill="#ffd166"><animate attributeName="fill" values="#ffd166;#ffd166;#7ee787;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.05s" repeatCount="indefinite"/></rect></g>
      <g><rect x="28" y="56" width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ffd166;#ffd166;#7ee787" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.15s" repeatCount="indefinite"/></rect></g>
      <g><rect x="56" y="56" width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ffd166;#7ee787;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.2s" repeatCount="indefinite"/></rect></g>
      <g><rect x="84" y="56" width="24" height="24" rx="3" fill="#ffd166"><animate attributeName="fill" values="#ffd166;#7ee787;#7ee787;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.3s" repeatCount="indefinite"/></rect></g>
      <g><rect x="112" y="56" width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ef476f;#ffd166;#7ee787" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.35s" repeatCount="indefinite"/></rect></g>
      <g><rect x="140" y="56" width="24" height="24" rx="3" fill="#ffd166"><animate attributeName="fill" values="#ffd166;#7ee787;#7ee787;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.45s" repeatCount="indefinite"/></rect></g>
      <g><rect x="168" y="56" width="24" height="24" rx="3" fill="#7ee787"><animate attributeName="fill" values="#7ee787;#7ee787;#5dd1ff;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.5s" repeatCount="indefinite"/></rect></g>
      <g><rect x="196" y="56" width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ffd166;#7ee787;#7ee787" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.55s" repeatCount="indefinite"/></rect></g>

      <g><rect x="0"  y="84" width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ffd166;#7ee787;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.1s" repeatCount="indefinite"/></rect></g>
      <g><rect x="28" y="84" width="24" height="24" rx="3" fill="#ffd166"><animate attributeName="fill" values="#ffd166;#7ee787;#7ee787;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.2s" repeatCount="indefinite"/></rect></g>
      <g><rect x="56" y="84" width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ffd166;#7ee787;#7ee787" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.25s" repeatCount="indefinite"/></rect></g>
      <g><rect x="84" y="84" width="24" height="24" rx="3" fill="#7ee787"><animate attributeName="fill" values="#7ee787;#7ee787;#5dd1ff;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.3s" repeatCount="indefinite"/></rect></g>
      <g><rect x="112" y="84" width="24" height="24" rx="3" fill="#ffd166"><animate attributeName="fill" values="#ffd166;#7ee787;#7ee787;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.4s" repeatCount="indefinite"/></rect></g>
      <g><rect x="140" y="84" width="24" height="24" rx="3" fill="#7ee787"><animate attributeName="fill" values="#7ee787;#5dd1ff;#5dd1ff;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.5s" repeatCount="indefinite"/></rect></g>
      <g><rect x="168" y="84" width="24" height="24" rx="3" fill="#ffd166"><animate attributeName="fill" values="#ffd166;#7ee787;#5dd1ff;#5dd1ff" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.55s" repeatCount="indefinite"/></rect></g>
      <g><rect x="196" y="84" width="24" height="24" rx="3" fill="#ef476f"><animate attributeName="fill" values="#ef476f;#ffd166;#7ee787;#7ee787" keyTimes="0;0.33;0.66;1" dur="6s" begin="0.6s" repeatCount="indefinite"/></rect></g>
    </g>
  </g>

  <g class="gen-label" transform="translate(485 100)">
    <text x="0" y="0" font-weight="600" fill="#e6edf3">gen 0</text>
    <text x="0" y="20" font-size="10" fill="#ef476f">fitness ≈ random</text>
    <animate attributeName="opacity" values="1;0;0;0" keyTimes="0;0.33;0.66;1" dur="6s" repeatCount="indefinite"/>
  </g>
  <g class="gen-label" transform="translate(485 100)">
    <text x="0" y="0" font-weight="600" fill="#e6edf3">gen 4</text>
    <text x="0" y="20" font-size="10" fill="#ffd166">red queen kicks in</text>
    <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.33;0.66;1" dur="6s" repeatCount="indefinite"/>
  </g>
  <g class="gen-label" transform="translate(485 100)">
    <text x="0" y="0" font-weight="600" fill="#e6edf3">gen 8</text>
    <text x="0" y="20" font-size="10" fill="#7ee787">peer eval converging</text>
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.33;0.66;1" dur="6s" repeatCount="indefinite"/>
  </g>
  <g class="gen-label" transform="translate(485 100)">
    <text x="0" y="0" font-weight="600" fill="#e6edf3">gen 12</text>
    <text x="0" y="20" font-size="10" fill="#5dd1ff">+40% fitness vs gen 0</text>
    <animate attributeName="opacity" values="0;0;0;1" keyTimes="0;0.33;0.66;1" dur="6s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(60 130)" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#cbd5e1">
    <text x="0" y="0" font-weight="600" fill="#e6edf3">fitness</text>
    <rect x="0" y="8" width="14" height="14" fill="#ef476f"/><text x="22" y="20">low</text>
    <rect x="0" y="30" width="14" height="14" fill="#ffd166"/><text x="22" y="42">mid</text>
    <rect x="0" y="52" width="14" height="14" fill="#7ee787"/><text x="22" y="64">high</text>
    <rect x="0" y="74" width="14" height="14" fill="#5dd1ff"/><text x="22" y="86">elite</text>
  </g>

  <text x="400" y="225" text-anchor="middle" fill="#64748b"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">
    v0.B/C/D/E: 1 llive = 1 individual. With peer evaluation the quality of the evaluators rises across generations too
  </text>
</svg>
